false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":198,"t":"Metodyka Lean Canvas pomaga opisywać:","opts":[{"l":"a)","t":"Długoterminową strategię firmy","c":false},{"l":"b)","t":"Elementy modelu biznesowego","c":true},{"l":"c)","t":"Proces optymalizacji kosztowej firmy","c":false},{"l":"d)","t":"Żadne z powyższych","c":false}],"exp":"Lean Canvas to jednostronicowy szablon biznesplanu dla startupów/nowych projektów. Pomaga szybko wyrzucić pomysł z głowy na papier i sprawdzić, czy ma on sens.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":199,"t":"Model biznesowy opisuje:","opts":[{"l":"a)","t":"Segmenty klientów i sposoby dotarcia do nich","c":false},{"l":"b)","t":"Ofertę i jej wyróżniki","c":false},{"l":"c)","t":"Model finansowy biznesu","c":false},{"l":"d)","t":"Każde z powyższych","c":true}],"exp":"Model biznesowy (np. wg Business Model Canvas) to logiczna struktura pokazująca, jak firma tworzy, dostarcza i przechwytuje wartość.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":200,"t":"Współczynnik \\$\\\\beta\\$ (Beta) to:","opts":[{"l":"a)","t":"Wskaźnik zysku netto na jedną akcję","c":false},{"l":"b)","t":"Wskaźnik stopy zwrotu z inwestycji w dane aktywo (np. 1 akcję)","c":false},{"l":"c)","t":"Miara korelacji pomiędzy zmianami rynku (indeksu giełdowego) a zmianami kursu danej akcji","c":true}],"exp":"Współczynnik \\$\\\\beta\\$ określa ryzyko systematyczne (rynkowe). Informuje o ile procent zmieni się kurs akcji, jeśli rynek (indeks) zmieni się o 1%.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":201,"t":"Wdrożenie polityki cenowej zwykle NIE wymaga zmian:","opts":[{"l":"a)","t":"Systemach motywacyjnych","c":false},{"l":"b)","t":"Polityce rabatowej","c":false},{"l":"c)","t":"W składzie zarządu","c":true}],"exp":"Zmiana strategii cenowej to proces operacyjny i taktyczny. Wymaga on dostosowania narzędzi (rabaty) i ludzi (premie/motywacja), ale rzadko wiąże się z koniecznością zmiany osób na najwyższych szczeblach władzy w firmie.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":202,"t":"Jednostka miary wartości w internecie to:","opts":[{"l":"a)","t":"Megabajt","c":false},{"l":"b)","t":"Oczogodzina","c":true},{"l":"c)","t":"Kilowatogodzina","c":false},{"l":"d)","t":"Odpowiedź a) i b)","c":false}],"exp":"W ekonomii uwagi (attention economy) to czas i skupienie użytkownika są najcenniejszą walutą, którą serwisy internetowe starają się pozyskać i zmonetyzować.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":203,"t":"Jaka jest podstawowa różnica pomiędzy wskaźnikami dotyczącymi jednej emisji reklamy: rating i liczba kontaktów?","opts":[{"l":"a)","t":"rating jest wskaźnikiem dotyczącym konkretnej grupy docelowej, a liczba kontaktów dotyczy całej populacji","c":false},{"l":"b)","t":"rating jest wskaźnikiem dotyczącym całej populacji, a liczba kontaktów dotyczy konkretnej grupy docelowej","c":false},{"l":"c)","t":"rating jest wskaźnikiem wyrażonym w wartościach bezwzględnych a liczba kontaktów bazuje na miarach procentowych","c":false},{"l":"d)","t":"rating jest wskaźnikiem wyrażonym w wartościach procentowych a liczba kontaktów w wartościach bezwzględnych","c":true}],"exp":"Rating to procent grupy docelowej, który widział reklamę (np. 5%). Liczba kontaktów (impressions) to ta sama wartość, ale wyrażona w osobach (np. 200 000 osób).","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":204,"t":"Jak należy interpretować wskaźnik zasięgu kampanii?","opts":[{"l":"a)","t":"opisuje siłę kampanii pokazując średnią liczbę kontaktów","c":false},{"l":"b)","t":"opisuje do jakiego % grupy docelowej dotarła reklama przynajmniej raz","c":true}],"exp":"To definicja Reach 1+. Zasięg mówi nam o szerokości dotarcia (ilu ludzi nas widziało), a nie o natężeniu (ile razy).","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":205,"t":"Który wskaźnik opisuje jak duża/słaba była kampania?","opts":[{"l":"a)","t":"affinity","c":false},{"l":"b)","t":"GRP","c":true},{"l":"c)","t":"OTS","c":false},{"l":"d)","t":"Zasięg 1+","c":false}],"exp":"GRP (Gross Rating Point) to podstawowa miara siły kampanii reklamowej. Oblicza się ją jako sumę ocen oglądalności (ratingów) poszczególnych emisji reklamy. Informuje o skali (natężeniu) działań.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":206,"t":"Jaka jest różnica pomiędzy wskaźnikami zasięg netto kampanii i zasięg 1+?","opts":[{"l":"a)","t":"nie ma żadnej różnicy pomiędzy wskaźnikami -- są nazwami wymiennymi","c":true},{"l":"b)","t":"wskaźnik zasięg netto dotyczy zasięgu kampanii we wszystkich mediach, a wskaźnik zasięg 1+ dotyczy zasięgu kampanii przeprowadzonej w jednym medium -- telewizji","c":false},{"l":"c)","t":"wskaźnik zasięg netto opisuje do jakiego % grupy docelowej dotarła kampania kilka razy, a wskaźnik zasięg 1+ opisuje jaki % grupy docelowej miał 1 i więcej kontaktów z reklamą","c":false},{"l":"d)","t":"wskaźnik zasięg netto dotyczy jednej grupy docelowej, a wskaźnik zasięg 1+ dotyczy kilku grup docelowych","c":false}],"exp":"W mediaplanowaniu oba te pojęcia oznaczają to samo: jaki procent grupy docelowej zetknął się z reklamą przynajmniej raz.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":207,"t":"Czy wskaźnik średniej liczby kontaktów z reklamą może uzyskać wartość poniżej 1?","opts":[{"l":"a)","t":"tak, pod warunkiem, że wszyscy z grupy docelowej zobaczą część reklamy","c":false},{"l":"b)","t":"tak, kiedy zasięg jest wyższy od ratingu","c":false},{"l":"c)","t":"nie, bo nie może być mniej kontaktów z reklamą niż jeden","c":true},{"l":"d)","t":"nie, bo najniższy poziom wskaźnika wynosi 2","c":false}],"exp":"Średnia liczba kontaktów (częstotliwość/OTS) jest liczona dla osób, które już miały kontakt z reklamą (zasięg 1+). Skoro liczysz średnią tylko dla tych, którzy reklamę widzieli, to każdy z nich widział ją minimum 1 raz. Średnia nie może być więc niższa niż 1.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":208,"t":"Zaznacz serwis internetowy, który należy do grupy mediów społecznościowych:","opts":[{"l":"a)","t":"onet.pl","c":false},{"l":"b)","t":"Twitter.com","c":true},{"l":"c)","t":"gazeta.pl","c":false},{"l":"d)","t":"wp.pl","c":false}],"exp":"Twitter (obecnie X) to klasyczna platforma społecznościowa oparta na interakcji użytkowników. Pozostałe to portale informacyjne/horyzontalne.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":209,"t":"Brak akceptacji nachalnej reklamy i dążenie do przekazu indywidualnego, interesującego dla odbiorcy to:","opts":[{"l":"a)","t":"Permission marketing","c":true},{"l":"b)","t":"Guerrilla marketing","c":false},{"l":"c)","t":"Ambient marketing","c":false},{"l":"d)","t":"Viral marketing","c":false}],"exp":"Permission Marketing (marketing za przyzwoleniem), termin wprowadzony przez Setha Godina. Opiera się na uzyskaniu zgody klienta na otrzymywanie komunikatów, które są dla niego istotne i personalizowane.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":210,"t":"Techniki niskokosztowego przyciągania klientów szczególnie w mediach społecznościowych, pozycjonowanie stron i wywoływanie szybkiej reakcji odbiorców to cechy typowe dla:","opts":[{"l":"a)","t":"Growth hackingu","c":true},{"l":"b)","t":"Ambient marketingu","c":false},{"l":"c)","t":"Permission marketingu","c":false},{"l":"d)","t":"Guerrilla marketingu","c":false}],"exp":"Growth hacking to miks marketingu, analizy danych i inżynierii produktu. Skupia się na znajdowaniu niekonwencjonalnych, tanich i wysoce skalowalnych sposobów na gwałtowny wzrost bazy użytkowników.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":211,"t":"Segmentacja konsumentów / klientów są podstawą:","opts":[{"l":"a)","t":"do oceny kampanii reklamowych","c":false},{"l":"b)","t":"do opracowania strategii marketingowej firmy i strategii marek","c":true},{"l":"c)","t":"do określenia wysokości cen produktów","c":false},{"l":"d)","t":"do określenia właściwej strategii dystrybucji produktów","c":false}],"exp":"Bez segmentacji (podziału rynku na grupy) nie da się precyzyjnie określić, do kogo kierujemy produkt (Targeting) i jak chcemy być postrzegani (Positioning) -- to model STP.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":212,"t":"Bilans jest:","opts":[{"l":"a)","t":"Zestawieniem majątku oraz źródeł jego finansowania na określony dzień","c":true},{"l":"b)","t":"Zestawieniem przychodów i kosztów na określony dzień","c":false},{"l":"c)","t":"Dokumentem, którego sporządzenie nie jest wymagane jeśli spółka poniosła stratę","c":false},{"l":"d)","t":"Zestawieniem wpływów i wydatków pieniężnych na określony dzień","c":false}],"exp":"Bilans to \"zdjęcie\" kondycji firmy. Pokazuje, co firma posiada (Aktywa) oraz skąd wzięła na to pieniądze (Pasywa: kapitał własny i zobowiązania) .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":213,"t":"Rachunek zysków i strat składa się m.in. z pozycji:","opts":[{"l":"a)","t":"Koszty finansowe, podatek dochodowy, zobowiązania finansowe","c":false},{"l":"b)","t":"Rozliczenia międzyokresowe kosztów, podatek dochodowy, zobowiązania z tytułu wynagrodzeń","c":false},{"l":"c)","t":"Amortyzacja, wynagrodzenia, koszty finansowe, podatek dochodowy","c":true},{"l":"d)","t":"Środki trwałe, należności, amortyzacja","c":false}],"exp":"Rachunek zysków i strat (RZiS) grupuje wyłącznie przychody i koszty. Pozycje takie jak \"zobowiązania\", \"należności\" czy \"środki trwałe\" to elementy bilansu .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":214,"t":"Spółka zakupiła maszynę 15 marca i przyjęła ją do używania 1 kwietnia. Kiedy najwcześniej może rozpocząć naliczanie amortyzacji?","opts":[{"l":"a)","t":"W dniu zakupu (15 marca)","c":false},{"l":"b)","t":"W miesiącu wystawienia faktury","c":false},{"l":"c)","t":"Nie wcześniej niż po przyjęciu do używania, w kwietniu lub maju, zgodnie z polityką rachunkowości","c":true},{"l":"d)","t":"Od 1 stycznia następnego roku","c":false}],"exp":"Zgodnie z zasadami rachunkowości, amortyzację rozpoczyna się nie wcześniej niż po oddaniu składnika do użytkowania. Zazwyczaj następuje to od miesiąca następnego po przyjęciu do używania, chyba że polityka firmy dopuszcza miesiąc przyjęcia .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":215,"t":"Odpis amortyzacyjny jest kosztem w rachunku zysków i strat, ale NIE jest wydatkiem w okresie naliczenia.","opts":[{"l":"a)","t":"PRAWDA","c":true},{"l":"b)","t":"FAŁSZ","c":false}],"exp":"Amortyzacja to koszt niegotówkowy. Odzwierciedla ona zużycie maszyny (koszt), ale pieniądze \"nie wypływają\" z konta w momencie jej naliczenia -- wypłynęły wcześniej, w momencie zakupu .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":216,"t":"Metoda degresywna amortyzacji jest uzasadniona, gdy:","opts":[{"l":"a)","t":"Środek trwały zużywa się równomiernie","c":false},{"l":"b)","t":"Składnik aktywów generuje największą użyteczność ekonomiczną w początkowym okresie eksploatacji, a jego efektywność lub wydajność technologiczna maleje wraz z upływem czasu","c":true},{"l":"c)","t":"Spółka chce wykazać wyższy zysk na początku","c":false}],"exp":"Metoda degresywna (przyspieszona) zakłada wyższe odpisy na początku użytkowania, kiedy maszyna jest nowa i najbardziej produktywna. Z czasem, gdy efektywność spada, odpisy maleją. Odwrotność: metoda liniowa (stałe odpisy przez cały okres). Nie stosuje się jej gdy zużycie jest równomierne, ani gdy chcemy wykazać wyższy zysk (degresywna daje wyższe koszty na początku = niższy zysk).","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":217,"t":"Która z pozycji stanowi koszt w rachunku zysków i strat?","opts":[{"l":"a)","t":"Wypłata dywidendy","c":false},{"l":"b)","t":"Zakup maszyny produkcyjnej (użytkowanie powyżej 12 miesięcy)","c":false},{"l":"c)","t":"Spłata raty kapitałowej kredytu","c":false},{"l":"d)","t":"Utworzenie odpisu na nieściągalne należności","c":true}],"exp":"Dywidenda to podział zysku, a spłata raty i zakup maszyny to wydatki inwestycyjne lub finansowe. Kosztem w RZiS są odpisy (np. amortyzacyjne lub na należności), które obniżają wynik finansowy .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":218,"t":"EBITDA jest najczęściej interpretowana jako miernik, potencjał do:","opts":[{"l":"a)","t":"osiągnięcia zysku netto","c":false},{"l":"b)","t":"do generowania przepływów pieniężnych z działalności operacyjnej","c":true},{"l":"c)","t":"do kalkulacji wartości rynkowej spółki","c":false},{"l":"d)","t":"do oceny kapitału własnego","c":false}],"exp":"Ponieważ EBITDA wyłącza amortyzację (koszt niepieniężny), jest używana jako szybki wskaźnik tego, ile gotówki \"operacyjnej\" firma jest w stanie wypracować ze swojej podstawowej działalności .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":219,"t":"Utrzymanie wysokich zapasów powoduje przede wszystkim:","opts":[{"l":"a)","t":"Zamrożenie środków finansowych i ograniczenie płynności","c":true},{"l":"b)","t":"Zwiększenie przychodów ze sprzedaży","c":false},{"l":"c)","t":"Obniżenie kosztów magazynowania","c":false},{"l":"d)","t":"Poprawę wskaźnika bieżącej płynności","c":false}],"exp":"Gotówka wydana na towary leżące w magazynie nie może być użyta do opłacenia bieżących zobowiązań, co negatywnie wpływa na płynność .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":220,"t":"Jaka jest zasadnicza różnica merytoryczna między rachunkiem zysków i strat a rachunkiem przepływów pieniężnych?","opts":[{"l":"a)","t":"Nie ma różnicy merytorycznej, gdyż obie kategorie sprawozdawcze służą do pomiaru efektywności ekonomicznej jednostki w tym samym ujęciu czasowym","c":false},{"l":"b)","t":"RZiS opiera się na zasadzie memoriału. Prezentuje dokonania jednostki zgodnie z zasadą współmierności przychodów i kosztów. RPP opiera się na zasadzie kasowej, prezentując realne przepływy strumieni pieniężnych (wpływy i wydatki).","c":true},{"l":"c)","t":"RZiS i RPP są tożsame pod względem prezentowanych transakcji, a różnica wynika jedynie z odmiennej struktury prezentacji danych w bilansie. Oba odnoszą się dokładnie do tych samych transakcji gospodarczych.","c":false}],"exp":"Memoriał (RZiS) rejestruje faktury niezależnie od płatności. Zasada kasowa (Cash Flow) uznaje tylko fizyczny ruch pieniądza na koncie .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":221,"t":"Firma może zbankrutować wykazując zyski w rachunku zysków i strat.","opts":[{"l":"a)","t":"PRAWDA","c":true},{"l":"b)","t":"FAŁSZ","c":false}],"exp":"To tzw. \"śmierć zyskowna\". Firma może mieć świetną sprzedaż (zysk), ale jeśli klienci nie płacą faktur w terminie, zabraknie jej gotówki na prąd, pensje i podatki . 12. W której działalności rachunku przepływów pieniężnych prezentowany jest wydatek na nabycie środka trwałego? - a) Działalność operacyjna - b) Działalność inwestycyjna - c) Działalność finansowa - d) Nie jest ujmowane w RPP","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":222,"t":"W której działalności rachunku przepływów pieniężnych prezentowany jest wydatek na nabycie środka trwałego?","opts":[{"l":"a)","t":"Działalność operacyjna","c":false},{"l":"b)","t":"Działalność inwestycyjna","c":true},{"l":"c)","t":"Działalność finansowa","c":false},{"l":"d)","t":"Nie jest ujmowane w RPP","c":false}],"exp":"Zakup maszyn, budynków czy licencji to inwestycja w majątek trwały, dlatego trafia do sekcji inwestycyjnej przepływów .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":223,"t":"Spłata kredytu bankowego i wypłata dywidendy ujmowane są w rachunku przepływów pieniężnych w działalności:","opts":[{"l":"a)","t":"Działalność operacyjna","c":false},{"l":"b)","t":"Działalność inwestycyjna","c":false},{"l":"c)","t":"Działalność finansowa","c":true},{"l":"d)","t":"Spłata kredytów finansowej, dywidenda w operacyjnej","c":false}],"exp":"Obie te czynności dotyczą relacji z \"dostarczycielami kapitału\" (bankami i właścicielami), co stanowi rdzeń działalności finansowej w Cash Flow.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":224,"t":"Spółka technologiczna Lumina Solutions S.A. osiągnęła rekordowy, 45-procentowy wzrost zysku netto, ale analiza rachunku przepływów wykazała ujemne operacyjne przepływy pieniężne oraz znaczący spadek gotówki. Która odpowiedź najlepiej identyfikuje przyczynę tej rozbieżności?","opts":[{"l":"a)","t":"Sytuacja ta sugeruje błąd w sprawozdawczości, ponieważ zgodnie z zasadą ciągłości i memoriału, długofalowy wzrost zysku netto musi być w każdym okresie skorelowany z dodatnim wpływem środków pieniężnych.","c":false},{"l":"b)","t":"Rozbieżność ta wynika z faktu, że zysk netto jest kategorią memoriałową, a jego dynamiczny wzrost przy jednoczesnym drenażu gotówki może być efektem gwałtownej ekspansji, objawiającej się wysokim wzrostem zapotrzebowania na kapitał obrotowy netto, np. poprzez wydłużenie terminów płatności dla kontrahentów (wzrost należności) lub masowe gromadzenie zapasów przed sezonem sprzedażowym.","c":true},{"l":"c)","t":"Główną przyczyną jest prawdopodobnie zmiana polityki amortyzacyjnej na metodę degresywną, co pozwoliło spółce na wykazanie wyższego zysku netto przy jednoczesnym zatrzymaniu gotówki w przedsiębiorstwie na cele inwestycyjne.","c":false},{"l":"d)","t":"Opisany scenariusz wskazuje jednoznacznie na dokonanie przez spółkę wykupu akcji własnych przy użyciu gotówki, co w strukturze bilansu automatycznie konwertuje zysk netto na kapitał rezerwowy, omijając rachunek przepływów pieniężnych.","c":false}],"exp":"To klasyczny problem \"overtradingu\". Firma rośnie tak szybko, że cała gotówka zostaje zamrożona w należnościach od klientów i nowych zapasach, mimo że na papierze (w RZiS) generuje wysokie zyski .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":225,"t":"W sytuacji, gdy spółka raportuje wysoką rentowność przy jednoczesnym krytycznym niedoborze płynności (ujemne przepływy), które działania CFO powinny otrzymać najwyższy priorytet?","opts":[{"l":"a)","t":"Zwiększenie wolumenu zakupów materiałowych i towarowych w celu zabezpieczenia przyszłej sprzedaży i wykorzystania efektu skali.","c":false},{"l":"b)","t":"Wstrzymanie wszystkich płatności dla dostawców.","c":false},{"l":"c)","t":"Optymalizacja cyklu konwersji gotówki poprzez upłynnienie zapasów nierotujących, intensyfikację procesów windykacyjnych, renegocjację terminów płatności z kluczowymi dostawcami oraz wdrożenie finansowania faktur.","c":true},{"l":"d)","t":"Rekomendacja wypłaty dywidendy dla akcjonariuszy, aby utrzymać zaufanie inwestorów i zasygnalizować dobrą kondycję wynikową spółki.","c":false}],"exp":"CFO musi \"odmrozić\" pieniądze uwięzione w aktywach obrotowych. Optymalizacja cyklu konwersji gotówki pozwala na szybsze odzyskanie środków z rynku bez konieczności brania drogich kredytów .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":226,"t":"W procesie restrukturyzacji płynności finansowej, które z poniższych działań niesie za sobą najwyższe ryzyko operacyjne oraz reputacyjne i powinno być unikane?","opts":[{"l":"a)","t":"Renegocjacja warunków kredytu kupieckiego poprzez wnioskowanie o wydłużenie terminów płatności u kluczowych dostawców.","c":false},{"l":"b)","t":"Outsourcing procesów windykacyjnych do wyspecjalizowanego podmiotu zewnętrznego w celu zdyscyplinowania spływu należności od dłużników.","c":false},{"l":"c)","t":"Jednostronne i całkowite wstrzymanie regulowania zobowiązań handlowych bez uprzedniej komunikacji z kontrahentami.","c":true},{"l":"d)","t":"Dywersyfikacja źródeł finansowania obrotowego poprzez wdrożenie usług faktoringu.","c":false}],"exp":"Nagłe odcięcie płatności bez rozmów z dostawcami niszczy zaufanie rynkowe, może prowadzić do natychmiastowego wstrzymania dostaw i zgłoszenia wniosku o upadłość przez wierzycieli .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":227,"t":"Spółka CloudStream S.A., lider w branży dostarczania oprogramowania w modelu subskrypcyjnym, wykazuje w swoim bilansie po stronie pasywów pozycję „Rozliczenia międzyokresowe przychodów\" w kwocie 142,5 mln zł. Która z poniższych kategorii oraz związany z nią proces ekonomiczny jest najprawdopodobniej odzwierciedlony w tej pozycji?","opts":[{"l":"a)","t":"Skumulowane koszty kampanii pozyskania użytkowników, które spółka zamierza rozliczyć w czasie, aby dopasować je do cyklu życia klienta.","c":false},{"l":"b)","t":"Środki pieniężne otrzymane od klientów z tytułu opłaconych z góry rocznych abonamentów, które zgodnie z zasadą memoriału zostaną rozpoznane jako przychód dopiero w momentach faktycznego świadczenia usługi w przyszłych okresach.","c":true},{"l":"c)","t":"Należności od kontrahentów z tytułu wystawionych faktur za wdrożenia systemów, w przypadku których termin płatności został odroczony o więcej niż 12 miesięcy w celu stymulowania sprzedaży.","c":false},{"l":"d)","t":"Rezerwy na restrukturyzację działu wsparcia technicznego, utworzone zgodnie z zasadą ostrożności, w celu pokrycia przyszłych zobowiązań wobec zwalnianych pracowników.","c":false}],"exp":"Jeśli firma otrzymuje gotówkę za usługę, której jeszcze nie wykonała (np. abonament za rok z góry), nie może jej od razu wpisać w przychody w RZiS. Pieniądze te widnieją w bilansie jako zobowiązanie (rozliczenie międzyokresowe przychodów) do czasu faktycznego świadczenia usługi.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":228,"t":"Pozycja bilansu „Czynne rozliczenia międzyokresowe kosztów\" prezentowana w aktywach spółki Smart sp. z o.o. reprezentuje:","opts":[{"l":"a)","t":"Nakłady poniesione, które zostaną zaliczone w koszty operacyjne w okresach przyszłych.","c":true},{"l":"b)","t":"Przychody ze sprzedaży towarów i usług otrzymane od klientów.","c":false},{"l":"c)","t":"Bieżące zobowiązania handlowe wobec dostawców.","c":false},{"l":"d)","t":"Przychody finansowe z tytułu niezrealizowanych dodatnich różnic kursowych.","c":false}],"exp":"Są to wydatki, które firma już poniosła, ale dotyczą one przyszłych okresów (np. zapłacone z góry ubezpieczenie biura na cały rok lub prenumerata). Są aktywami, ponieważ stanowią korzyść do wykorzystania w przyszłości.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":229,"t":"Grupa Kapitałowa Meridian SE w bilansie na koniec roku obrotowego wykazała pozycję „Wartość firmy\" w wysokości 85,0 mln EUR, podczas gdy w roku poprzednim pozycja ta opiewała na kwotę 110,5 mln EUR. W badanym okresie spółka nie dokonała zbycia żadnych udziałów ani zorganizowanych części przedsiębiorstwa. Które z poniższych wyjaśnień najpełniej uzasadnia tę zmianę?","opts":[{"l":"a)","t":"Spadek kursu akcji spółki na giełdzie oraz pogorszenie nastrojów inwestorów.","c":false},{"l":"b)","t":"Spółka przeprowadziła coroczny test na utratę wartości, co wymusiło dokonanie odpisu aktualizującego.","c":true},{"l":"d)","t":"Kwota 25,5 mln EUR została przeklasyfikowana z wartości firmy do wartości niematerialnych i prawnych o określonym czasie użytkowania (np. licencji i patentów).","c":false}],"exp":"„Wartość firmy\" (Goodwill) nie podlega zwykłej amortyzacji, ale musi być co roku sprawdzana pod kątem utraty wartości (test na utratę wartości). Jeśli przewidywane zyski z przejętego wcześniej podmiotu spadły, firma musi dokonać odpisu.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":230,"t":"Spółka Smart sp. z o.o. raportuje w danym okresie stratę ze sprzedaży na poziomie minus 31,7 mln zł, wykazując jednocześnie dodatnie przepływy pieniężne z działalności operacyjnej w wysokości 77 mln zł. Które z poniższych uzasadnień najlepiej wyjaśnia tę rozbieżność?","opts":[{"l":"a)","t":"Wynik finansowy i przepływy operacyjne muszą być zbieżne, zatem opisana sytuacja wskazuje na istotny błąd w agregacji danych finansowych w sprawozdaniu z przepływów pieniężnych.","c":false},{"l":"b)","t":"Strata zawiera istotne koszty niepieniężne, takie jak amortyzacja, która koryguje wynik in plus w RPP. Dodatkowo, dodatnie przepływy mogą wynikać z korzystnych zmian w kapitale obrotowym netto, np. wzrostu zobowiązań wobec dostawców.","c":true},{"l":"c)","t":"Dodatnie przepływy operacyjne są efektem otrzymania bezzwrotnej dotacji rządowej na pokrycie strat, która w rachunku zysków i strat jest prezentowana w sekcji „Pozostałe przychody operacyjne\".","c":false},{"l":"D)","t":"dodatnie przepływy pieniężne z działalności operacyjnej wynikają bezpośrednio z otrzymanych dywidend od spółek zależnych","c":false}],"exp":"To klasyczna różnica między memoriałem a kasą. Firma może mieć stratę przez wysoką amortyzację (która nie zabiera gotówki) oraz poprawić swój stan kasy, po prostu zwlekając z płatnościami dla dostawców (wzrost zobowiązań).","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":231,"t":"W sprawozdaniu finansowym spółki Smart sp. z o.o. odnotowano wzrost kapitału zakładowego o 4 mln zł oraz wzrost kapitału zapasowego o 17,2 mln zł. Jednocześnie wpływy z emisji udziałów w rachunku przepływów pieniężnych wyniosły 4 mln zł. Jakie jest najbardziej prawdopodobne źródło zwiększenia kapitału zapasowego?","opts":[{"l":"a)","t":"Wzrost kapitału zapasowego jest bezpośrednim efektem dodatnich przepływów pieniężnych z działalności operacyjnej","c":false},{"l":"b)","t":"Z nadwyżki ceny emisyjnej nad nominalną","c":false},{"l":"c)","t":"Z przeszacowania środków trwałych","c":false},{"l":"d)","t":"Wzrost kapitału zapasowego wynika z zatrzymania zysku netto wypracowanego w roku obrotowym 20xx który na mocy uchwały Zgromadzenia Wspólników o podziale zysku, został przeznaczony na kapitał zapasowy","c":true}],"exp":"Skoro wpływy z emisji (4 mln zł) pokrywają się idealnie tylko ze wzrostem kapitału zakładowego, to agio (nadwyżka) nie wystąpiło . W tej sytuacji jedynym logicznym źródłem tak dużego wzrostu kapitału zapasowego (17,2 mln zł) jest przeksięgowanie zysku z lat ubiegłych na kapitał zapasowy.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":232,"t":"Spółka dokonuje emisji 50 000 udziałów o wartości nominalnej 10 zł każdy, przy ustalonej cenie emisyjnej na poziomie 45 zł za udział. W jaki sposób operacja ta powinna zostać odzwierciedlona w bilansie po zarejestrowaniu podwyższenia kapitału?","opts":[{"l":"a)","t":"Zwiększenie kapitału podstawowego o kwotę 2 250 000 zł, stanowiącą iloczyn liczby wyemitowanych akcji oraz ich ceny emisyjnej","c":false},{"l":"b)","t":"Rozpoznanie przychodu z działalności finansowej w kwocie 2 250 000 zł w rachunku zysków i strat","c":false},{"l":"c)","t":"Zwiększenie kapitału podstawowego o 500 000 zł oraz zwiększenie kapitału zapasowego o 1 750 000 zł z tytułu nadwyżki ceny emisyjnej nad wartością nominalną","c":true},{"l":"d)","t":"Zwiększenie kapitału podstawowego o 500 000 zł, natomiast pozostała kwota powinna zostać ujęta jako zobowiązanie wobec udziałowców","c":false}],"exp":"Kapitał zakładowy (podstawowy) zawsze rejestruje się według wartości nominalnej (50000×10=500000 zł). Nadwyżka ceny emisyjnej nad nominalną (50000×35 zł agio =1750000 zł) trafia obowiązkowo na kapitał zapasowy.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":233,"t":"Walne Zgromadzenie Akcjonariuszy spółki Orion Logistics S.A. zatwierdziło sprawozdanie finansowe za rok ubiegły, wykazujące zysk netto w wysokości 1,5 mln EUR. Podjęto uchwałę o podziale tej kwoty: 1,0 mln EUR przeznaczono na wypłatę dywidendy, a pozostałą część na zwiększenie kapitału zapasowego. Jaki bezpośredni wpływ na wynik finansowy netto bieżącego okresu ma ta operacja?","opts":[{"l":"a)","t":"Decyzja ta spowoduje spadek wyniku finansowego netto bieżącego roku o kwotę 1,0 mln EUR, ponieważ dywidenda stanowi koszt finansowy obciążający rachunek zysków i strat w momencie jej wypłaty.","c":false},{"l":"b)","t":"Operacja ta nie ma żadnego wpływu na wynik finansowy netto bieżącego okresu, ponieważ podział zysku jest przesunięciem w ramach składowych kapitału własnego i nie stanowi kosztu w rozumieniu rachunkowości.","c":true},{"l":"c)","t":"Wynik netto bieżącego okresu ulegnie zmniejszeniu jedynie o wartość naliczonych odsetek od niewypłaconych jeszcze transz dywidendy.","c":false}],"exp":"Podział zysku (dywidenda) odbywa się \"pod kreską\". Nie jest to koszt operacyjny ani finansowy, więc nie obniża zysku netto w roku, w którym jest wypłacany -- jest to po prostu rozdysponowanie już zarobionych pieniędzy","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":234,"t":"Spółka wykazuje w bilansie ujemną wartość kapitałów własnych. Jakie są bezpośrednie konsekwencje tej sytuacji w świetle przepisów Kodeksu spółek handlowych?","opts":[{"l":"a)","t":"Zarząd powinien niezwłocznie zwołać Zgromadzenie Wspólników w celu podjęcia uchwały dotyczącej dalszego istnienia spółki","c":true},{"l":"b)","t":"jest to sytuacja niewymagająca podejmowania dodatkowych króków, o ile spółka zachowuje płynność bieżącą","c":false}],"exp":"Zgodnie z KSH, jeżeli bilans wykaże stratę przewyższającą sumę kapitałów zapasowego i rezerwowych oraz połowę kapitału zakładowego, zarząd ma obowiązek zwołać wspólników, aby zdecydowali o przyszłości firmy (kontynuacja czy likwidacja) .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":235,"t":"W toku badania sprawozdania finansowego audytor zidentyfikował istotne rozbieżności między zyskiem brutto a podstawą opodatkowania podatkiem dochodowym od osób prawnych. Która z poniższych sytuacji jest typową przyczyną powstania takich różnic?","opts":[{"l":"a)","t":"Opóźnienia w spływie należności od kontrahentów","c":false},{"l":"b)","t":"Ujęcie w księgach oszacowanej rezerwy na przewidywane odszkodowania","c":true},{"l":"c)","t":"Opóźnienia w zapłacie zobowiązań wobec dostawców o 30 dni","c":false}],"exp":"Rezerwy są kosztem księgowym (obniżają zysk brutto), ale zazwyczaj nie są kosztem uzyskania przychodu (KUP) w sensie podatkowym do czasu ich faktycznego wykorzystania . Opóźnienia w płatnościach (a, c) wpływają na płynność, ale nie na samą różnicę zysk vs podstawa opodatkowania.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":236,"t":"Spółka wykazuje w rachunku zysków i strat stratę brutto za dany rok obrotowy. Czy na tej podstawie można jednoznacznie stwierdzić, że podmiot ten nie będzie zobowiązany do zapłaty podatku dochodowego za ten okres?","opts":[{"l":"a)","t":"Nie. Strata finansowa nie przesądza o braku podatku.","c":true},{"l":"b)","t":"Nie. Ostateczna wysokość zobowiązania podatkowego zależy wyłącznie od salda przepływów pieniężnych.","c":false},{"l":"c)","t":"Tak. Ujemny wynik finansowy brutto automatycznie oznacza brak podstawy opodatkowania.","c":false}],"exp":"Można mieć stratę bilansową (księgową), a jednocześnie wykazać dochód podatkowy, jeśli wiele poniesionych kosztów nie jest uznawanych przez urząd skarbowy za koszty uzyskania przychodu (tzw. NKUP) .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":237,"t":"Czy prawdziwe jest twierdzenie, że wskaźnik EBIT stanowi sumę zysku operacyjnego oraz zysku z działalności finansowej?","opts":[{"l":"a)","t":"Prawda","c":false},{"l":"b)","t":"Fałsz","c":true}],"exp":"EBIT (Earnings Before Interest and Taxes) to po prostu zysk operacyjny. Nie zawiera on wyników z działalności finansowej (odsetek), ponieważ z definicji jest to zysk przed ich uwzględnieniem .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":238,"t":"Spółka Ritua sp. z o.o. planuje sprzedaż produktu A w cenie 25,00 zł za jednostkę. Koszt zmienny wytworzenia jednostki wynosi 20,00 zł, a całkowite koszty stałe spółki to 70 000,00 zł, planowany zysk 50 000,00 zł. Oblicz, jaką ilość produktu A spółka musi sprzedać, aby zrównać przychody i koszty.","opts":[{"l":"a)","t":"15 000 sztuk","c":false},{"l":"b)","t":"14 000 sztuk","c":true},{"l":"c)","t":"10 000 sztuk","c":false},{"l":"d)","t":"24 000 sztuk","c":false}],"exp":"Pytanie dotyczy Prógu Rentowności (BEP), czyli sytuacji, w której zysk wynosi 0 (ignorujemy planowany zysk 50 000 zł). \\ Wzór: Koszty Stałe / (Cena - Koszt Zmienny). \\ Obliczenie: 70 000 / (25 - 20) = 70 000 / 5 = 14 000 sztuk.","inPdf":false,"inDocx":true,"cdocx":2,"sciaga":true},{"id":239,"t":"Na dzień 31 grudnia 20xx kapitał własny spółki Alleok sp. z o.o. wynosił 900 000,00 zł. W kolejnym roku obrotowym spółka wypracowała zysk netto w wysokości 300 000,00 zł, podjęła uchwałę o wypłacie dywidendy dla wspólników w kwocie 100 000,00 zł oraz zaciągnęła długoterminowy kredyt bankowy w wysokości 500 000,00 zł. Oblicz wartość kapitału własnego spółki na dzień 31 grudnia kolejnego roku.","opts":[{"l":"a)","t":"1 100 000,00 zł","c":true},{"l":"b)","t":"900 000,00 zł","c":false},{"l":"c)","t":"1 600 000,00 zł","c":false},{"l":"d)","t":"1 200 000,00 zł","c":false}],"exp":"Kapitał własny zmienia się o zysk netto i dywidendy. Kredyt jest zobowiązaniem (kapitałem obcym) i nie zwiększa kapitału własnego. Obliczenie: 900000 (początek) +300000 (zysk) −100000 (dywidenda) =1100000 zł .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":240,"t":"W spółce Alleok sp. z o.o. w miesiącu styczniu 20xx r. zaewidencjonowano wymienione poniżej operacje gospodarcze. Na podstawie przedstawionych danych oblicz wynik finansowy brutto spółki. ------------------------------------------------------------------------ Lp. Wyszczególnienie operacji Kwota (zł) ------- ---------------------------------------------------- ----------- 1. Przychody netto ze sprzedaży produktów i usług 400 000,00 2. Wpływ zaliczek od kontrahentów na rachunek bieżący 250 000,00 3. Koszty ze sprzedaży 100 000,00 4. Amortyzacja 100 000,00 5. Koszty wynagrodzeń 150 000,00 6. Spłata raty kapitałowo-odsetkowej kredytu bankowego 150 000,00 w -- odsetki od kredytu bankowego 20 000,00 tym: 7. Odpis aktualizujący wartość zapasów 30 000,00 ------------------------------------------------------------------------","opts":[{"l":"a)","t":"250 000,00 zł","c":false},{"l":"b)","t":"30 000,00 zł","c":false},{"l":"c)","t":"-150 000,00 zł","c":false},{"l":"d)","t":"0,00 zł","c":true}],"exp":"Wynik brutto firmy Alleok w styczniu: Przychody − koszty operacyjne − koszty finansowe. Zaliczki od klientów NIE są przychodem. Odsetki to koszt finansowy. Obliczenie analogiczne do firm Hoffen i Zora.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":241,"t":"Wskaż poprawną definicję oraz sposób kalkulacji marży pokrycia (ang. contribution margin) w ujęciu wartościowym:","opts":[{"l":"a)","t":"Jest to nadwyżka przychodów ze sprzedaży nad całkowitymi kosztami stałymi przedsiębiorstwa","c":false},{"l":"b)","t":"Jest to nadwyżka przychodów ze sprzedaży nad kosztami zmiennymi","c":true},{"l":"c)","t":"Jest to stosunek wyniku finansowego brutto do przychodów netto ze sprzedaży produktów","c":false}],"exp":"Marża pokrycia to kwota, która pozostaje ze sprzedaży po pokryciu wszystkich kosztów zmiennych, a która służy do pokrycia kosztów stałych i wypracowania zysku.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":242,"t":"Analityk finansowy bada sprawozdanie spółki Biuro Projektowe sp. z o.o. za rok obrotowy 20xx. Dane z rachunku zysków i strat oraz rachunku przepływów pieniężnych prezentują się następująco:","opts":[{"l":"a)","t":"Spółka znajduje się w fazie intensywnego rozwoju. Ujemne przepływy operacyjne są naturalne przy ponoszeniu straty, a dodatnie przepływy inwestycyjne świadczą o mądrym zarządzaniu nadwyżkami majątkowymi. Finansowanie zewnętrzne w pełni zabezpiecza przyszłość firmy, zatem nie ma potrzeby rewizji dotychczasowej strategii.","c":false},{"l":"b)","t":"Sytuacja finansowa spółki jest krytyczna i wskazuje na nieuchronną upadłość. Jednoczesne wystąpienie straty netto oraz ujemnych przepływów operacyjnych przy sprzedaży majątku oznacza, że model biznesowy trwale utracił rentowność i jedynym rozwiązaniem jest likwidacja podmiotu bez dalszej analizy.","c":false},{"l":"c)","t":"Spółka generuje straty na poziomie operacyjnym i nie jest w stanie finansować się z wypracowanej gotówki. Dodatni wpływ z działalności inwestycyjnej sugeruje upłynnianie aktywów, a wpływ z działalności finansowej wskazuje na zwiększenie zadłużenia lub dokapitalizowanie. Taka konfiguracja (-, +, +) jest sygnałem ostrzegawczym, wymagającym głębokiej analizy porównawczej z latami ubiegłymi oraz weryfikacji strategii przetrwania.","c":true},{"l":"d)","t":"Ujemny wynik netto przy ujemnych przepływach operacyjnych jest sytuacją przejściową, wynikającą wyłącznie z wysokich odpisów amortyzacyjnych. Ponieważ suma wpływów z inwestycji i finansowania pokrywa połowę straty, kondycja płynnościowa spółki nie budzi żadnych zastrzeżeń analityka.","c":false}],"exp":"Układ przepływów (-, +, +) jest typowy dla firm w fazie kryzysu lub restrukturyzacji. Firma nie zarabia na podstawowej działalności, więc musi sprzedawać majątek (inwestycje na plus) i brać kredyty (finansowe na plus), aby utrzymać płynność.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":243,"t":"Poniżej przedstawiono uproszczony bilans spółki 4You sp. z o.o. sporządzony na dzień 31.12.2019 r. oraz 31.12.2018 r. Zarząd spółki jest zaniepokojony gwałtownym spadkiem poziomu gotówki, mimo wypracowania zysku netto wyższego o 30% w stosunku do roku ubiegłego. Na podstawie powyższych danych wybierz najbardziej merytoryczną rekomendację analityczną dla Zarządu: -------------------------------------------------------------------------- Aktywa 2019 2018 Pasywa 2019 2018 (zł) (zł) (zł) (zł) --------------- -------- -------- ---------------------- -------- -------- Aktywa trwałe 35 000 3 000 Kapitał Własny 51 000 25 000 Aktywa obrotowe 37 000 32 000 Kapitał zakładowy 5 000 5 000 -- Zapasy 15 000 2 000 Wynik z lat ubiegłych 20 000 0,00 -- Należności 20 000 5 000 Wynik finansowy 26 000 20 000 -- Gotówka 2 000 25 000 Zobowiązania 21 000 10 000 krótkoterm. Aktywa 72 35 Pasywa razem 72 35 razem 000 000 000 000 --------------------------------------------------------------------------","opts":[{"l":"a)","t":"Sytuacja finansowa spółki jest bardzo dobra, ponieważ zysk netto wzrósł o 30%. Spadek gotówki jest zjawiskiem wtórnym i nie wymaga podejmowania działań naprawczych. Zarząd powinien kontynuować dotychczasową strategię sprzedaży.","c":false},{"l":"b)","t":"Spółka dynamicznie zwiększyła skalę działania, co przełożyło się na wzrost zysku, jednak nastąpiło pogorszenie jakości płynności finansowej. Rekomenduje się pilną weryfikację polityki zarządzania zapasami oraz należnościami. Należy zbadać wiekowanie należności oraz rotację magazynu. Istnieje ryzyko utraty płynności, gdyż środki pieniężne są na krytycznie niskim poziomie, a zobowiązania wobec dostawców wzrosły dwukrotnie.","c":true},{"l":"c)","t":"Główną przyczyną braku gotówki jest nadmierna spłata zobowiązań wobec dostawców. Rekomenduje się natychmiastowe wstrzymanie wszelkich płatności do kontrahentów do czasu, aż firma odzyska należności od klientów. Dodatkowo należy sprzedać środki trwałe, aby sfinansować bieżącą działalność operacyjną.","c":false}],"exp":"Wybrana odpowiedź b trafnie diagnozuje problem \"overtradingu\" -- firma rośnie, ale gotówka zostaje uwięziona w zapasach i należnościach, co przy jednoczesnym wzroście długów u dostawców (zobowiązań) stwarza realne ryzyko bankructwa mimo raportowanego zysku .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":244,"t":"Spółka DriveWay Solutions, lider wynajmu krótkoterminowego i carsharingu, w roku obrotowym 2025 odnotowała stratę netto w wysokości 12 mln zł. Jednocześnie, ku zaskoczeniu akcjonariuszy, stan środków pieniężnych na rachunkach spółki wzrósł o 25 mln zł w porównaniu do roku ubiegłego. Spółka nie zaciągała w tym czasie nowych kredytów ani nie emitowała akcji. Która z poniższych analiz najlepiej wyjaśnia mechanizm finansowy, który doprowadził do współistnienia straty księgowej i dodatnich przepływów pieniężnych w tym modelu biznesowym?","opts":[{"l":"a)","t":"Główną przyczyną jest dokonanie przez spółkę aktualizacji wyceny posiadanej floty samochodowej do ich wyższej wartości rynkowej (zgodnie z modelem przeszacowania). Operacja ta spowodowała nagły napływ gotówki na rachunki bankowe spółki.","c":false},{"l":"b)","t":"Dodatnie saldo gotówki jest efektem wypracowania przez spółkę wysokiej marży brutto na sprzedaży, która została jednak skonsumowana w rachunku zysków i strat przez spłatę rat kapitałowych kredytów inwestycyjnych.","c":false},{"l":"c)","t":"Wzrost poziomu gotówki przy jednoczesnej stracie wynika z drastycznego wydłużenia terminów płatności dla klientów (wzrost należności). Dzięki temu, że klienci płacą później, spółka może wykazywać stratę w rachunku wyników.","c":false},{"l":"d)","t":"Spółka weszła w fazę restrukturyzacji floty. Wstrzymała zakupy nowych pojazdów, jednocześnie sprzedając dużą partię aut używanych, co wygenerowało wysoki dodatni Cash Flow z działalności inwestycyjnej. Strata netto wynika z faktu, że przychody operacyjne z wynajmu spadły poniżej progu rentowności (wysokie koszty stałe i odsetki), a zysk ze sprzedaży aut nie zrównoważył strat na podstawowej działalności.","c":true}],"exp":"Odpowiedź d jako jedyna logicznie tłumaczy przyrost gotówki bez zewnętrznego finansowania (kredytów/emisji). Firma po prostu upłynniła swój majątek (samochody), co w Rachunku Przepływów Pieniężnych pojawia się jako duży wpływ w sekcji inwestycyjnej, mimo że operacyjnie biznes przynosi straty.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":245,"t":"EBIT to suma zysku operacyjnego oraz finansowego:","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"EBIT (Earnings Before Interest and Taxes) to zysk operacyjny. Twierdzenie, że obejmuje on zysk finansowy (odsetki), jest błędne, ponieważ z definicji jest to wynik przed ich uwzględnieniem. 9 ......można interpretować jako miernik przepływów pieniężnych z działalności operacyjnej: - a) EBIT - b) EBITDA","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":246,"t":"Spółka Zora sp. z o.o. ma plan sprzedać produkt A za 25,00 zł, którego koszt zmienny wynosi 20,00 zł. Koszty stałe spółki 70.000,00 zł. Jaką ilość produktu A spółka powinna sprzedać, aby osiągnąć zysk 50.000,00 zł.","opts":[{"l":"a)","t":"15 000","c":false},{"l":"b)","t":"14 000","c":false},{"l":"c)","t":"24 000","c":true},{"l":"d)","t":"10 000","c":false}],"exp":"BEP = Koszty stałe / Marża jednostkowa = 70.000 / (25−20) = 14.000 sztuk. Identyczne z Q171 — to samo pytanie z innym sformułowaniem.","inPdf":false,"inDocx":true,"cdocx":2,"sciaga":true},{"id":247,"t":"Audyt zwrócił uwagę na różnice między wynikiem finansowym brutto a podstawą do opodatkowania podatkiem dochodowym. Różnice mogą wynikać z:","opts":[{"l":"a)","t":"braku wpłaty od Klientów","c":false},{"l":"b)","t":"braku zapłaty dostawcom","c":false},{"l":"c)","t":"oszacowanej rezerwy na odszkodowania","c":true},{"l":"d)","t":"zakupu towaru do magazynu","c":false}],"exp":"Różnice między zyskiem bilansowym a podatkowym wynikają z faktu, że niektóre koszty księgowe (jak szacunkowe rezerwy) nie są uznawane za koszty uzyskania przychodu (KUP) do czasu ich faktycznej realizacji .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":248,"t":"Wynik finansowy to stan gotówki w Rachunku Przepływów Pieniężnych:","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"Wynik finansowy (zysk/strata) jest liczony metodą memoriałową (według wystawionych faktur), natomiast stan gotówki w Cash Flow liczony jest metodą kasową (według realnych wpływów i płatności na koncie) . To dwa zupełnie inne parametry.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":249,"t":"Która interpretacja poniższego Rachunku Przepływów Pieniężnych jest najbardziej prawdopodobna:","opts":[{"l":"a)","t":"wymiana środków trwałych (być może wdrożenie nowych technologii), niedobór środków z działalności operacyjnej może wpłynąć negatywnie na rozwój spółki, potencjalnie brak możliwości spłaty zaciągniętego zadłużenia","c":false},{"l":"b)","t":"są perspektywy na przyszłość, niedobór środków z działalności operacyjnej firma pokrywa ze środków pozyskanych z zewnętrznych źródeł finansowania, stara się inwestować w rozwój spółki","c":false},{"l":"c)","t":"dodatnie przepływy z działalności operacyjnej umożliwiają inwestycje oraz spłatę zaciągniętych zobowiązań finansowych, dobre warunki dla rozwoju firmy","c":true}],"exp":"Spółka zarabia na swojej podstawowej działalności (operacyjna na plus). Dzięki temu ma gotówkę na zakupy nowych maszyn/technologii (inwestycyjna na minus) oraz na spłatę kredytów lub wypłatę dywidend (finansowa na minus). To klasyczny model zdrowej, dojrzałej firmy.","inPdf":false,"inDocx":true,"cdocx":2,"sciaga":false},{"id":250,"t":"Która interpretacja poniższego Wyniku Finansowego oraz Rachunku Przepływów Pieniężnych jest najbardziej prawdopodobna:","opts":[{"l":"a)","t":"Firma poniosła stratę oraz nie wygenerowała dodatnich przepływów pieniężnych z działalności operacyjnej. Na szczęście otrzymała finansowanie zewnętrzne więc nie ma powodów do zmartwień. Z wyprzedanego majątku spółka będzie mogła spłacić częściowo zadłużenie więc sytuacja się polepszy. Nie ma przesłanek do analizy lat poprzednich oraz weryfikacji strategii i planów na kolejne lata.","c":false},{"l":"b)","t":"Firma poniosła stratę oraz nie wygenerowała dodatnich przepływów pieniężnych z działalności operacyjnej, zadłużyła się. Prawdopodobnie wyprzedaje majątek spółki. Na podstawie wyników jednego roku trudno jednoznacznie wyciągnąć wnioski, ale to może oznaczać trudności w spółce. Wymaga analizy lat poprzednich oraz weryfikacji strategii i planów na kolejne lata.","c":true},{"l":"c)","t":"Firma poniosła stratę oraz nie wygenerowała dodatnich przepływów pieniężnych z działalności operacyjnej, zadłużyła się. Wyprzedaje majątek spółki. Spółka powinna zostać zamknięta.","c":false}],"exp":"Spółka znajduje się w bardzo trudnej sytuacji (-, +, +). Nie tylko przynosi stratę księgową (wynik netto), ale przede wszystkim \"przepala\" gotówkę na bieżącej działalności (operacyjna na minus). Aby przeżyć, musi wyprzedawać posiadane aktywa (inwestycyjna na plus) i zaciągać nowe długi (finansowa na plus). Taki stan jest alarmujący i wymaga natychmiastowej rewizji strategii .","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":251,"t":"Podatek od towarów i usług (VAT) z faktury sprzedaży prezentowany jest w:","opts":[{"l":"a)","t":"bilansie","c":true},{"l":"b)","t":"rachunku zysków i strat","c":false},{"l":"c)","t":"bilansie i rachunku zysków i strat","c":false}],"exp":"VAT jest neutralny dla wyniku firmy (nie jest kosztem ani przychodem). Jest jedynie zobowiązaniem wobec urzędu skarbowego lub należnością od niego, dlatego widnieje w bilansie.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":252,"t":"Podatek dochodowy od osób prawnych (CIT) prezentowany jest w:","opts":[{"l":"a)","t":"bilansie","c":false},{"l":"b)","t":"rachunku zysków i strat","c":false},{"l":"c)","t":"bilansie i rachunku zysków i strat","c":true}],"exp":"CIT obniża zysk netto (RZiS) oraz pojawia się w bilansie jako zobowiązanie wobec budżetu państwa, dopóki nie zostanie zapłacony.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":253,"t":"Zakup towaru do magazynu w grudniu 2021 obciąży wynik roku 2021 (brak sprzedaży). Prawda czy fałsz?","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"Zgodnie z zasadą współmierności, koszt zakupu towaru obciąża wynik finansowy (pojawia się w Rachunku Zysków i Strat) dopiero w momencie jego sprzedaży (jako Wartość Sprzedanych Towarów). Sam zakup bez sprzedaży to jedynie zamiana jednego składnika aktywów (gotówki) na inny (zapasy) w bilansie, co nie wpływa na zysk ani stratę.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false}];
let filt='all',ql=[],qi=0,sc=[0,0],ans=false;
function gf(){
  const s=document.getElementById('sr').value.toLowerCase();
  return DB.filter(q=>{
    const fm=filt==='all'||(filt==='sc'&&q.sciaga)||(filt==='nosc'&&!q.sciaga)||(filt==='both'&&q.inPdf&&q.inDocx)||(filt==='pdf-only'&&q.inPdf&&!q.inDocx)||(filt==='docx-only'&&q.inDocx&&!q.inPdf);
    if(!fm)return false;
    if(!s)return true;
    if(String(q.id).includes(s))return true;
    if(q.t.toLowerCase().includes(s))return true;
    if(q.exp&&q.exp.toLowerCase().includes(s))return true;
    return q.opts.some(o=>o.t.toLowerCase().includes(s));
  });
}
function sf(f,el){filt=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');render();}
function srcH(q){
  let h='';
  if(q.sciaga)h+='<span class="bd b-sc">📋 ściąga</span><br>';
  if(q.inPdf&&q.inDocx){h+='<span class="bd b-both">🔥 PDF+DOCX</span>';if(q.cdocx>1)h+='<br><span class="bd b-cnt">×'+q.cdocx+'</span>';}
  else if(q.inPdf)h+='<span class="bd b-pdf">PDF</span>';
  else{h+='<span class="bd b-docx">DOCX</span>';if(q.cdocx>1)h+='<br><span class="bd b-cnt">×'+q.cdocx+'</span>';}
  return h;
}
function render(){
  const rows=gf();
  document.getElementById('cnt').textContent='Wyniki: '+rows.length;
  const tb=document.getElementById('tb');
  const no=document.getElementById('no');
  if(!rows.length){tb.innerHTML='';no.style.display='block';return;}
  no.style.display='none';
  let html='';
  rows.forEach(q=>{
    const opts=q.opts.map(o=>`<li class="${o.c?'cor':''}"><span class="lb">${o.l}</span><span class="tx">${o.c?'✓ ':''}${o.t}</span></li>`).join('');
    html+=`<tr><td class="nc">${q.id}</td><td><div class="qt">${q.t}</div><ul class="ol">${opts}</ul></td><td class="src-sc">${srcH(q)}</td></tr>`;
    if(q.sciaga)html+=`<tr><td colspan="3" class="sc-td">Odpowiedź wynika ze ściągi</td></tr>`;
    if(q.exp)html+=`<tr><td colspan="3" class="exp-td">${q.exp}</td></tr>`;
  });
  tb.innerHTML=html;
}
function startQ(){ql=gf().sort(()=>Math.random()-.5);qi=0;sc=[0,0];ans=false;document.getElementById('qov').classList.add('on');showCard();}
function showCard(){
  if(qi>=ql.length){
    document.getElementById('qq').textContent='Koniec! Wynik: '+sc[0]+'/'+ql.length;
    ['qm','qo','qbs','qbn','qexp','qscn'].forEach(id=>{const el=document.getElementById(id);if(el){el.innerHTML='';el.style.display='none';el.classList.remove('on');}});
    document.getElementById('qpf').style.width='100%';return;
  }
  const q=ql[qi];ans=false;
  document.getElementById('qpr').textContent=(qi+1)+' / '+ql.length;
  document.getElementById('qpf').style.width=Math.round(qi/ql.length*100)+'%';
  let meta='#'+q.id;
  if(q.sciaga)meta+=' 📋 ZE ŚCIĄGI';
  if(q.inPdf&&q.inDocx)meta+=' 🔥 PDF+DOCX';
  else if(q.inDocx)meta+=' [DOCX]';else meta+=' [PDF]';
  document.getElementById('qm').textContent=meta;
  document.getElementById('qq').textContent=q.t;
  document.getElementById('qexp').classList.remove('on');
  document.getElementById('qexp').textContent=q.exp||'';
  const scn=document.getElementById('qscn');
  scn.style.display=q.sciaga?'block':'none';
  document.getElementById('qbs').style.display='inline-block';
  document.getElementById('qbn').style.display='none';
  document.getElementById('qok').textContent='✓ '+sc[0];document.getElementById('qno').textContent='✗ '+sc[1];
  document.getElementById('qo').innerHTML=q.opts.map((o,i)=>`<li onclick="pick(this,${o.c?'true':'false'},${i})">${o.l} ${o.t}</li>`).join('');
}
function pick(el,correct,idx){
  if(ans)return;ans=true;
  const q=ql[qi];
  document.querySelectorAll('#qo li').forEach((li,i)=>{if(q.opts[i].c)li.classList.add('ok');else if(i===idx)li.classList.add('bad');});
  if(correct)sc[0]++;else sc[1]++;
  document.getElementById('qok').textContent='✓ '+sc[0];document.getElementById('qno').textContent='✗ '+sc[1];
  if(q.exp)document.getElementById('qexp').classList.add('on');
  document.getElementById('qbs').style.display='none';document.getElementById('qbn').style.display='inline-block';
}
function showAns(){
  if(ans)return;ans=true;
  const q=ql[qi];
  document.querySelectorAll('#qo li').forEach((li,i)=>{if(q.opts[i].c)li.classList.add('ok');});
  if(q.exp)document.getElementById('qexp').classList.add('on');
  document.getElementById('qbs').style.display='none';document.getElementById('qbn').style.display='inline-block';
}
function nextQ(){qi++;showCard();}
function exitQ(){document.getElementById('qov').classList.remove('on');}
render();
</script>
