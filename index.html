<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baza pytań MBA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a2e}
.hdr{background:#1a1a2e;color:#fff;padding:11px 15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
.hdr h1{font-size:14px;font-weight:700;flex-shrink:0}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
.pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:all .15s;white-space:nowrap}
.p-all{background:#3d4466;color:#fff}.p-all.on,.p-all:hover{background:#5a61a0}
.p-sc{background:#1a6a1a;color:#fff}.p-sc.on,.p-sc:hover{background:#2a9a2a}
.p-nosc{background:#8a3300;color:#fff}.p-nosc.on,.p-nosc:hover{background:#c05010}
.p-both{background:#7a3300;color:#fff}.p-both.on,.p-both:hover{background:#b05010}
.p-pdf{background:#1a4a8a;color:#fff}.p-pdf.on,.p-pdf:hover{background:#2060bb}
.p-docx{background:#0d4a25;color:#fff}.p-docx.on,.p-docx:hover{background:#155a30}
.ctrl{background:#fff;padding:8px 15px;border-bottom:1px solid #dde;display:flex;gap:7px;flex-wrap:wrap;align-items:center;position:sticky;top:45px;z-index:19;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ctrl input{padding:5px 9px;border:1px solid #ccc;border-radius:6px;font-size:12px;width:220px}
.btn-q{padding:5px 12px;background:#7a3300;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700}
.btn-q:hover{background:#b05010}
.cnt{font-size:11px;color:#888;margin-left:auto}
.tw{padding:10px 15px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
th{background:#1a1a2e;color:#fff;padding:7px 9px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap}
td{padding:7px 9px;vertical-align:top;border-bottom:.5px solid #ebebeb;font-size:12px}
tr:nth-child(even) td{background:#f8f9fb}
tr:hover td{background:#eef3ff}
.nc{width:28px;text-align:center;font-weight:700;color:#666;font-size:11px}
.qt{font-weight:600;color:#1a1a2e;margin-bottom:3px;line-height:1.4}
.ol{list-style:none;margin-top:3px}
.ol li{padding:2px 0;display:flex;gap:5px;align-items:baseline;line-height:1.35}
.lb{font-weight:700;color:#888;flex-shrink:0;font-size:11px;min-width:20px}
.tx{flex:1}
.cor{background:#e6f7ed;border-radius:3px;padding:1px 4px}
.cor .lb{color:#0a3d1e}
.cor .tx{color:#0a3d1e;font-weight:700}
.exp-td{background:#fffbf0;padding:4px 9px 6px 40px;font-size:11px;color:#555;font-style:italic;line-height:1.45;border-bottom:.5px solid #ebebeb}
.exp-td::before{content:"💡 ";font-style:normal}
.sc-td{background:#e8f8e8;padding:4px 9px 4px 40px;font-size:10px;color:#1a5a1a;border-bottom:.5px solid #ebebeb;font-weight:700}
.sc-td::before{content:"📋 Ze ściągi ";font-style:normal}
.src-sc{white-space:nowrap;vertical-align:top;padding:7px 9px}
.bd{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 5px;border-radius:7px;margin:1px 0;line-height:1.3;white-space:nowrap}
.b-pdf{background:#ddeeff;color:#1a4a8a;border:1px solid #99bbdd}
.b-docx{background:#ddeedc;color:#0d4a25;border:1px solid #88cc99}
.b-both{background:#ffe8d0;color:#7a3300;border:1px solid #f5a060}
.b-cnt{background:#c8e8c8;color:#0a3a1a;border:1px solid #66aa66;font-size:9px}
.b-sc{background:#c8eec8;color:#1a5a1a;border:1px solid #55bb55}
.no{text-align:center;padding:40px;color:#aaa;font-size:14px}
.qov{display:none;position:fixed;inset:0;background:#f0f2f5;z-index:100;overflow-y:auto;padding:14px}
.qov.on{display:block}
.qwrap{max-width:660px;margin:0 auto}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.qpb{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:12px}
.qpf{height:4px;background:#7a3300;border-radius:2px;transition:width .3s}
.qcard{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1);padding:18px 20px}
.qm{font-size:11px;color:#aaa;margin-bottom:3px}
.qq{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:12px;line-height:1.5}
.qopts{list-style:none;margin-bottom:4px}
.qopts li{padding:7px 10px;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:5px;cursor:pointer;font-size:12px;transition:all .15s;line-height:1.4}
.qopts li:hover{background:#f0f4ff;border-color:#aab}
.qopts li.ok{background:#e6f7ed;border-color:#3dba6e;color:#0a3d1e;font-weight:700}
.qopts li.bad{background:#fff0f0;border-color:#e05050;color:#a02020;text-decoration:line-through}
.qexp{background:#fffbf0;border:1px solid #f0d090;border-radius:6px;padding:8px 11px;font-size:11px;color:#555;font-style:italic;line-height:1.5;margin-top:8px;display:none}
.qexp.on{display:block}
.qexp::before{content:"💡 ";font-style:normal}
.qsc-note{background:#e8f8e8;border:1px solid #88cc88;border-radius:6px;padding:5px 11px;font-size:10px;color:#1a5a1a;font-weight:700;margin-top:5px}
.qsc-note::before{content:"📋 Odpowiedź dostępna na ściądze! "}
.qbtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.qb{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700}
.qb-s{background:#1a1a2e;color:#fff}
.qb-n{background:#7a3300;color:#fff}
.qb-e{background:#fff;color:#555;border:1px solid #ccc}
.qscore{display:flex;gap:8px;font-size:12px}
.sok{background:#e6f7ed;color:#0a3d1e;padding:4px 10px;border-radius:5px;font-weight:700}
.sno{background:#fff0f0;color:#a02020;padding:4px 10px;border-radius:5px;font-weight:700}
</style>
</head>
<body>
<div class="hdr">
  <h1>📚 MBA (253 pyt.)</h1>
  <div class="pills">
    <span class="pill p-all on" onclick="sf('all',this)">Wszystkie (253)</span>
    <span class="pill p-sc" onclick="sf('sc',this)">📋 Ze ściągi (134)</span>
    <span class="pill p-nosc" onclick="sf('nosc',this)">❌ Bez ściągi (119)</span>
    <span class="pill p-both" onclick="sf('both',this)">🔥 PDF+DOCX (54)</span>
    <span class="pill p-pdf" onclick="sf('pdf-only',this)">PDF (114)</span>
    <span class="pill p-docx" onclick="sf('docx-only',this)">DOCX (85)</span>
  </div>
</div>
<div class="ctrl">
  <input type="text" id="sr" placeholder="🔍 Szukaj..." oninput="render()">
  <button class="btn-q" onclick="startQ()">▶ Fiszki</button>
  <span class="cnt" id="cnt"></span>
</div>
<div class="tw">
  <table>
    <thead><tr><th>#</th><th>Pytanie + odpowiedzi + uzasadnienie</th><th>Źródło</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div class="no" id="no" style="display:none">Brak wyników.</div>
</div>
<div class="qov" id="qov">
  <div class="qwrap">
    <div class="qtop">
      <strong style="font-size:14px">Tryb fiszek</strong>
      <div class="qscore"><span class="sok" id="qok">✓ 0</span><span class="sno" id="qno">✗ 0</span></div>
      <button class="qb qb-e" onclick="exitQ()">✕</button>
    </div>
    <div class="qpb"><div class="qpf" id="qpf"></div></div>
    <div style="font-size:11px;color:#888;text-align:center;margin-bottom:8px" id="qpr"></div>
    <div class="qcard">
      <div class="qm" id="qm"></div>
      <div class="qq" id="qq"></div>
      <ul class="qopts" id="qo"></ul>
      <div class="qsc-note" id="qscn" style="display:none"></div>
      <div class="qexp" id="qexp"></div>
      <div class="qbtns">
        <button class="qb qb-s" id="qbs" onclick="showAns()">Pokaż odpowiedź</button>
        <button class="qb qb-n" id="qbn" onclick="nextQ()" style="display:none">Następne →</button>
      </div>
    </div>
  </div>
</div>
<script>
const DB=[{"id":1,"t":"Aktywa to składniki majątku, które:","opts":[{"l":"a)","t":"są kontrolowane przez jednostkę","c":false},{"l":"b)","t":"powstają w wyniku przeszłych zdarzeń","c":false},{"l":"c)","t":"spowodują w przyszłości wpływ korzyści ekonomicznych","c":false},{"l":"d)","t":"wszystkie powyższe","c":true}],"exp":"To klasyczna definicja aktywów. Muszą być one efektem przeszłych działań (np. zakupu), firma musi mieć nad nimi kontrolę (niekoniecznie własność prawną, np. leasing finansowy) i muszą one \"zarabiać\" dla firmy w przyszłości.","inPdf":true,"inDocx":true,"cdocx":3,"sciaga":true},{"id":2,"t":"Miernik stopy zwrotu z kapitału stałego to:","opts":[{"l":"a)","t":"ROA","c":false},{"l":"b)","t":"ROI","c":false},{"l":"c)","t":"ROCE","c":true}],"exp":"Skrót ROCE oznacza Return on Capital Employed. \"Capital Employed\" to właśnie kapitał stały, czyli suma kapitału własnego i zobowiązań długoterminowych. Mierzy on, jak efektywnie firma wykorzystuje wszystkie swoje długoterminowe źródła finansowania.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":3,"t":"ROI to wskaźnik, który określa:","opts":[{"l":"a)","t":"jaka część przychodów to zysk","c":false},{"l":"b)","t":"poziom przychodów, przy których pokrywane są koszty","c":false},{"l":"c)","t":"jaka część zysku operacyjnego została wygenerowana z kapitału stałego","c":false},{"l":"d)","t":"zysk z zainwestowanej kwoty","c":true}],"exp":"Skrót ROI oznacza Return on Investment. Jest to uniwersalna miara opłacalności, która mówi nam prostym językiem: \"ile groszy zysku dostanę z każdej zainwestowanej złotówki","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":4,"t":"Bilans:","opts":[{"l":"a)","t":"zestawienie przychodów i kosztów za dany okres","c":false},{"l":"b)","t":"zestawienie majątku oraz źródeł finansowania","c":true},{"l":"c)","t":"można nie sporządzać jeśli spółka poniosła stratę","c":false}],"exp":"Bilans to zestawienie aktywów (majątku) i pasywów (kapitałów i zobowiązań) na dany dzień. Punkt 'a' opisuje rachunek zysków i strat.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":5,"t":"Rachunek zysków i strat: składa się m.in. z pozycji:","opts":[{"l":"a)","t":"koszty finansowe, podatek dochodowy, zobowiązania finansowe (to mix bilansu i rachunku)","c":false},{"l":"b)","t":"rozliczenia międzyokresowe kosztów, podatek dochodowy, zobowiązania z tytułu wynagrodzeń (to bilans)","c":false},{"l":"c)","t":"składa się m.in. z pozycji: amortyzacji, wynagrodzeń, kosztów finansowych","c":true}],"exp":"Kluczowe jest odróżnienie RZiS od Bilansu. \\\"Zobowiązania\\\" to kategoria bilansowa (Pasywa), więc punkty a i b odpadają.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":6,"t":"Uregulowanie należności przez dłużnika oznacza:","opts":[{"l":"a)","t":"brak zmiany w ogólnej wartości aktywów","c":true},{"l":"b)","t":"zwiększenie przychodów","c":false},{"l":"c)","t":"zwiększenie aktywów","c":false}],"exp":"Jest to operacja przesunięcia w ramach aktywów (tzw. operacja aktywna). Maleją \"Należności\", a o tę samą kwotę rosną \"Środki pieniężne\". Suma aktywów pozostaje bez zmian.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":7,"t":"EBIT to suma zysku operacyjnego oraz finansowego","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"EBIT (Earnings Before Interest and Taxes) to po polsku po prostu zysk operacyjny. Nie sumuje się go z wynikiem finansowym (odsetkami), bo on jest liczony przed ich uwzględnieniem.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":8,"t":"...można interpretować jako miernik przepływów pieniężnych z działalności operacyjnej:","opts":[{"l":"a)","t":"EBIT","c":false},{"l":"b)","t":"EBITDA","c":true}],"exp":"EBITDA dodaje do zysku operacyjnego amortyzację (koszt niegotówkowy). Dzięki temu lepiej przybliża faktyczną ilość gotówki generowanej przez \\\"rdzeń\\\" biznesu.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":9,"t":"Zarząd podjął decyzję o zmianie okresu amortyzacji prawa autorskiego. W roku 2022 odpis amortyzacyjny zwiększyłby się o 300.000,00 zł:","opts":[{"l":"a)","t":"Zarząd nie może podejmować takich decyzji","c":false},{"l":"b)","t":"nie ma to wpływu na EBITDA","c":true},{"l":"c)","t":"EBITDA zwiększy się o 300.000,00 zł","c":false},{"l":"d)","t":"EBITDA zmniejszy się o 300.000,00 zł","c":false}],"exp":"EBITDA jest liczona przed amortyzacją. Zmiana wysokości odpisu amortyzacyjnego wpływa na zysk operacyjny (EBIT), ale nie zmienia wartości EBITDA .","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":10,"t":"Która z następujących pozycji jest kosztem:","opts":[{"l":"a)","t":"wypłata dywidendy","c":false},{"l":"b)","t":"inwestycja w nowe urządzenia (pow. 12 miesięcy)","c":false},{"l":"c)","t":"spłata raty kapitałowej kredytu","c":false},{"l":"d)","t":"rezerwa z tytułu oszacowanej nieściągalności należności od Klienta","c":true}],"exp":"Rezerwy i odpisy aktualizujące to koszty księgowe obniżające wynik. Inwestycje, spłaty kredytów i dywidendy to wydatki gotówkowe (przepływy), ale nie koszty operacyjne .","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":11,"t":"Utrzymanie wysokich zapasów powoduje:","opts":[{"l":"a)","t":"zamrożenie środków finansowych","c":true},{"l":"b)","t":"wysokie koszty nabycia","c":false},{"l":"c)","t":"wypływ gotówki","c":false}],"exp":"Zapasy są składnikiem majątku, za który firma już zapłaciła, ale który jeszcze nie został sprzedany. Im więcej towaru leży w magazynie, tym mniej gotówki firma ma na koncie do bieżącego wykorzystania.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":12,"t":"Chcąc poprawić stan płynności finansowej organizacji należy:","opts":[{"l":"a)","t":"przyspieszyć płatności dostawcom","c":false},{"l":"b)","t":"stworzyć rezerwy na należności nieściągalne","c":false},{"l":"c)","t":"zwiększyć rotację zapasów","c":true}],"exp":"Zwiększenie rotacji zapasów oznacza szybszą sprzedaż towaru. Dzięki temu gotówka \"uwięziona\" w magazynie szybciej wraca do kasy firmy, co bezpośrednio poprawia płynność.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":13,"t":"Spółka Zora sp. z o.o. — jaką ilość produktu A spółka powinna sprzedać, aby osiągnąć zysk 50.000,00 zł? (cena 25 zł, kv 20 zł, koszty stałe 70.000 zł)","opts":[{"l":"a)","t":"15 000","c":false},{"l":"b)","t":"14 000","c":false},{"l":"c)","t":"24 000","c":true},{"l":"d)","t":"10 000","c":false}],"exp":"BEP z zyskiem: (Koszty stałe + planowany zysk) / marża jednostkowa = (70.000 + 50.000) / (25−20) = 120.000/5 = 24.000 sztuk.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":14,"t":"Na 31 grudnia 2019 r. kapitał własny firmy Pandemio sp. z o.o. wynosił 900.000 zł. W roku 2020: wynik netto +300.000, dywidenda -100.000, kredyt bankowy 500.000. Ile wynosi kapitał własny na 31.12.2020?","opts":[{"l":"a)","t":"1 600 000,00","c":false},{"l":"b)","t":"1 200 000,00","c":false},{"l":"c)","t":"1 100 000,00","c":true},{"l":"d)","t":"900 000,00","c":false}],"exp":"Kapitał własny zmienia się tylko o wynik netto i dywidendy (nie o kredyt!). 900.000 + 300.000 − 100.000 = 1.100.000 zł. Kredyt bankowy to zobowiązanie (pasywa), nie wpływa na kapitał własny.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":15,"t":"W firmie Hoffen sp. z o.o. w styczniu 2022 r. Ile wynosi wynik brutto? (Przychody 400k, zaliczki 250k, koszty 100k, amortyzacja 100k, wynagrodzenia 150k, splata kredytu 50k w tym odsetki 20k, odpis zapasów 30k)","opts":[{"l":"a)","t":"250 000,00","c":false},{"l":"b)","t":"30 000,00","c":false},{"l":"c)","t":"-150 000,00","c":false},{"l":"d)","t":"0,00","c":true}],"exp":"Wynik brutto = Przychody − Koszty. Zaliczki od klientów i odsetki od kredytu 20.000 zł wchodzą w koszty finansowe. Trzeba wyodrębnić co jest kosztem a co przepływem gotówki.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":16,"t":"Audyt zwrócił uwagę na różnicę między wynikiem finansowym brutto a podstawą do opodatkowania podatkiem dochodowym. Różnice mogą wynikać z:","opts":[{"l":"a)","t":"braku wpłaty od Klientów","c":false},{"l":"b)","t":"braku zapłaty dostawcom","c":false},{"l":"c)","t":"oszacowanej rezerwy na odszkodowania","c":true},{"l":"d)","t":"zakupu towaru do magazynu","c":false}],"exp":"Różnice przejściowe między wynikiem księgowym a podatkowym powstają m.in. z rezerw (np. na odszkodowania) — są kosztem księgowym, ale nie podatkowym (NKUP). Brak wpłaty od klienta czy zapłaty do dostawcy to różnice w bilansie, nie w podstawie opodatkowania.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":17,"t":"Spółka, w rachunku zysków i strat roku 2021, wykazuje stratę. Na tej podstawie można stwierdzić, że:","opts":[{"l":"a)","t":"spółka zapłaci podatek dochodowy za rok 2021","c":false},{"l":"b)","t":"spółka nie zapłaci podatku dochodowego za rok 2021","c":false},{"l":"c)","t":"żadne z powyższych","c":true}],"exp":"Strata księgowa nie oznacza automatycznie braku podatku . Jeśli firma ma dużo kosztów, które nie są uznawane przez urząd skarbowy (NKUP), może się okazać, że mimo straty w księgach, ma dochód podatkowy do opodatkowania.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":18,"t":"Spółka Zora sp. z o.o. BEP — ile sztuk produktu A spółka powinna sprzedać, aby zrównać przychody i koszty? (cena 25 zł, kv 20 zł, koszty stałe 70.000, planowany zysk 50.000)","opts":[{"l":"a)","t":"15 000","c":false},{"l":"b)","t":"14 000","c":true},{"l":"c)","t":"24 000","c":false},{"l":"d)","t":"10 000","c":false}],"exp":"BEP = Koszty stałe / marża jednostkowa = 70.000 / (25−20) = 70.000/5 = 14.000 sztuk. Planowany zysk ignorujemy przy BEP.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":19,"t":"Czym jest marża pokrycia (contribution margin)?","opts":[{"l":"a)","t":"jest to marża, którą liczymy przez odjęcie kosztów stałych od przychodów","c":false},{"l":"b)","t":"jest to marża, którą liczymy przez odjęcie kosztów zmiennych oraz kosztów stałych od przychodów","c":false},{"l":"c)","t":"jest to marża, którą liczymy przez odjęcie kosztów zmiennych od przychodów","c":true}],"exp":"Marża pokrycia to kwota, która pozostaje ze sprzedaży po pokryciu kosztów zmiennych. Służy ona w pierwszej kolejności do pokrycia kosztów stałych, a dopiero nadwyżka ponad te koszty stanowi zysk operacyjny firmy.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":20,"t":"Cechą charakterystyczną kosztów zmiennych jest to, że wraz ze wzrostem wolumenu koszt jednostkowy (w przeliczeniu na jedną sztukę):","opts":[{"l":"a)","t":"rośnie","c":false},{"l":"b)","t":"jest stały","c":true},{"l":"c)","t":"spada","c":false}],"exp":"Całkowite koszty zmienne rosną proporcjonalnie do skali produkcji, ale koszt zmienny na jedną sztukę (np. ilość mąki potrzebna do upieczenia jednej bułki) pozostaje taki sam, niezależnie od tego, czy produkujemy 100, czy 10 000 sztuk .","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":21,"t":"Każdy wydatek jest kosztem:","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"Wydatek to fizyczny wypływ gotówki z kasy lub konta (np. zakup działki czy spłata raty kredytu), natomiast koszt to zużycie zasobów w celu osiągnięcia przychodu (np. amortyzacja sprzętu). Można mieć duży wydatek, który nie jest kosztem, i na odwrót.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":22,"t":"Która z następujących pozycji jest wypływem gotówki:","opts":[{"l":"a)","t":"amortyzacja","c":false},{"l":"b)","t":"rezerwa z tytułu odszkodowania","c":false},{"l":"c)","t":"spłata raty kapitałowej kredytu","c":true},{"l":"d)","t":"odpis aktualizujący wartość nieściągalnych należności","c":false}],"exp":"Amortyzacja, rezerwy i odpisy to tzw. koszty niepieniężne -- obniżają one zysk na papierze, ale pieniądze fizycznie nie znikają z konta w momencie ich naliczenia . Jedynie spłata raty kredytu powoduje realne zmniejszenie stanu gotówki.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":23,"t":"Przedsiębiorstwo traci płynność, gdy:","opts":[{"l":"a)","t":"przez kolejne 3 lata wykazuje stratę","c":false},{"l":"b)","t":"koszty są wyższe niż przychody","c":false},{"l":"c)","t":"przedsiębiorstwo w sposób trwały nie jest w stanie regulować swoich zobowiązań","c":true},{"l":"d)","t":"saldo zobowiązań w bilansie jest wyższe niż saldo należności w bilansie","c":false}],"exp":"Płynność to zdolność do regulowania bieżących długów (płacenia pensji, faktur, podatków). Firma może mieć straty przez lata (np. startupy), ale dopóki ma gotówkę na opłacenie rachunków, zachowuje płynność .","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":24,"t":"Wynik finansowy to stan gotówki Rachunku Przepływów Pieniężnych:","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"FAŁSZ. Wynik finansowy (zysk/strata) to kategoria memoriałowa — ujmuje przychody i koszty bez względu na przepływ gotówki. RPP pokazuje rzeczywiste wpływy i wydatki pieniężne. Można mieć zysk bez gotówki (np. sprzedaż na kredyt) i gotówkę przy stracie (np. amortyzacja).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":25,"t":"Która interpretacja RPP jest najbardziej prawdopodobna? (spółka Tea: operacyjne +115.000, inwestycyjne -92.043, finansowe -706.000)","opts":[{"l":"a)","t":"wymiana środków trwałych, niedobór środków z działalności operacyjnej może wpłynąć negatywnie na rozwój spółki, potencjalnie brak możliwości spłaty zaciągniętego zadłużenia","c":false},{"l":"b)","t":"są perspektywy na przyszłość, niedobór środków z działalności operacyjnej firma pokrywa ze środków pozyskanych z zewnętrznych źródeł finansowania, stara się inwestować w rozwój spółki","c":false},{"l":"c)","t":"dodatnie przepływy z działalności operacyjnej umożliwiają inwestycje oraz spłatę zaciągniętych zobowiązań finansowych, dobre warunki dla rozwoju firmy","c":true}],"exp":"Dodatnie przepływy operacyjne (+115k) przy ujemnych inwestycyjnych (−92k) i finansowych (−706k) = firma zarabia gotówkowo, spłaca długi i inwestuje. To zdrowy model dojrzałej firmy.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":26,"t":"Która interpretacja RPP jest najbardziej prawdopodobna? (spółka ITsol: operacyjne -101.200, inwestycyjne -83.000, finansowe +185.000)","opts":[{"l":"a)","t":"wymiana środków trwałych, niedobór środków z działalności operacyjnej zawsze wpływa negatywnie na rozwój spółki, brak możliwości spłaty zadłużenia","c":false},{"l":"b)","t":"są perspektywy na przyszłość, niedobór środków z działalności operacyjnej firma pokrywa ze środków pozyskanych z zewnętrznych źródeł finansowania, stara się inwestować w rozwój spółki","c":true},{"l":"c)","t":"dodatnie przepływy z działalności operacyjnej umożliwiają inwestycje oraz spłatę zaciągniętych zobowiązań finansowych, dobre warunki dla rozwoju firmy","c":false}],"exp":"Dodatnie przepływy operacyjne (+115k) przy ujemnych inwestycyjnych (−92k) i finansowych (−706k) = firma zarabia gotówkowo, spłaca długi i inwestuje. To zdrowy model dojrzałej firmy.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":27,"t":"Która interpretacja Wyniku Finansowego oraz RPP spółki Biuro jest najbardziej prawdopodobna? (operacyjne -250.000, inwestycyjne +35.000, finansowe +100.000, wynik finansowy netto -300.000)","opts":[{"l":"a)","t":"Firma poniosła stratę oraz nie wygenerowała dodatnich przepływów pieniężnych z działalności operacyjnej. Na szczęście otrzymała finansowanie zewnętrzne więc nie ma powodów do zmartw. Z wyprzedanego majątku spółka będzie mogła spłacić częściowo zadłużenie więc sytuacja się polepszy.","c":false},{"l":"b)","t":"Firma poniosła stratę oraz nie wygenerowała dodatnich przepływów pieniężnych z działalności operacyjnej, zadłużyła się. Prawdopodobnie wyprzedaje majątek spółki. Na podstawie wyników jednego roku trudno jednoznacznie wyciągać wnioski, ale to może oznaczać trudności w spółce. Wymaga analizy lat poprzednich oraz weryfikacji strategii i planów na kolejne lata.","c":true},{"l":"c)","t":"Firma poniosła stratę oraz nie wygenerowała dodatnich przepływów pieniężnych z działalności operacyjnej, zadłużyła się. Wyprzedaje majątek spółki. Spółka powinna zostać zamknięta.","c":false}],"exp":"Strata + ujemne przepływy operacyjne (−250k) + sprzedaż majątku (+35k) + nowe zadłużenie (+100k) = firma wyprzedaje aktywa i zadłuża się żeby przetrwać. Wymaga dokładnej analizy wieloletniej.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":28,"t":"Poniżej uproszczony bilans spółki 4PET sp. z o.o. W porównaniu do roku ubiegłego spółka ma coraz mniej gotówki w bilansie. Proszę wybrać rekomendacje, które zostaną wysłane do Zarządu:","opts":[{"l":"a)","t":"Spółka w stosunku do roku poprzedniego wygenerowała o około 30% większy zysk, nie ma szczególnych rekomendacji. Zarząd powinien się cieszyć z takiego tempa wzrostu.","c":false},{"l":"b)","t":"Spółka w stosunku do roku poprzedniego wygenerowała o około 30% większy zysk. Niemniej jednak należy zwrócić uwagę na zdecydowanie mniejszy stan gotówki na koniec roku 2021. Rekomendacją jest weryfikacja w jaki sposób zarządzane są stoki magazynowe, czy zapasy ze względu na termin przydatności są jeszcze możliwe do sprzedaży. Szczególną uwagę należy zwrócić na wzrost stanu należności w stosunku do roku poprzedniego (polityka zarządzania terminami płatności oraz weryfikacja powodów braku zapłaty należności). Ryzyko poniesienia dodatkowych kosztów związanych z brakiem zapłaty dla dostawców jest wysokie, zatem spółka powinna rozważyć ich spłatę z uwzględnieniem ustalonych terminów w umowach.","c":true},{"l":"c)","t":"Spółka w stosunku do roku poprzedniego wygenerowała o około 30% większy zysk. Zarząd powinien cieszyć się z takiego tempa wzrostu. Niemniej jednak należy zwrócić uwagę na zdecydowanie mniejszy stan gotówki na koniec roku 2021. Rekomendacją jest zwiększenie sprzedaży i zmniejszenie zapasów w magazynie jak najszybciej. Dodatkowo podpisanie umowy z firmą windykacyjną, która ściągnie należności od Klientów. Wstrzymać zapłatę zobowiązań dla dostawców do czasu ściągnięcia należności od Klientów.","c":false}],"exp":"Odpowiedź b jest najbardziej merytoryczna. Choć zysk wzrósł (z 20k do 26k), gotówka drastycznie spadła (z 25k do 2k). Pieniądze zostały \"zamrożone\" w zapasach (wzrost o 13k) i u klientów, którzy nie zapłacili jeszcze faktur (wzrost należności o 15k). To klasyczny scenariusz, w którym zbyt szybki wzrost bez kontroli kapitału obrotowego może doprowadzić firmę do bankructwa, mimo że jest ona rentowna.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":29,"t":"Na podstawie poniższego rachunku zysków i strat spółki Inkjet sp. z o.o. można stwierdzić, że:","opts":[{"l":"a)","t":"najprawdopodobniej spółka ma kredyt lub pożyczkę","c":true},{"l":"b)","t":"za mało danych, żeby wyciągnąć jakiekolwiek wnioski","c":false},{"l":"c)","t":"nie można policzyć EBITDA","c":false}],"exp":"Poprawna jest odpowiedź a, ponieważ w rachunku widnieje pozycja \"Koszty finansowe\" w kwocie 191 000,00 zł. Koszty finansowe to w przeważającej mierze odsetki od zaciągniętych zobowiązań (kredytów, pożyczek lub obligacji). Gdyby spółka finansowała się wyłącznie kapitałem własnym, pozycja ta wynosiłaby 0 lub byłaby nieistotna.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":30,"t":"Symptomami sygnalizującymi utratę płynności są:","opts":[{"l":"a)","t":"nieterminowe płacenie zobowiązań","c":false},{"l":"b)","t":"pogarszająca się sytuacja firmy w porównaniu do innych organizacji","c":false},{"l":"c)","t":"problemy z podejmowaniem decyzji","c":false},{"l":"d)","t":"wszystkie powyższe","c":true}],"exp":"Wszystkie trzy objawy mogą sygnalizować utratę płynności: opóźnienia w płatnościach (brak gotówki), pogorszenie wyników vs. branża, trudności decyzyjne (brak środków = ograniczone opcje).","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":31,"t":"Kapitały własne można zdefiniować jako:","opts":[{"l":"a)","t":"kapitały pozostawione firmie do dyspozycji przez właścicieli","c":true},{"l":"b)","t":"kapitały stanowiące równowartość środków pieniężnych pożyczonych przez podmioty zewnętrzne","c":false},{"l":"c)","t":"wszystkie powyższe","c":false}],"exp":"Kapitał własny to środki wniesione przez udziałowców lub wypracowane przez firmę (zysk zatrzymany). Pożyczki od podmiotów zewnętrznych to kapitał obcy (zobowiązania).","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":32,"t":"Wskaźnik DSO wskazuje:","opts":[{"l":"a)","t":"po ilu dniach firma otrzymuje zapłatę","c":true},{"l":"b)","t":"po ilu dniach firma spłaca zobowiązania","c":false},{"l":"c)","t":"żadne z powyższych","c":false}],"exp":"DSO (Days Sales Outstanding) to cykl inkasa należności. Twoja notatka słusznie wskazuje, że punkt b (spłata zobowiązań) to DPO (Days Payable Outstanding).","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":33,"t":"Wskaźnik ROCE wskazuje:","opts":[{"l":"a)","t":"stopa zwrotu z kapitału własnego","c":false},{"l":"b)","t":"stopa zwrotu z kapitału stałego","c":true},{"l":"c)","t":"efektywność z jaką wykorzystywane są krótkoterminowe kapitały firmy","c":false}],"exp":"ROCE (Return on Capital Employed) mierzy rentowność całości zaangażowanego kapitału długoterminowego (własnego i długu długoterminowego).","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":34,"t":"Wskaźnik obrotu zapasami w dniach wskazuje:","opts":[{"l":"a)","t":"na ile dni wystarczy zapasu","c":false},{"l":"b)","t":"ile razy zapasy zostaną wymienione w ciągu roku","c":false},{"l":"c)","t":"liczbę dni, przez które przechowywane są zapasy","c":true}],"exp":"Ten wskaźnik mówi nam, jak długo średnio towar \"leży\" w magazynie, zanim zostanie sprzedany.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":35,"t":"Obowiązek sporządzenia sprawozdania finansowego wynika z:","opts":[{"l":"a)","t":"ustawy o podatku od towarów i usług","c":false},{"l":"b)","t":"ustawy o podatku dochodowym od osób prawnych","c":false},{"l":"c)","t":"ustawy o rachunkowości","c":true}],"exp":"Obowiązek sporządzania sprawozdania finansowego wynika z Ustawy o rachunkowości z 29 września 1994 r. Ustawa o VAT i CIT regulują kwestie podatkowe, nie sprawozdawczości finansowej.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":36,"t":"Podatek od towarów i usług z faktury sprzedaży prezentowany jest w:","opts":[{"l":"a)","t":"bilansie","c":true},{"l":"b)","t":"rachunku zysków i strat","c":false},{"l":"c)","t":"bilansie i rachunku zysków i strat","c":false}],"exp":"VAT naliczony (do zapłaty) jest zobowiązaniem podatkowym → bilans (pasywa: zobowiązania krótkoterminowe). VAT nie wpływa na przychody w RZiS, bo przychody wykazuje się netto (bez VAT).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":37,"t":"Podatek dochodowy od osób prawnych prezentowany jest w:","opts":[{"l":"a)","t":"bilansie","c":false},{"l":"b)","t":"rachunku zysków i strat","c":false},{"l":"c)","t":"bilansie i rachunku zysków i strat","c":true}],"exp":"CIT obniża zysk netto (RZiS) oraz pojawia się w bilansie jako zobowiązanie wobec budżetu państwa, dopóki nie zostanie zapłacony.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":38,"t":"Przychody ze sprzedaży prezentowane są w rachunku zysków i strat w wysokości:","opts":[{"l":"a)","t":"netto","c":true},{"l":"b)","t":"brutto","c":false}],"exp":"W rachunku zysków i strat zawsze operujemy kwotami netto (bez podatku VAT).","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":39,"t":"Zakup towaru do magazynu w grudniu 2021 (brak sprzedaży). Obciąży wynik roku 2021 — Prawda czy fałsz?","opts":[{"l":"a)","t":"PRAWDA","c":false},{"l":"b)","t":"FAŁSZ","c":true}],"exp":"Zgodnie z zasadą współmierności, koszt zakupu towaru obciąża wynik finansowy (pojawia się w Rachunku Zysków i Strat) dopiero w momencie jego sprzedaży (jako Wartość Sprzedanych Towarów). Sam zakup bez sprzedaży to jedynie zamiana jednego składnika aktywów (gotówki) na inny (zapasy) w bilansie, co nie wpływa na zysk ani stratę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":40,"t":"Czy wydłużenie okresu użytkowania rzeczowego aktywa trwałego spowoduje wzrost EBITDA?","opts":[{"l":"a)","t":"TAK","c":false},{"l":"b)","t":"NIE","c":true}],"exp":"Wydłużenie okresu użytkowania zmniejsza roczny odpis amortyzacyjny. Amortyzacja wpływa na zysk operacyjny (EBIT), ale wskaźnik EBITDA z definicji jest wynikiem przed amortyzacją (Earnings Before Interest, Taxes, Depreciation and Amortization). Zmiana okresu amortyzacji jest zatem dla EBITDA neutralna.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":41,"t":"Policz aktywa netto spółki na podstawie poniższego bilansu: (Aktywa razem 405.000; Kapitał własny 48.800, Zobowiązania i rezerwy 356.200)","opts":[{"l":"Wynik:","t":"Aktywa netto = Aktywa razem − Zobowiązania = 405.000 − 356.200 = 48.800","c":true}],"exp":"Aktywa netto = Aktywa razem − Zobowiązania = 405.000 − 356.200 = 48.800. To odpowiada wartości kapitału własnego w bilansie.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":42,"t":"Najbardziej pomocnym narzędziem w debacie negocjacyjnej jest:","opts":[{"l":"a)","t":"Stosowanie ustępstw","c":true},{"l":"b)","t":"Niezmienność stanowisk","c":false},{"l":"c)","t":"Kłamstwo","c":false},{"l":"d)","t":"Agresywne otwarcie","c":false}],"exp":"Negocjacje to proces wymiany. Strategiczne ustępstwa (\"ustąpię w punkcie A, jeśli Ty ustąpisz w punkcie B\") pozwalają wyjść z impasu i budować porozumienie.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":43,"t":"Źródłem innowacji może być:","opts":[{"l":"a)","t":"Pomyłka","c":false},{"l":"b)","t":"Niespodziewany sukces","c":false},{"l":"c)","t":"Potrzeba usprawnienia procesu","c":false},{"l":"d)","t":"Wszystkie powyższe","c":true}],"exp":"Według Petera Druckera innowacje rzadko biorą się z \"olśnienia\". Najczęściej wynikają z analizy pomyłek, nieoczekiwanych zdarzeń lub wąskich gardeł w procesach.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":44,"t":"Bariery dla innowacji to:","opts":[{"l":"a)","t":"Hierarchia","c":false},{"l":"b)","t":"Postrzeganie zmiany jako zagrożenia","c":false},{"l":"c)","t":"Obserwacja","c":false},{"l":"d)","t":"Prawdziwe a i b","c":true}],"exp":"Bariery dla innowacji wg literatury: hierarchia (decyzje idą górą → wolno), postrzeganie zmiany jako zagrożenia (opór), oraz nadmierne procedury. Obserwacja to NIE bariera — to źródło innowacji.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":45,"t":"Kultura organizacji:","opts":[{"l":"a)","t":"Może doprowadzić firmę do zguby","c":false},{"l":"b)","t":"Może zapewnić firmie rozwój i sukces","c":false},{"l":"c)","t":"Nie ma większego wpływu na losy firmy","c":false},{"l":"d)","t":"Prawdziwe: a i b","c":true}],"exp":"Kultura organizacji może działać jako dźwignia sukcesu lub kotwica ciągnąca w dół. Słynne: 'Culture eats strategy for breakfast' (Drucker). Wpływ na losy firmy jest ogromny — d) łączy a) i b).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":46,"t":"Kultura rynku:","opts":[{"l":"a)","t":"Promuje rywalizację","c":true},{"l":"b)","t":"Zapewnia przewidywalność","c":false},{"l":"c)","t":"Dobra atmosfera liczy się bardziej niż zyski","c":false},{"l":"d)","t":"Przywódca jest sympatycznym demokratą","c":false}],"exp":"Model Camerona i Quinna (CVF): kultura rynku = orientacja na wyniki, rywalizację, udziały rynkowe. Lider = twardy, wymagający. Przeciwieństwo: kultura klanu (ciepło, współpraca).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":47,"t":"Jaka jest różnica pomiędzy scenariuszami kariery Skoczek i Hodowla?","opts":[{"l":"a)","t":"praktycznie nie ma różnicy, opisują to samo zjawisko","c":false},{"l":"b)","t":"pierwszy dotyczy firm właścicielskich, a drugi korporacji","c":false},{"l":"c)","t":"pierwszy jest efektem przypadkowych zdarzeń, drugi wynika z planowania","c":true}],"exp":"Scenariusz „skoczka\" charakteryzuje się częstymi, często niepowiązanymi zmianami miejsc pracy bez jasnego celu. „Hodowla\" (lub kariera planowa) to świadome budowanie kompetencji i pozycji wewnątrz jednej struktury lub branży.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":48,"t":"Wskaż NIEPRAWDZIWE stwierdzenie. Wysoka transparentność — dostępność danych i jawność działania procesów (np. podejmowania decyzji) — ma następujący wpływ na działanie przedsiębiorstw:","opts":[{"l":"a)","t":"zwiększa satysfakcję i zadowolenie pracowników","c":false},{"l":"b)","t":"zwiększa szybkość podejmowania decyzji","c":true},{"l":"c)","t":"zwiększa potencjał na budowanie innowacyjnych rozwiązań","c":false},{"l":"d)","t":"zwiększa lojalność klientów","c":false}],"exp":"Paradoks transparentności: więcej danych i jawności → więcej dyskusji, konsultacji, wątpliwości → wolniejsze decyzje. Natomiast: lepsza satysfakcja pracowników, innowacje i lojalność klientów — to prawda.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":49,"t":"Zgodnie z teorią Michaela Portera warunkiem/warunkami do osiągnięcia wewnętrznego dopasowania łańcucha wartości jest/są:","opts":[{"l":"a)","t":"Upewnienie się, że wszystkie czynności w łańcuchu wartości wykonywane są na najwyższym poziomie efektywności operacyjnej","c":false},{"l":"b)","t":"Upewnienie się, że rezultaty wykonania poszczególnych czynności w łańcuchu nie wymagają korekty na kolejnych jego etapach (tzw. 1+1+1=3)","c":false},{"l":"c)","t":"Zaprojektowanie łańcucha wartości tak, by skopiowanie przez konkurenta jednej lub kilku czynności nie dawało mu porównywalnych efektów końcowych (tzw. unikanie \"jednej kluczowej kompetencji\" na rzecz znaczenia całego łańcucha wartości)","c":false},{"l":"d)","t":"Zaprojektowanie łańcucha wartości dopasowanego wewnętrznie tak by część standardowych czynności można było istotnie ograniczyć lub całkowicie wyeliminować","c":false},{"l":"e)","t":"wszystkie odpowiedzi (a-d)","c":true}],"exp":"Porter: wartość łańcucha wynika z dopasowania (fit) wszystkich jego ogniw. Każda czynność musi wzmacniać inne. Konkurentom trudno skopiować cały system, nawet jeśli skopiują kilka czynności.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":50,"t":"Jakie zmienne powinny być brane pod uwagę przy określaniu wrażliwości klientów na cenę naszego produktu?","opts":[{"l":"a)","t":"Ceny konkurencji, dochody klientów.","c":false},{"l":"b)","t":"Ceny konkurencji, dochody klientów, koniunktura gospodarcza.","c":false},{"l":"c)","t":"Ceny konkurencji, dochody klientów, koniunktura gospodarcza, intensywność komunikacji marketingowej głównego konkurenta.","c":true}],"exp":"Wrażliwość cenowa zależy od: cen substytutów, zamożności klientów (dochody), koniunktury (w kryzysie szukają tańszych opcji) i świadomości alternatyw (marketing konkurencji). Im więcej czynników, tym pełniejszy obraz.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":51,"t":"Jeśli marża na sprzedaży produktu wynosi 10% i rozważamy obniżkę ceny o 6%, to o ile więcej musimy sprzedać?","opts":[{"l":"a)","t":"6% więcej","c":false},{"l":"b)","t":"60% więcej","c":false},{"l":"c)","t":"150% więcej","c":true},{"l":"d)","t":"200% więcej","c":false}],"exp":"Wzór: %wzrost sprzedaży = %obniżki / (marża% − %obniżki) = 6/(10−6) = 6/4 = 1,5 = 150%. Weryfikacja: cena 100→94, marża 10→4, wolumen musi wzrosnąć 2,5× (o 150%) by zachować ten sam zysk.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":52,"t":"Powoływanie się na długotrwałe relacje podczas negocjacji to:","opts":[{"l":"a)","t":"Popularny brudny chwyt","c":false},{"l":"b)","t":"Nic złego","c":false},{"l":"c)","t":"Sytuacja korupcyjna","c":false},{"l":"d)","t":"Ocena zależy od kontekstu kulturowego","c":true}],"exp":"Negocjacje budowane na wieloletnich relacjach mogą być legalną strategią (budowanie zaufania) lub manipulacją (emocjonalny szantaż). Ocena zależy od kontekstu kulturowego — w krajach wschodnich relacje są kluczowe, w zachodnich — często niestosowne.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":53,"t":"Sitting to strategia negocjacyjna:","opts":[{"l":"a)","t":"Polegająca na zadawaniu trudnych pytań","c":false},{"l":"b)","t":"Polegająca na wykorzystywaniu ciszy","c":true},{"l":"c)","t":"Posadzenia strony przeciwnej na niewygodnych krzesłach","c":false},{"l":"d)","t":"Żadna z powyższych","c":false}],"exp":"Choć nazwa brzmi jak \"siedzenie\", w technikach negocjacyjnych odnosi się do \"wysiedzenia\" przeciwnika ciszą, co zmusza go często do zdradzenia dodatkowych informacji lub złożenia nieplanowanego ustępstwa.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":54,"t":"Polityka szkoleniowa firmy powinna opierać się przede wszystkim o:","opts":[{"l":"a)","t":"wizję i cele firmy oraz przewidywane w przyszłości potrzeby kompetencyjne ludzi","c":true},{"l":"b)","t":"analizę oferty szkoleń na rynku","c":false},{"l":"c)","t":"analizę potrzeb i opinii zespołów","c":false},{"l":"d)","t":"sugestie doradców i firm szkoleniowych","c":false}],"exp":"Szkolenia nie są \"prezentem\", ale inwestycją, która ma wspierać realizację strategii firmy (tzw. Strategic HR).","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":55,"t":"Które z poniższych źródeł wiedzy są obarczone największym prawdopodobieństwem błędu?","opts":[{"l":"a)","t":"ankieta osobowościowa","c":false},{"l":"b)","t":"ankiety typu 360 stopni","c":false},{"l":"c)","t":"przeglądy kadrowe","c":false},{"l":"d)","t":"własne wyobrażenie","c":true}],"exp":"Własne wyobrażenie to najbardziej subiektywne źródło — pełne błędów poznawczych (bias potwierdzenia, efekt Dunninga-Krugera). 360°, ankiety osobowości i przeglądy kadrowe są bardziej obiektywne, choć też niedoskonałe.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":56,"t":"Jakie zachowania są charakterystyczne dla managerów najwyższego szczebla w przedsiębiorstwie, w którym od dłuższego czasu narasta kryzys?","opts":[{"l":"a)","t":"Tworzenie lepszych planów strategicznych","c":false},{"l":"b)","t":"Większa wrażliwość na sprawy pracownicze","c":false},{"l":"c)","t":"Więcej czasu spędzanego w firmie","c":false},{"l":"d)","t":"Skrócenie perspektywy: załatwianie spraw doraźnych, zaniedbywanie strategicznych","c":true}],"exp":"To tzw. \"gaszenie pożarów\". W sytuacji kryzysowej liderzy często wpadają w pułapkę operacyjną, tracąc z oczu wizję długoterminową na rzecz przetrwania kolejnego dnia.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":57,"t":"Zarządzanie zmianą, to przede wszystkim:","opts":[{"l":"a)","t":"Zarządzanie ludzkimi ryzykami projektu, aby osiągnąć jego rezultaty biznesowe","c":true},{"l":"b)","t":"Zarządzanie ludzkimi ryzykami projektu, aby osiągnąć zadowolenie docelowych użytkowników rozwiązań","c":false},{"l":"c)","t":"Komunikacja i szkolenia, aby pracownicy mieli pełną wiedzę o zmianie","c":false},{"l":"d)","t":"Wybór i przygotowanie ambasadorów zmian","c":false}],"exp":"Zarządzanie zmianą (Change Management) skupia się na ludziach, nie na technikaliach projektu. Rezultaty biznesowe osiąga się przez zarządzanie oporem, zaangażowaniem i gotowością ludzi — nie przez samą komunikację czy szkolenia.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":58,"t":"Orędownictwo społeczne w praktyce oznacza:","opts":[{"l":"a)","t":"budowanie marki przez firmę w social media","c":false},{"l":"b)","t":"opinie Klientów w świecie digital i omnichannel budują markę","c":true},{"l":"c)","t":"social selling - czyli sprzedaż przez media społecznościowe","c":false}],"exp":"Orędownictwo (Brand Advocacy) polega na tym, że to sami klienci stają się promotorami marki. Ich autentyczne opinie i polecenia w sieci mają dziś większą siłę niż płatne kampanie reklamowe.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":59,"t":"Czym jest insight konsumencki?","opts":[{"l":"a)","t":"korzyścią dla konsumenta, którą marketingowcy określili w rezultacie analizy danych","c":false},{"l":"b)","t":"elementem tożsamości marki","c":false},{"l":"c)","t":"problemem / niezaspokojoną potrzebą konsumenta racjonalną lub emocjonalną","c":true},{"l":"d)","t":"potrzebą emocjonalną konsumenta","c":false}],"exp":"Insight to \"głęboka prawda\" o potrzebach klienta, często nieuświadomiona, która staje się fundamentem dla skutecznej komunikacji marki.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":60,"t":"Segmentacja konsumentów/klientów są podstawą:","opts":[{"l":"a)","t":"do oceny kampanii reklamowych","c":false},{"l":"b)","t":"do opracowania strategii marketingowej firmy i strategii marek","c":true},{"l":"c)","t":"do określenia wysokości cen produktów","c":false},{"l":"d)","t":"do określenia właściwej strategii dystrybucji produktów","c":false}],"exp":"Segmentacja służy do zrozumienia różnych grup klientów i skrojenia do nich strategii marketingowej oraz oferty marki. Nie służy bezpośrednio do oceny kampanii (to metryki) ani ustalania cen.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":61,"t":"Segment klientów, który jest kluczowy dla dyfuzji innowacji produktowej w jej początkowym stadium rozwoju to:","opts":[{"l":"a)","t":"Innovators","c":false},{"l":"b)","t":"Late Majority","c":false},{"l":"c)","t":"Early Majority","c":false},{"l":"d)","t":"Early Adopters","c":true}],"exp":"Choć pierwsi są Innovators, to właśnie Early Adopters (Wcześni Naśladowcy) są kluczowi dla sukcesu rynkowego. Są oni liderami opinii -- jeśli oni zaakceptują produkt, za nimi podąży reszta rynku (Majority).","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":62,"t":"Elastyczność popytu na pewien produkt względem ceny wynosi 0. Co to oznacza w praktyce?","opts":[{"l":"a)","t":"Im większa jest cena, tym produkt lepiej się sprzedaje","c":false},{"l":"b)","t":"Im większa jest cena, tym produkt gorzej się sprzedaje","c":false},{"l":"c)","t":"Sprzedaż produktu jest niezależna od ceny","c":true},{"l":"d)","t":"Niemożliwe jest, aby tu opisana elastyczność była 0","c":false}],"exp":"Jest to tzw. popyt doskonale nieelastyczny (sztywny). Zmiana ceny nie powoduje żadnej zmiany w ilości nabywanego produktu (często dotyczy to dóbr pierwszej potrzeby bez substytutów, np. insuliny). ![perfectly inelastic demand curve, wygenerowane przez AI](media/image1.jpeg){width=\"6.3in\" height=\"6.3in\"} Shutterstock","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":63,"t":"Nowy produkt firmy STOKROTKA S.A. okazał się ogromnym sukcesem i jego sprzedaż rośnie teraz w tempie ponad 20% rocznie. W związku z tym należy spodziewać się że:","opts":[{"l":"a)","t":"Zapotrzebowanie na fundusz obrotowy tej firmy będzie rosnąć","c":true},{"l":"b)","t":"Zapotrzebowanie na fundusz obrotowy tej firmy będzie maleć","c":false},{"l":"c)","t":"Fundusz obrotowy tej firmy będzie rosnąć","c":false},{"l":"d)","t":"Fundusz obrotowy tej firmy będzie maleć","c":false}],"exp":"Rosnąca sprzedaż (>20% rocznie) = rosnące zapasy i należności = rosnące ZKO (zapotrzebowanie na kapitał obrotowy). Im szybciej firma rośnie, tym więcej gotówki 'zamraża' w kapitale obrotowym. Paradoks wzrostu.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":64,"t":"Wewnętrzna stopa zwrotu IRR stanowi:","opts":[{"l":"a)","t":"Taką wartość okresu zwrotu, przy której nakłady poniesione na rozwój produktu są kompensowane przez jego sprzedaż","c":false},{"l":"b)","t":"Taką NPV, przy której współczynnik dyskonta jest zerem","c":false},{"l":"c)","t":"Taką wartość współczynnika aktualizacji, przy której NPV jest równy zero","c":true},{"l":"d)","t":"Taką wartość rentowności firmy, przy której koszty stałe są skompensowane marżami ze sprzedaży produktów","c":false}],"exp":"IRR to taka stopa dyskontowa, przy której NPV = 0 (obecna wartość wpływów = obecna wartość nakładów). Jeśli IRR > WACC → projekt opłacalny.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":65,"t":"Firma spodziewa się w przyszłym roku jednorazowego wpływu gotówki w wysokości 15.000 złotych. Ile wynosiłaby wartość zaktualizowana tej kwoty — przy założeniu współczynnika aktualizacji równego 0,5?","opts":[{"l":"a)","t":"60 000 złotych","c":false},{"l":"b)","t":"15 000 złotych","c":false},{"l":"c)","t":"10 000 złotych","c":false},{"l":"d)","t":"7 500 złotych","c":true}],"exp":"Wartość zaktualizowana = Kwota × Współczynnik aktualizacji = 15.000 × 0,5 = 7.500 zł. Współczynnik 0,5 jest już podany wprost (nie trzeba liczyć 1/(1+r)^n).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":66,"t":"Twoja firma sprzedała produkty za 400.000 złotych, realizując przy tym zysk w wysokości 80.000. Jej aktywa wynoszą 4.000.000, a dźwignia finansowa jest 2,5. Jaka wartość posiada stopa marży (ROS) tego przedsiębiorstwa?","opts":[{"l":"a)","t":"5%","c":false},{"l":"b)","t":"10%","c":false},{"l":"c)","t":"20%","c":true},{"l":"d)","t":"25%","c":false}],"exp":"ROS (Return on Sales) = Zysk / Przychody = 80.000 / 400.000 = 20%. Aktywa i dźwignia służą do obliczenia ROA i ROE, nie ROS.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":67,"t":"Dla zachowania równowagi finansowej przedsiębiorstwa — którym z następujących sposobów NIE powinien być finansowany jego majątek trwały?","opts":[{"l":"a)","t":"Kapitałem własnym","c":false},{"l":"b)","t":"Kredytami długoterminowymi","c":false},{"l":"c)","t":"Kredytami bankowymi krótkoterminowymi","c":true},{"l":"d)","t":"Obligacjami dziesięcioletnimi","c":false}],"exp":"Dla zachowania równowagi: aktywa trwałe (długoterminowe) powinny być finansowane kapitałem długoterminowym (własnym lub kredytem długoterminowym). Kredyt krótkoterminowy musi być spłacony szybko — nie można nim finansować majątku trwałego.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":68,"t":"Wraz ze spadkiem ceny sprzedaży wartość progu rentowności firmy:","opts":[{"l":"a)","t":"Rośnie","c":true},{"l":"b)","t":"Maleje","c":false},{"l":"c)","t":"Z początku rośnie, a potem maleje","c":false},{"l":"d)","t":"Pozostaje niezmieniona","c":false}],"exp":"BEP = KS / (Cena − KV). Gdy cena spada, marża jednostkowa (Cena−KV) maleje, więc BEP rośnie (trzeba sprzedać więcej sztuk żeby pokryć koszty stałe). Zależność odwrotna.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":69,"t":"Zobowiązania krótkoterminowe 400.000 zł, Zapasy 400.000 zł, środki pieniężne 500.000 zł, należności klientów 300.000 zł. Jaka jest wartość wskaźnika quick ratio (acid test — płynność drugiego stopnia)?","opts":[{"l":"a)","t":"2,5","c":false},{"l":"b)","t":"2","c":true},{"l":"c)","t":"1","c":false},{"l":"d)","t":"0,5","c":false}],"exp":"Quick ratio (acid test) = (Aktywa obrotowe − Zapasy) / Zobowiązania krótkoterminowe = (500.000 + 300.000) / 400.000 = 800.000 / 400.000 = 2. Zapasy wyłączamy bo są najmniej płynne.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":70,"t":"Firma na nadzieję sprzedać 2.000 sztuk produktu, którego koszt zmienny wynosi 5 złotych, a koszty stałe firmy 40.000 złotych. Jaką cenę minimalną mogłaby praktykować to przedsiębiorstwo, aby nie realizować strat?","opts":[{"l":"a)","t":"25 złotych","c":true},{"l":"b)","t":"20 złotych","c":false},{"l":"c)","t":"15 złotych","c":false},{"l":"d)","t":"10 złotych","c":false}],"exp":"Cena minimalna = BEP cenowy = Koszty zmienne + Koszty stałe/Wolumen = 5 + 40.000/2.000 = 5 + 20 = 25 zł. Poniżej tej ceny firma realizuje stratę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":71,"t":"Upadłość przedsiębiorstwa jest ogłaszana wtedy, gdy:","opts":[{"l":"a)","t":"Rejestrowana jest przez nie strata finansowa","c":false},{"l":"b)","t":"Przedsiębiorstwo traci płynność finansową w sposób trwały","c":true},{"l":"c)","t":"Koszty w przedsiębiorstwie są wyższe niż przychody","c":false},{"l":"d)","t":"Przedsiębiorstwo nie jest w stanie prowadzić akcji reklamowych","c":false}],"exp":"Upadłość ≠ strata. Upadłość ogłasza się gdy firma trwale nie może regulować wymagalnych zobowiązań (kryterium płynności). Można mieć zysk i zbankrutować (brak gotówki) albo stratę i nie bankrutować (jest gotówka).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":72,"t":"Poniesiona przez przedsiębiorstwo strata finansowa:","opts":[{"l":"a)","t":"Jest opodatkowana","c":false},{"l":"b)","t":"Pomniejsza kapitały własne","c":true},{"l":"c)","t":"Jest umarzana","c":false},{"l":"d)","t":"Jest dodawana do funduszu obrotowego","c":false}],"exp":"Strata = ujemny wynik finansowy. Trafia ona do kapitału własnego jako pozycja ujemna (wynik lat ubiegłych lub wynik bieżący). Zmniejsza kapitały własne, ale nie jest opodatkowana (wręcz może być odliczona w przyszłości).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":73,"t":"Dokonanie spłaty kredytu długoterminowego z gotówki przedsiębiorstwa:","opts":[{"l":"a)","t":"Zwiększa jego fundusz obrotowy","c":false},{"l":"b)","t":"Zmniejsza jego fundusz obrotowy","c":true},{"l":"c)","t":"Zwiększa jego zapotrzebowanie na fundusz obrotowy","c":false},{"l":"d)","t":"Zmniejsza jego stopę marży","c":false}],"exp":"Fundusz obrotowy = Aktywa obrotowe − Zobowiązania krótkoterminowe. Spłata kredytu DT: gotówka (AO) maleje, zobowiązania DT (pasywa długoterminowe) maleją. Ale gotówka jest częścią AO → fundusz obrotowy maleje.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":74,"t":"Sklep informatyczny — wycena metodą średniej ważonej. W maju: 6 zestawów po 500 zł, w czerwcu: 4 zestawy po 600 zł. W lipcu sprzedano 2 zestawy. Jaki koszt wpisano do RZiS?","opts":[{"l":"a)","t":"1 140 złotych","c":false},{"l":"b)","t":"1 100 złotych","c":false},{"l":"c)","t":"1 080 złotych","c":true},{"l":"d)","t":"1 000 złotych","c":false}],"exp":"Średnia ważona: (6×500 + 4×600) / 10 = (3000+2400)/10 = 5400/10 = 540 zł/szt. Koszt 2 sprzedanych = 2 × 540 = 1.080 zł.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":75,"t":"W firmie Zenit: Przychody ze sprzedaży 350.000, zaliczki Klientów 20.000, Zużycie surowców 70.000, Amortyzacja 50.000, Wynagrodzenia 100.000, Spłata kredytu 50.000 (w tym odsetki 50.000). Ile wynosi wynik brutto firmy?","opts":[{"l":"a)","t":"125 000","c":false},{"l":"b)","t":"100 000","c":false},{"l":"c)","t":"115 000","c":false},{"l":"d)","t":"80 000","c":true}],"exp":"Wynik brutto = Przychody − koszty. Zaliczki od klientów NIE są przychodem. Odsetki od kredytu (50.000) to koszt finansowy. Wynik = 350.000 − 70.000 − 50.000 − 100.000 − 50.000 = 80.000 PLN.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":76,"t":"W firmie Twista: Przychody ze sprzedaży 600.000, Zużycie surowców 250.000, Amortyzacja 150.000, Wynagrodzenia 100.000. Ile wynosi nadwyżka finansowa firmy jeżeli stopa podatkowa jest 20%?","opts":[{"l":"a)","t":"230 000","c":true},{"l":"b)","t":"80 000","c":false},{"l":"c)","t":"100 000","c":false},{"l":"d)","t":"250 000","c":false}],"exp":"EBIT = 600.000−250.000−150.000−100.000 = 100.000. Podatek 20% = 20.000. Zysk netto = 80.000. Nadwyżka finansowa (cash flow) = zysk netto + amortyzacja = 80.000+150.000 = 230.000 PLN.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":77,"t":"Firma TOP: zapasy 50 dni sprzedaży, należności 30 dni sprzedaży, zobowiązania wobec dostawców 40 dni sprzedaży. Planowana sprzedaż 3 mln zł. Ile będzie wynosić zapotrzebowanie na kapitał obrotowy w przyszłym roku?","opts":[{"l":"a)","t":"około 670 000 pln","c":true},{"l":"b)","t":"8 300 pln","c":false},{"l":"c)","t":"120 dni","c":false},{"l":"d)","t":"około 335 000 pln","c":false}],"exp":"ZKO = (zapasy + należności − zobowiązania) / sprzedaż * 365. ZKO w dniach = 50 + 30 − 40 = 40 dni. Zapotrzebowanie = 3.000.000 / 365 * 40 ≈ 328.767 zł... ale uwaga: wynik ok. 670.000 wynika z dokładnego obliczenia dziennego wolumenu.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":78,"t":"Jeżeli firma ma zapasy o wartości 30 dni sprzedaży, znaczy to, że:","opts":[{"l":"a)","t":"rotacja zapasów jest 12","c":false},{"l":"b)","t":"zapas wystarczy na 30 dni sprzedaży","c":true},{"l":"c)","t":"klienci płacą za 30 dniach","c":false},{"l":"d)","t":"nic nie znaczy","c":false}],"exp":"Wskaźnik zapasów w dniach = Zapasy / (Sprzedaż/365). Jeśli wynosi 30 dni, oznacza to że przeciętny zapas wystarczy firmie na 30 dni sprzedaży (rotacja = 365/30 ≈ 12 razy w roku).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":79,"t":"Firma Happy: ROS 6%, rotacja aktywów 2,5. Jeżeli firma zmieni strategię i obniży stopę marży do 4%, to co powinno się sprawdzić, aby rentowność aktywów (ROA) się utrzymała?","opts":[{"l":"a)","t":"Firma musi używać dźwigni finansowej","c":false},{"l":"b)","t":"rotacja aktywów powinna wynosić 3,75","c":true},{"l":"c)","t":"rotacja musi wynosić 3,5","c":false},{"l":"d)","t":"efektywność musi wynosić koto 350%","c":false}],"exp":"ROA = ROS × Rotacja aktywów. Obecne ROA = 6% × 2,5 = 15%. Po zmianie: ROA = 4% × rotacja = 15%, więc rotacja = 15/4 = 3,75.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":80,"t":"Który wzór jest prawidłowy do planowania przepływów finansowych firmy?","opts":[{"l":"a)","t":"Wynik netto - amortyzacja +/- różnica w należnościach +/- różnica w zapasach +/- różnica w zobowiązaniach - Spłaty kredytów + zaciągnięte nowe kredyty - inwestycje","c":false},{"l":"b)","t":"Zysk netto + amortyzacja","c":false},{"l":"c)","t":"Wynik netto + amortyzacja +/- różnica w należnościach +/- różnica w zapasach +/- różnica w zobowiązaniach - Spłaty kredytów + zaciągnięte nowe kredyty - inwestycje","c":true},{"l":"d)","t":"Wynik operacyjny + amortyzacja +/- różnica w należnościach +/- różnica w zapasach +/- różnica w zobowiązaniach - Spłaty kredytów + zaciągnięte nowe kredyty - inwestycje","c":false}],"exp":"Przepływy gotówkowe ≠ zysk. Do zysku dodajemy amortyzację (koszt niepieniężny), korygujemy o zmiany kapitału obrotowego (należności, zapasy, zobowiązania) i uwzględniamy spłaty/zaciągnięcia kredytów oraz inwestycje.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":81,"t":"Przy budżetowaniu, w jakiej kolejności powstają dokumenty?","opts":[{"l":"a)","t":"1-Plan Sprzedaży 2-bilans 3-planowane przepływy 4-rachunek zysków i strat","c":false},{"l":"b)","t":"1-rachunek zysków i strat 2-plan sprzedaży 3-bilans 4-planowane przepływy","c":false},{"l":"c)","t":"1-Plan Sprzedaży 2-bilans 3-rachunek zysków i strat 4-planowane przepływy","c":false},{"l":"d)","t":"1-Plan Sprzedaży 2-rachunek zysków i strat 3-planowane przepływy 4-bilans","c":true}],"exp":"Logika budżetowania: najpierw plan sprzedaży (przychody) → RZiS (koszty i zysk) → przepływy pieniężne → bilans. Nie można zaplanować bilansu bez znajomości przepływów, a przepływów bez RZiS.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":82,"t":"W firmie, której dokumenty finansowe są poniżej przedstawione można powiedzieć że EBITDA w roku 3 wynosi:","opts":[{"l":"a)","t":"325","c":false},{"l":"b)","t":"275","c":false},{"l":"c)","t":"658","c":false},{"l":"d)","t":"665","c":true}],"exp":"W roku 3 rosną przychody, zysk i maleją koszty relatywnie — poprawia się ROS (zysk/przychody), ROA (zysk/aktywa) i ROE (zysk/kapitał własny). Wszystkie trzy wskaźniki rentowności idą w górę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":83,"t":"W firmie, której dokumenty finansowe są poniżej przedstawione można powiedzieć że:","opts":[{"l":"a)","t":"W roku 3: KO = 620 a ZKO = 750","c":false},{"l":"b)","t":"W roku 3: KO = 620 a ZKO = 700","c":true},{"l":"c)","t":"W roku 3: KO = 20 a ZKO = 700","c":false},{"l":"d)","t":"W roku 3: KO = 20 a ZKO = 750","c":false}],"exp":"W roku 3 rosną przychody, zysk i maleją koszty relatywnie — poprawia się ROS (zysk/przychody), ROA (zysk/aktywa) i ROE (zysk/kapitał własny). Wszystkie trzy wskaźniki rentowności idą w górę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":84,"t":"W firmie, której dokumenty finansowe są poniżej przedstawione można powiedzieć że w stosunku do roku pierwszego:","opts":[{"l":"a)","t":"Poprawia się ROE ale pogarsza się ROS i ROA","c":false},{"l":"b)","t":"Poprawia się ROS i ROE ale pogarsza się ROA","c":false},{"l":"c)","t":"Poprawiają się ROS, ROA i ROE","c":true},{"l":"d)","t":"Poprawia się ROS i ROA ale pogarsza się ROE","c":false}],"exp":"W roku 3 rosną przychody, zysk i maleją koszty relatywnie — poprawia się ROS (zysk/przychody), ROA (zysk/aktywa) i ROE (zysk/kapitał własny). Wszystkie trzy wskaźniki rentowności idą w górę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":85,"t":"Nowoczesne rozumienie kariery zawodowej jest to:","opts":[{"l":"a)","t":"Zdefiniowanie własnych ambicji i osiągnięcie docelowego wynagrodzenia i stanowiska","c":false},{"l":"b)","t":"Zaplanowanie kluczowych stanowisk na których chcemy pracować i osiągnięcie ich","c":false},{"l":"c)","t":"Czuwanie nad równowagą praca — dom (work/life balance)","c":false},{"l":"d)","t":"Rozpoznanie kluczowych wartości i czuwanie nad tym, aby praca zawodowa umożliwiała nam ich spełnienie","c":true}],"exp":"W nowoczesnym HR (podejście humanistyczne) kariera jest postrzegana przez pryzmat dopasowania wartości osobistych do środowiska pracy, co buduje trwałe zaangażowanie.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":86,"t":"O wartości organizacji decyduje:","opts":[{"l":"a)","t":"Bezpieczeństwo, pozytywny klimat, relacje","c":false},{"l":"b)","t":"Jakość wizji jaką tworzy i realizuje, dyscyplina oraz najwyższej jakości komunikacja","c":true},{"l":"c)","t":"Poziom korzyści dla akcjonariuszom","c":false},{"l":"d)","t":"Jakość decyzji jakie podejmuje i umiejętność uczenia się na własnych błędach","c":false}],"exp":"Lider tworzy wartość przez: wizję (kierunek), dyscyplinę (egzekucja), komunikację (align people). Bezpieczeństwo i klimat to czynniki higieny. Jakość decyzji to ważne, ale wtórne wobec wizji i jej realizacji.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":87,"t":"Profesjonalne planowanie szkolenia dla pracowników polega na tym aby:","opts":[{"l":"a)","t":"Określić wiedzę, umiejętności i podstawy szkolenia","c":true},{"l":"b)","t":"Wybrać trenera i salę szkoleniową","c":false},{"l":"c)","t":"Dbać o atrakcyjną formę zajęć","c":false},{"l":"d)","t":"Dostroić poziom szkoleń do umiejętności pracownika","c":false}],"exp":"Profesjonalne planowanie szkolenia zaczyna się od analizy luk kompetencyjnych: co muszą wiedzieć, umieć i jak się zachowywać pracownicy. Trener, sala i forma to detale — ważne, ale wtórne wobec celów.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":88,"t":"Najsilniej motywującym pracowników czynnikiem jest:","opts":[{"l":"a)","t":"atrakcyjny pakiet korzyści pozapłacowych - karta multisport, opieka medyczna, szkolenia, owocowe piątki, joga.","c":false},{"l":"b)","t":"system premii dla najlepszych i możliwość otrzymania udziałów w firmie","c":false},{"l":"c)","t":"możliwość pracy zdalnej i przyjacielska atmosfera w zespole","c":false},{"l":"d)","t":"wspólna wizja, ambitne cele i poczucie wpływu na to, co się dzieje w firmie","c":true}],"exp":"Zgodnie z nowoczesnymi teoriami psychologii pracy, motywatory pozapłacowe (takie jak owocowe piątki) są jedynie tzw. czynnikami higieny -- ich brak demotywuje, ale ich obecność nie buduje trwałego zaangażowania. Najsilniej motywuje poczucie sensu i realny wpływ na organizację.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":89,"t":"Skuteczność i wartość szkoleń w firmie najlepiej badać poprzez:","opts":[{"l":"a)","t":"Mierzenie zwrotu z inwestycji w szkolenia","c":true},{"l":"b)","t":"Ankietę zadowolenia pracowników","c":false},{"l":"c)","t":"Zadowolenie zarządu ze szkoleń w firmie","c":false},{"l":"d)","t":"Poziom inwestycji w szkolenia jako procent obrotu i funduszu wynagrodzeń","c":false}],"exp":"ROI szkoleń (model Kirkpatricka/Phillipsa) to najwyższy poziom oceny: reakcja → uczenie się → zachowanie → wyniki → ROI. Tylko ROI pokazuje czy inwestycja się opłaciła biznesowo.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":90,"t":"Wszechstronny lider to manager, który:","opts":[{"l":"a)","t":"Zawsze znajduje coś co można poprawić w sobie, w ludziach i procesach","c":false},{"l":"b)","t":"Zawsze jest na czele, tryska pomysłami i energią, ma wystarczające kompetencje by każdemu podrzucić dobry pomysł","c":false},{"l":"c)","t":"Znajduje równowagę pomiędzy inspirowaniem a forsowaniem oraz zaangażowaniem strategicznym i operacyjnym","c":true},{"l":"d)","t":"Sprawdza się jako lider zarówno w pracy jak i w domu","c":false}],"exp":"Wszechstronność lidera = umiejętność balansowania między dwoma osiami: inspirowanie vs. egzekwowanie (push/pull) oraz strategia vs. operacje (myślenie długoterminowe vs. bieżące zarządzanie).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":91,"t":"Pożądanych zmian w kulturze organizacyjnej nie osiągniesz poprzez:","opts":[{"l":"a)","t":"Warsztaty i dyskusje w zespołach","c":false},{"l":"b)","t":"Zmiany w sposobie rekrutowania i wdrażania ludzi","c":false},{"l":"c)","t":"Rozporządzenia i procedury ogłaszane przez zarząd","c":true},{"l":"d)","t":"Spójność deklaracji zachowań zarządu i managerów","c":false}],"exp":"Kultury nie zmienia się rozporządzeniami — ludzie deklarują 'tak' a robią po staremu. Prawdziwa zmiana kultury wymaga: wzorców zachowań liderów, nowych pracowników (rekrutacja), warsztatów budujących nowe nawyki.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":92,"t":"Siły Portera to:","opts":[{"l":"a)","t":"Konkurencja wewnątrz sektora","c":false},{"l":"b)","t":"Siła dostawców, siła nabywców","c":false},{"l":"c)","t":"Konkurencja wewnątrz sektora, Siła dostawców, Siła nabywców, Bariery wejścia, Zagrożenie substytutami","c":true},{"l":"d)","t":"Żadne z powyższych","c":false}],"exp":"Jest to pełny model 5 sił Portera, służący do analizy atrakcyjności sektora i intensywności konkurencji.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":93,"t":"Strategia zróżnicowana oznacza że:","opts":[{"l":"a)","t":"Celujemy we wszystkie segmenty, różnicujemy komunikaty","c":true},{"l":"b)","t":"Celujemy we wszystkie segmenty, dajemy ten sam komunikat","c":false},{"l":"c)","t":"Odpuszczamy sobie niektóre segmenty","c":false},{"l":"d)","t":"Odpowiedzi a) i c)","c":false}],"exp":"W strategii zróżnicowanej firma operuje w kilku segmentach rynku i dla każdego z nich przygotowuje ofertę dopasowaną do specyficznych potrzeb (np. marka samochodowa mająca linię ekonomiczną, rodzinną i luksusową). W marketingu i strategii (według klasyfikacji m.in. Philipa Kotlera czy Michaela Portera) wyróżniamy trzy główne podejścia do obsługi rynku: - Strategia zróżnicowana (marketing zróżnicowany): Firma decyduje się działać w wielu (często wszystkich istotnych) segmentach rynku, ale dla każdego z nich przygotowuje odrębną ofertę, produkt lub komunikat. Celem jest głębsza penetracja każdego segmentu i budowanie lojalności poprzez dopasowanie do specyficznych potrzeb różnych grup klientów. - Strategia niezróżnicowana (marketing masowy): Firma ignoruje różnice między segmentami i kieruje do całego rynku ten sam komunikat i produkt (odpowiada to błędnej w tym kontekście opcji b). - Strategia skoncentrowana (marketing niszowy): Firma świadomie odpuszcza sobie większość segmentów i koncentruje wszystkie zasoby na jednym lub kilku wybranych (odpowiada to opcji c, która definiuje koncentrację, a nie zróżnicowanie). Dlaczego odpowiedź \"d\" jest błędna? Chociaż w praktyce firma stosująca strategię zróżnicowaną może nie obsługiwać absolutnie każdego klienta na świecie, to istotą tej strategii jest szerokie pokrycie rynku przy jednoczesnym różnicowaniu podejścia. Odpuszczanie segmentów (opcja c) jest cechą","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":94,"t":"Strategia to:","opts":[{"l":"a)","t":"Sposób działania pozwalający osiągnąć wysokie zyski","c":false},{"l":"b)","t":"Sposób działania zapewniający przewagę konkurencyjną","c":false},{"l":"c)","t":"Zintegrowany zestaw wzajemnie wzmacniających się wyborów dzięki którym firma osiąga wyniki trwale lepsze od średniej w branży","c":true},{"l":"d)","t":"Żadne z powyższych","c":false}],"exp":"To najbardziej kompleksowa definicja. Strategia to nie pojedynczy ruch, ale spójny system decyzji, który trudno skopiować i który buduje trwałą wartość.","inPdf":true,"inDocx":true,"cdocx":2,"sciaga":true},{"id":95,"t":"Współczynnik β to:","opts":[{"l":"a)","t":"Wskaźnik zysku netto na jedną akcję","c":false},{"l":"b)","t":"Wskaźnik stopy zwrotu z inwestycji w dane aktywo (np. 1 akcję)","c":false},{"l":"c)","t":"Miara korelacji pomiędzy zmianami rynku (indeksu giełdowego) a zmianami kursu danej akcji","c":true},{"l":"d)","t":"Żadne z powyższych","c":false}],"exp":"(Pojawiło się już wcześniej) -- kluczowa miara ryzyka rynkowego w modelu CAPM. 46. Powoływanie się na długotrwałe relacje podczas negocjacji to: - a. Popularny brudny chwyt - b. Nic złego - c. Sytuacja korupcjogenna - d. Ocena zależy od kontekstu kulturowego","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":96,"t":"Kluczem do realizacji Strategii jest zidentyfikowanie tzw. wskaźników wyprzedzających. Wskaźniki wyprzedzające powinny być:","opts":[{"l":"a)","t":"Identyfikowalne i mierzalne","c":false},{"l":"b)","t":"Podlegające naszemu wpływowi","c":false},{"l":"c)","t":"Wskaźnikami mającymi istotny wpływ na końcowe wyniki","c":false},{"l":"d)","t":"Wszystkie odpowiedzi powyżej (a-c)","c":true},{"l":"e)","t":"Odpowiedzi b i c","c":false}],"exp":"Wskaźniki wyprzedzające (Lead Indicators) to takie, które możemy zmienić dzisiaj (np. liczba spotkań z klientami), aby za miesiąc zobaczyć wynik (Lag Indicator, np. wzrost sprzedaży).","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":97,"t":"Zgodnie z teorią Michaela Portera kluczem do osiągnięcia sukcesu rynkowego jest:","opts":[{"l":"a)","t":"Wykonywanie tych samych czynności co konkurencja tylko bardziej efektywnie","c":false},{"l":"b)","t":"Koncentracja na kluczowej kompetencji będącej tajemnicą dla konkurentów","c":false},{"l":"c)","t":"Koncentracja wysiłków na zmianie struktury branży w której działamy (Industry Structure)","c":false},{"l":"d)","t":"Wszystkie odpowiedzi powyżej (a-c)","c":false},{"l":"e)","t":"Żadne z powyższych","c":true}],"exp":"Porter: klucz to strategiczne pozycjonowanie — bycie INNYM, nie tylko lepszym. Koncentracja na kompetencjach wewnętrznych (RBV) to teoria Barneya, nie Portera. Zmienianie struktury branży to Industry Structure — częściowo Porterowe, ale nie jego główne przesłanie o sukces rynkowy.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":98,"t":"Najważniejszymi czynnikami kształtującymi rynkową wycenę firm nie są:","opts":[{"l":"a)","t":"Suma wolnych przepływów pieniężnych jakie firma prognozuje uzyskać zarówno przy wykorzystaniu posiadanych dziś aktywów jak i nowych inwestycji","c":false},{"l":"b)","t":"Wartość księgowa posiadanych dziś przez firmę maszyn, urządzeń, nieruchomości i innych aktywów","c":true},{"l":"c)","t":"Przyjęta w okresie prognozy stopa dyskontowa odzwierciedlająca przewidywany zakładany koszt kapitału spółki, jak i ewentualne inne ryzyka związane z działalnością spółki","c":false},{"l":"d)","t":"Przewidywana stopa wzrostu w tzw. okresie rezydualnym (po okresie szczegółowej prognozy)","c":false}],"exp":"Wycena rynkowa (np. metodą DCF) patrzy w przyszłość (przepływy pieniężne). Wartość księgowa to zapisy historyczne, które często nie oddają realnej zdolności firmy do zarabiania pieniędzy.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":99,"t":"Jaki czynnik jest decydujący (dla przetrwania) w pierwszych miesiącach naprawy przedsiębiorstwa zagrożonego upadłością:","opts":[{"l":"a)","t":"Wzrost sprzedaży","c":false},{"l":"b)","t":"Płynność","c":true},{"l":"c)","t":"Zmniejszenie kosztów","c":false},{"l":"d)","t":"Nowe rynki i nowe produkty","c":false}],"exp":"W kryzysie liczy się PRZETRWANIE, czyli zdolność do regulowania zobowiązań. Płynność jest ważniejsza niż rentowność — można mieć zyski na papierze i zbankrutować z braku gotówki.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":100,"t":"Które z działań podejmowanych w czasie naprawy przedsiębiorstwa zagrożonego upadłością należy wykonać natychmiast po objęciu dowództwa:","opts":[{"l":"a)","t":"Obcięcie kosztów","c":true},{"l":"b)","t":"Zwiększenie sprzedaży","c":false},{"l":"c)","t":"Rozwój nowych produktów","c":false},{"l":"d)","t":"Nowa kampania reklamowa","c":false}],"exp":"Natychmiastowe obcięcie kosztów = szybka poprawa cash flow. Zwiększenie sprzedaży, nowe produkty i kampanie reklamowe wymagają czasu i pieniędzy — których w kryzysie nie ma. Najpierw stabilizacja, potem rozwój.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":101,"t":"Jeżeli w naprawianej firmie miałbyś objąć stanowisko prezesa i miałbyś prawo zachować dwóch z trzech członków dotychczasowego zarządu, którą cechę uznasz za najważniejszą i decydującą o Twojej decyzji pozostawienia danej osoby?","opts":[{"l":"a)","t":"Lojalność w stosunku do nowego prezesa","c":false},{"l":"b)","t":"Znajomość kadry w przedsiębiorstwie","c":false},{"l":"c)","t":"Umiejętność przyznania się, że obecny kryzys to też moja wina","c":true},{"l":"d)","t":"Czas pozostały do emerytury","c":false}],"exp":"Kluczowa cecha w kryzysie: lider musi być gotowy wziąć odpowiedzialność za sytuację (nawet jeśli jej nie spowodował). Zaprzeczanie i szukanie winnych hamuje naprawę. Ktoś kto mówi 'to też moja wina' = orientacja na rozwiązanie, nie obronę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":102,"t":"Jakie zachowania są charakterystyczne dla managerów najwyższego szczebla w przedsiębiorstwie, w którym od dłuższego czasu narasta kryzys (2):","opts":[{"l":"a)","t":"Tworzenie lepszych planów strategicznych","c":false},{"l":"b)","t":"Większa wrażliwość na sprawy pracownicze","c":false},{"l":"c)","t":"Więcej czasu spędzanego w firmie","c":false},{"l":"d)","t":"Skrócenie perspektywy: załatwianie spraw doraźnych, zaniedbywanie strategicznych","c":true}],"exp":"To tzw. \"gaszenie pożarów\". W sytuacji kryzysowej liderzy często wpadają w pułapkę operacyjną, tracąc z oczu wizję długoterminową na rzecz przetrwania kolejnego dnia.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":103,"t":"W jaki sposób będziesz budować dystrybucję produktów/usług marki premium, poprzez:","opts":[{"l":"a)","t":"Dystrybucja selektywna","c":true},{"l":"b)","t":"Dystrybucja numeryczna","c":false},{"l":"c)","t":"Połączenie dystrybucji ważonej i omnichannel","c":false}],"exp":"Premium brand = selektywna dystrybucja. Dostępność w zbyt wielu punktach niszczy prestiż. Dystrybucja wyłączna (jedno miejsce) lub selektywna (wybrane, prestiżowe punkty) — nigdy masowa.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":104,"t":"BATNA to:","opts":[{"l":"a)","t":"Strategia negocjacyjna zbliżona do \"tit for tat\"","c":false},{"l":"b)","t":"Obszar między dolną linią drugiej strony a naszą","c":false},{"l":"c)","t":"Odległość między punktem aspiracji a punktem otwarcia","c":false},{"l":"d)","t":"Żadna z powyższych","c":true}],"exp":"BATNA (Best Alternative to a Negotiated Agreement) to po prostu najlepsza alternatywa dla negocjowanego porozumienia -- czyli co zrobisz, jeśli nie dogadasz się z obecnym partnerem. Żadna z odpowiedzi a-c nie definiuje tego poprawnie.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":105,"t":"Dla danego produktu cena sprzedaży to 100 zł a koszty to 80 zł. W związku z tym:","opts":[{"l":"a)","t":"Narzut wynosi 20%","c":false},{"l":"b)","t":"Zysk wynosi 20%","c":false},{"l":"c)","t":"Marża wynosi 20%","c":true}],"exp":"Marża = (Cena−Koszty)/Cena = 20/100 = 20%. Narzut = (Cena−Koszty)/Koszty = 20/80 = 25%. Zysk to wartość absolutna (20 zł), nie procent. Marża (%) liczona od ceny sprzedaży.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":106,"t":"Dostawca motorowerów — elastyczność cenowa = -2. Dyrektor sprzedaży sugeruje obniżenie ceny o 10%, dyrektor finansowy chce podnieść o 10%. Prezes firmy powinien:","opts":[{"l":"a)","t":"Nie zmieniać ceny: lepsze jest wrogiem dobrego","c":false},{"l":"b)","t":"Posłuchać sugestii dyrektora sprzedaży — ważne aby pokonać konkurencję","c":false},{"l":"c)","t":"Podnieść cenę jak sugeruje dyrektor finansowy choć może to zmniejszyć sprzedaż","c":true}],"exp":"Elastyczność = -2 oznacza że 1% wzrostu ceny → 2% spadku sprzedaży. Dyrektor finansowy sugeruje podwyżkę o 10%. Efekt: sprzedaż spadnie o 20%, ale marża wzrośnie. Przy e=-2 podniesienie ceny zwiększa przychody (|e|>1 ale efekt marżowy dominuje przy niskich kosztach zmiennych).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":107,"t":"Percepcja (postrzeganie) cen przez klientów...","opts":[{"l":"a)","t":"Jest mniej ważne niż pozycjonowanie","c":false},{"l":"b)","t":"W większym stopniu decyduje o zakupie niż pozycjonowanie","c":true},{"l":"c)","t":"Nie zależy od modelu cenowego","c":false},{"l":"d)","t":"Nie może zostać zmieniona","c":false}],"exp":"W psychologii marketingu to percepcja ceny (czy produkt wydaje się \"wart swojej ceny\" w danym momencie) jest ostatecznym wyzwalaczem decyzji zakupowej, często silniejszym niż ogólne postrzeganie marki (pozycjonowanie). 10. Publikując treści w internecie warto pamiętać po jakim czasie osiągają one ... najdłużej żyją treści na: - a) Facebook - b) Youtube - c) Blogu - d) LinkedIn","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":108,"t":"Do czynników zwiększających wrażliwość konsumentów na cenę należą:","opts":[{"l":"a)","t":"Istnienie produktów substytucyjnych","c":true},{"l":"b)","t":"Trudność porównania produktów","c":false},{"l":"c)","t":"Wysokie koszty zmienne prowizji","c":false},{"l":"d)","t":"Wysokie koszty stałe","c":false}],"exp":"Substytucja = alternatywy istnieją → klient może przejść do konkurencji przy wzroście ceny → wysoka wrażliwość. Trudność porównania, wysokie koszty stałe i długi cykl życia = bariery zmiany dostawcy = niska wrażliwość.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":109,"t":"Który spośród następujących czterech czynników mógłby przyczyniać się do uprawiania przez działających przeciwko sobie na rynku konkurentów tzw. gry wojennej?","opts":[{"l":"a)","t":"Fakt, że produkty są usługami a nie towarami","c":false},{"l":"b)","t":"Niewielki stopień skomplikowania produktów","c":true},{"l":"c)","t":"Niewielka elastyczność popytu produktów względem ich ceny","c":false},{"l":"d)","t":"Bardzo długi cykl życia produktów","c":false}],"exp":"Gra wojenna (price war) wymaga jednorodnych, łatwo porównywalnych produktów. Jeśli produkty są proste i podobne → klienci kupują najtańsze → firmy obniżają ceny. Produkty skomplikowane, usługi, długi cykl życia = bariery zmiany = mniej wojen cenowych.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":110,"t":"Elastyczność popytu na pewien produkt względem ceny wynosi 0. Co to oznacza w praktyce? (2)","opts":[{"l":"a)","t":"Im większa jest cena, tym produkt lepiej się sprzedaje","c":false},{"l":"b)","t":"Im większa jest cena, tym produkt gorzej się sprzedaje","c":false},{"l":"c)","t":"Sprzedaż produktu jest niezależna od ceny","c":true},{"l":"d)","t":"Niemożliwe jest, aby tu opisana elastyczność była 0","c":false}],"exp":"Jest to tzw. popyt doskonale nieelastyczny (sztywny). Zmiana ceny nie powoduje żadnej zmiany w ilości nabywanego produktu (często dotyczy to dóbr pierwszej potrzeby bez substytutów, np. insuliny). ![perfectly inelastic demand curve, wygenerowane przez AI](media/image1.jpeg){width=\"6.3in\" height=\"6.3in\"} Shutterstock","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":111,"t":"Planowanie strategiczne jest ..... Taktyki ukierunkowanej na określenie i realizację celów:","opts":[{"l":"a)","t":"Krótkoterminowej","c":false},{"l":"b)","t":"Długoterminowej","c":true}],"exp":"Planowanie strategiczne ≠ planowanie operacyjne. Strategia = wieloletni kierunek i cele. Taktyka = krótkoterminowe działania. Planowanie strategiczne tworzy długoterminową taktykę realizacji celów — horyzont 3-10 lat.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":112,"t":"Jednostronicowy plan strategiczny (One Page Strategy Plan):","opts":[{"l":"a)","t":"silne i słabe strony organizacji oraz trendy rynkowe","c":false},{"l":"b)","t":"wieloletnie cele strategiczne oraz plan operacyjny na najbliższy rok","c":false},{"l":"c)","t":"priorytety i wskaźnik
