i efektywności wynikające ze strategii","c":false},{"l":"d)","t":"każde z powyższych","c":true}],"exp":"Ideą OPSP (często kojarzonego z metodologią Verne'a Harnisha) jest synteza całej strategii -- od wizji, przez SWOT, aż po konkretne KPI (wskaźniki) na jednej kartce.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":113,"t":"Długoterminowy plan strategiczny służy do:","opts":[{"l":"a)","t":"Definiowania wizji nowego produktu","c":false},{"l":"b)","t":"Oceny atrakcyjności rynku/branży","c":false},{"l":"c)","t":"Planowania rozwoju biznesu","c":true},{"l":"d)","t":"Budowa wyróżników biznesu i ucieczka od konkurencji","c":false}],"exp":"Plan strategiczny (long-range plan) służy do planowania wzrostu, wejścia na nowe rynki, rozwoju kompetencji, fuzji. Nie służy do oceny rynku (to analiza) ani do definiowania wizji produktu (to innovation plan).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":114,"t":"Strategia Błękitnego oceanu ułatwia w szczególności:","opts":[{"l":"a)","t":"definiowanie celów w 4 perspektywach: finansowej, klienta, procesów wewnętrznych oraz wzrostu i rozwoju","c":false},{"l":"b)","t":"tworzenie wolnej przestrzeni rynkowej m.in. poprzez tworzenie nowej wartości dotychczas nie oferowanej przez branżę","c":true},{"l":"c)","t":"analizę trendów rynkowych natury politycznej, ekonomicznej, społecznej i technologicznej","c":false},{"l":"d)","t":"żadne z powyższych","c":false}],"exp":"Kwintesencja koncepcji Kim i Mauborgne. Zamiast walczyć z konkurencją na \"krwawym\" czerwonym oceanie, tworzysz nową kategorię (ocean błękitny). Punkt 'a' to definicja Zrównoważonej Karty Wyników (BSC), a punkt 'c' to analiza PEST.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":true},{"id":115,"t":"Na czym polega real time marketing?","opts":[{"l":"a)","t":"zamieszczaniu treści odnoszących się do aktualnych, popularnych zdarzeń w świecie rzeczywistym i wirtualnym","c":true},{"l":"b)","t":"zamieszczanie treści odnoszących się do zdarzeń związanych z zespołem Real Madryt","c":false},{"l":"c)","t":"zamieszczaniu treści zgodnie z porami roku","c":false},{"l":"d)","t":"zamieszczaniu treści w konkretnych porach dnia","c":false}],"exp":"RTM to reagowanie \"tu i teraz\" na bieżące wydarzenia (np. mecz, głośny news, zjawisko pogodowe), aby przyciągnąć uwagę odbiorców dzięki aktualności tematu.","inPdf":true,"inDocx":true,"cdocx":1,"sciaga":false},{"id":116,"t":"Firma KWOKA S.A. planuje wzrost sprzedaży na najbliższy rok, żeby ZKO nie rosło proporcjonalnie musi:","opts":[{"l":"a)","t":"Zaciągnąć kredyt w banku","c":false},{"l":"b)","t":"Zdecydować się na leasing","c":false},{"l":"c)","t":"Optymalizować zapasy, należności i zobowiązania (ZKO=zapasy+należności+RMO czynne-zobowiązania)","c":true},{"l":"d)","t":"Nie wypłacać dywidend","c":false}],"exp":"ZKO = zapasy + należności + RMO czynne − zobowiązania operacyjne. Jeśli sprzedaż rośnie proporcjonalnie, wszystkie składniki ZKO rosną. Aby ZKO nie rosło proporcjonalnie — trzeba optymalizować każdy składnik (skrócić rotację zapasów, przyspieszyć ściąganie należności, wydłużyć terminy płatności).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":117,"t":"NPV nowego projektu wynosi 20 000 złotych przy WACC 10% i nakładach 200 000 PLN:","opts":[{"l":"a)","t":"Czyli projekt przynosi 20 000 złotych (po wynagrodzeniu źródeł finansowania w wysokości 10%)","c":true},{"l":"b)","t":"Powinniśmy jeszcze aktualizować nakłady","c":false},{"l":"c)","t":"Czyli IRR jest niższy niż 10%","c":false},{"l":"d)","t":"Czyli projekt jest mało opłacalny","c":false}],"exp":"NPV > 0 oznacza że projekt zarabia ponad wymagany zwrot (WACC 10%). Konkretnie: po opłaceniu wszystkich źródeł finansowania (koszt kapitału 10%) projekt generuje jeszcze 20.000 zł nadwyżki wartości.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":118,"t":"Planujemy wpływ 50 000 PLN za 2 lata. Ile wyniesie wartość zaktualizowana (zdyskontowana) tej kwoty — przy założeniu współczynnika aktualizacji równego 12%?","opts":[{"l":"e)","t":"4 166 złotych","c":false},{"l":"f)","t":"39 860 złotych","c":true},{"l":"g)","t":"22 300 złotych","c":false},{"l":"h)","t":"56 000 złotych","c":false}],"exp":"Wartość zaktualizowana = PV = FV / (1+r)^n = 50.000 / (1+0,12)^2 = 50.000 / 1,2544 ≈ 39.860 zł. Współczynnik aktualizacji 12% rocznie przez 2 lata.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":119,"t":"Twoja firma osiągnęła przychody ze sprzedaży 2 000 000 złotych realizując przy tym zysk netto 500 000 złotych. Wartość aktywów wynosi 3 000 000 złotych, a finansowa 2. Ile wynosi ROA tego przedsiębiorstwa?","opts":[{"l":"a)","t":"16,7%","c":true},{"l":"b)","t":"25%","c":false},{"l":"c)","t":"46%","c":false},{"l":"d)","t":"500 000 PLN","c":false}],"exp":"ROA = Zysk netto / Aktywa = 500.000 / 3.000.000 = 16,7%. Dźwignia finansowa nie jest potrzebna do obliczenia ROA (to ROE = ROA × dźwignia).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":120,"t":"Firma MOTOR chce zrezygnować z amortyzacji przyspieszonej środka trwałego (w tym roku odpis byłby o 250 000 mniejszy). Wpływ na EBITDA?","opts":[{"l":"a)","t":"Nie ma to wpływu na EBITDA","c":true},{"l":"b)","t":"Zmniejszy się EBITDA o 250 000 PLN","c":false},{"l":"c)","t":"Zwiększy się EBITDA o 250 000 PLN","c":false},{"l":"d)","t":"Będzie zaoszczędzony podatek","c":false}],"exp":"EBITDA = Earnings Before Interest, Taxes, Depreciation and Amortization — czyli wynik PRZED amortyzacją. Zmiana amortyzacji wpływa na EBIT i zysk netto, ale EBITDA pozostaje bez zmian.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":121,"t":"Firma ma nadzieję sprzedać za 80 złotych produkt, którego koszt jednostkowy wynosi 30 złotych. Koszty stałe firmy to 400 000 złotych. BEP — ile sztuk?","opts":[{"l":"a)","t":"8 000 sztuk","c":true},{"l":"b)","t":"10 000 sztuk","c":false},{"l":"c)","t":"550 000 złotych","c":false},{"l":"d)","t":"11 000 sztuk","c":false}],"exp":"BEP = Koszty stałe / (Cena − Koszt zmienny) = 400.000 / (80 − 30) = 400.000 / 50 = 8.000 sztuk.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":122,"t":"Jeżeli firma ma straty od 2 lat:","opts":[{"l":"a)","t":"Traci ona płynność","c":false},{"l":"b)","t":"Nic nie wiemy o płynności tej firmy","c":true},{"l":"c)","t":"Należności w dniach przekraczają miesiąc","c":false}],"exp":"Strata rachunkowa ≠ brak płynności. Firma może mieć stratę a mimo to posiadać gotówkę (np. amortyzacja to koszt niepieniężny). Płynność zależy od przepływów pieniężnych, nie od wyniku.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":123,"t":"W 2015 firma osiągnęła wynik netto 300.000, rozdała 100.000 w formie dywidendy i zaciągnęła kredyt bankowy długoterminowy 1.600.000 PLN. Ile wynosi kapitał własny na koniec 2015?","opts":[{"l":"a)","t":"900 000","c":true},{"l":"b)","t":"1 000 000","c":false},{"l":"c)","t":"2 500 000","c":false},{"l":"d)","t":"1 600 000","c":false}],"exp":"Kapitał własny zmienia się o: +wynik netto − dywidendy. Kredyt to zobowiązanie (pasywa), nie wpływa na kapitał własny. KW(koniec) = KW(początek) + 300.000 − 100.000 = KW(początek) + 200.000. Brakuje informacji o KW na początku 2015 — pytanie dotyczy końca 2015.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":124,"t":"Zdobyte finansowanie poprzez emisję akcji:","opts":[{"l":"a)","t":"Zwiększa fundusz (kapitał) obrotowy (emitujesz akcje, dostajesz pieniądze i zasila one kapitał obrotowy)","c":true},{"l":"b)","t":"Zmniejsza fundusz(kapitał) obrotowy","c":false},{"l":"c)","t":"Zmniejsza jego zapotrzebowanie na fundusz(kapitał) obrotowy","c":false},{"l":"d)","t":"Zmniejsza jego stopę marży","c":false}],"exp":"Emisja akcji → pieniądze wpływają na konto firmy → rosną aktywa obrotowe (gotówka) i kapitał własny. Fundusz obrotowy = aktywa obrotowe − zobowiązania krótkoterminowe → rośnie.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":125,"t":"Sklep z AGD zakupił w czerwcu 2 maszyny do kawy po 400 złotych sztuka zaś w czerwcu dokupił u swego dostawcy jeszcze 8 maszyn — ale po 500 złotych za sztukę. W następnym miesiącu udało się sprzedać klientom 4 maszyny: jak i ich koszt wpisano do rachunku zysków sklepu, jeśli praktykował on wycenę zapasów za pomocą średniej ważonej?","opts":[{"l":"a)","t":"1 600 złotych","c":false},{"l":"b)","t":"1 800 złotych","c":false},{"l":"c)","t":"1 920 złotych","c":true},{"l":"d)","t":"2 000 złotych","c":false}],"exp":"Średnia ważona: (2×400 + 8×500) / 10 = (800+4000)/10 = 4800/10 = 480 zł/szt. Koszt 4 sprzedanych = 4 × 480 = 1.920 zł.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":126,"t":"W firmie KoKoKruK, księgowa zanotowała zdarzenia: Przychody ze sprzedaży 400.000, Dostawcom zapłaciliśmy zaliczki 100.000, Dywidendy wypłacone 50.000, Zużycie surowców 50.000, Amortyzacja 100.000, Wynagrodzenia 150.000, Spłata kredytu 150.000 (w tym odsetki 20.000), Odpis aktualizujący wartość należności 30.000. Ile wynosi wynik brutto firmy?","opts":[{"l":"a)","t":"-250 000 PLN","c":false},{"l":"b)","t":"0 PLN","c":false},{"l":"c)","t":"-150 000 PLN","c":false},{"l":"d)","t":"50 000 PLN","c":true}],"exp":"Wynik brutto = Przychody − koszty operacyjne − koszty finansowe. Zaliczki dla dostawców i dywidendy to przepływy pieniężne (nie koszty). Koszty: surowce 50k + amortyzacja 100k + wynagrodzenia 150k + odsetki 20k + odpis 30k = 350k. Wynik = 400k − 350k = 50.000 PLN.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":127,"t":"Która z następujących pozycji jest kosztem rachunkowym?","opts":[{"l":"a)","t":"Wypłata dywidend","c":false},{"l":"b)","t":"Odpis aktualizujący wartość zapasów, które tracą wartość (czy od należności czy od zapasów to zawsze koszt)","c":true},{"l":"c)","t":"Inwestycje w maszyny (to jest inwestycja)","c":false},{"l":"d)","t":"Spłata raty kapitałowej kredytu (to jest kłopot i nie koszt)","c":false}],"exp":"Tylko punkt \\'c\\' oznacza fizyczne zniknięcie pieniędzy z konta. Reszta (a, b, d) to zapisy księgowe obniżające zysk, ale \\\"niepieniężne\\\".","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":128,"t":"W firmie Twista, księgowa zanotowała zdarzenia: Przychody ze sprzedaży 1.100.000, Zużycie surowców 500.000, Amortyzacja 200.000, Wynagrodzenia 100.000. Ile wynosi nadwyżka finansowa firmy jeżeli stopa podatkowa jest 20%?","opts":[{"l":"a)","t":"440 000 PLN","c":true},{"l":"b)","t":"500 000 PLN","c":false},{"l":"c)","t":"200 000 PLN","c":false},{"l":"d)","t":"Brakuje informacji o poziomie aktywów","c":false}],"exp":"EBIT = 1.100.000 − 500.000 − 200.000 − 100.000 = 300.000. Podatek 20% = 60.000. Zysk netto = 240.000. Nadwyżka finansowa = zysk netto + amortyzacja = 240.000 + 200.000 = 440.000 PLN.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":129,"t":"Firma STOP ma zapasy w wysokości 25 dni sprzedaży, należności w wysokości 35 dni sprzedaży i zobowiązania wobec dostawców 40 dni sprzedaży. Firma planuje roczną sprzedaż na poziomie 3.600.000. Ile będzie prawdopodobnie wynosić zapotrzebowanie na kapitał obrotowy w przyszłym roku?","opts":[{"l":"a)","t":"około 20 000 PLN","c":false},{"l":"b)","t":"około 200 000 PLN","c":true},{"l":"c)","t":"100 dni","c":false},{"l":"d)","t":"około 2 000 000 PLN","c":false}],"exp":"ZKO w dniach = 25 + 35 − 40 = 20 dni. Zapotrzebowanie = 3.600.000 / 365 × 20 ≈ 197.260 ≈ 200.000 zł.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":130,"t":"Firma SZLAIK działa w branży luksusowej i sprzedaje swoje produkty z wysoką marżą. Jeżeli firma ma zapasy o wartości 60 dni sprzedaży, znaczy to że:","opts":[{"l":"a)","t":"finansują swoje zapasy z kredytu","c":false},{"l":"b)","t":"klienci płacą za 60 dniach","c":false},{"l":"c)","t":"rotacja zapasów jest 6 (w ciągu roku) bo 360/60","c":false},{"l":"d)","t":"zapasy wystarczają na 60 dni sprzedaży","c":true}],"exp":"Zapasy w dniach = Zapasy / (Sprzedaż/365). 60 dni oznacza że przeciętny zapas wystarczy na 60 dni sprzedaży. Nic nie mówi o kredycie ani o terminach płatności klientów.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":131,"t":"Firma Hippo miała w zeszłym roku ROS (stopa marży) na poziomie 10% a rotację aktywów 2. Jeżeli firma zmieni strategię i obniży stopę marży do 5%, to co powinno się zdarzyć, aby rentowność aktywów (ROA) się utrzymała?","opts":[{"l":"a)","t":"rotacja aktywów musi wynosić 3","c":false},{"l":"b)","t":"rotacja aktywów musi wynosić 4","c":true},{"l":"c)","t":"rotacja aktywów musi wynosić 5","c":false},{"l":"d)","t":"rotacja majątku musi wynosić 6","c":false}],"exp":"ROA = ROS × Rotacja. Obecne ROA = 10% × 2 = 20%. Po zmianie: 5% × rotacja = 20%, rotacja = 20/5 = 4.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":132,"t":"NPV projektu A wynosi +10.000 PLN przy nakładach 150.000 PLN a NPV projektu B wynosi +9.000 PLN przy nakładach 100.000 PLN. Który z projektów jest bardziej opłacalny?","opts":[{"l":"a)","t":"Nie możemy wybrać nie znając progu rentowności","c":false},{"l":"b)","t":"Nie możemy wybrać nie znając WACC","c":false},{"l":"c)","t":"Z tych informacji wynika, że B jest lepszy niż A","c":true}],"exp":"B jest lepszy: ROI projektu A = 10.000/150.000 = 6,7%; ROI projektu B = 9.000/100.000 = 9%. B generuje wyższy zwrot na każdą zainwestowaną złotówkę.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":133,"t":"Tabela poniżej przedstawia analizę rentowności usług proponowanych przez naszą firmę (A: przychody 1000, kv 600, ksb 500, ksp 100, wynik -200; B: przychody 1200, kv 500, ksb 300, ksp 500, wynik -100; C: przychody 2000, kv 900, ksb 200, ksp 400, wynik +500). Jakie wnioski płyną z analizy rentowności?","opts":[{"l":"a)","t":"Firma niewątpliwie powinna zrezygnować z usług A i B","c":false},{"l":"b)","t":"Działalność firmy jest nieopłacalna","c":false},{"l":"c)","t":"Kontrybucja produktu B jest 400 PLN (Kontrybucja to przychody — (koszty zmienne + koszty stałe bezpośrednie))","c":true},{"l":"d)","t":"Zrezygnowanie z produktu A może poprawić wynik o 200 PLN","c":false}],"exp":"Kontrybucja B = Przychody − KV − KSB = 1200 − 500 − 300 = 400. Nie rezygnujemy z usług A i B tylko dlatego że wynik jest ujemny — kontrybucja B jest dodatnia (+400), więc pokrywa część kosztów stałych pośrednich.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":134,"t":"Które zdanie jest prawdziwe:","opts":[{"l":"a)","t":"Im wyższy stopień zapotrzebowania na kapitał obrotowy tym większe ROCE","c":false},{"l":"b)","t":"Im wyższe zapotrzebowanie na kapitał obrotowy tym niższe ROCE","c":true},{"l":"c)","t":"Zapotrzebowanie na kapitał obrotowe nie ma wpływu na ROCE","c":false},{"l":"d)","t":"Im wyższe zapotrzebowanie na KO tym niższe ROCE","c":false}],"exp":"ROCE = EBIT / Kapitał stały. Wyższe ZKO = więcej pieniędzy zamrożonych w operacjach = mniejszy kapitał 'pracujący efektywnie' = niższe ROCE. Firmy starają się minimalizować ZKO (just-in-time, krótkie cykle).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":135,"t":"Dyrektor Kowalski zarządza przedsiębiorstwem. Produkuje podzespoły do produkcji samochodów, które są w 100% kupowane przez firmę matkę za cenę ustaloną przez firmę matkę. Nie może sprzedawać do innych klientów:","opts":[{"l":"a)","t":"Mamy do czynienia z cost center","c":true},{"l":"b)","t":"Mamy do czynienia z ośrodkiem kosztów arbitralnych","c":false},{"l":"c)","t":"Mamy do czynienia z sales center","c":false},{"l":"d)","t":"Mamy do czynienia z profit center","c":false}],"exp":"Cost center (centrum kosztów) = jednostka organizacyjna odpowiedzialna TYLKO za koszty, nie ma wpływu na przychody ani cenę. Nie sprzedaje na zewnątrz, nie negocjuje ceny. Przeciwieństwo: profit center.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":136,"t":"Która z tych firm ma prawdopodobnie ujemne ZKO?","opts":[{"l":"a)","t":"Mleczarnia","c":false},{"l":"b)","t":"Produkcja opon","c":false},{"l":"c)","t":"Gospodarstwo rolne","c":false},{"l":"d)","t":"Biuro turystyczne sprzedające wycieczki all inclusive","c":true}],"exp":"ZKO = zapasy + należności − zobowiązania. Biuro turystyczne all-inclusive: klienci płacą z góry (= duże zobowiązania wobec klientów) a dostawcy są płaceni później → zobowiązania > należności + zapasy → ZKO ujemne. To finansowanie działalności pieniędzmi klientów.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":137,"t":"Decyzje o podwyżkach płacy zasadniczej dla pracownika:","opts":[{"l":"a)","t":"Powinny brać pod uwagę jego wyniki pracy","c":true},{"l":"b)","t":"Nie powinny brać pod uwagę wzrostu jego kompetencji","c":false},{"l":"c)","t":"Nie powinny uwzględniać obecnego poziomu wynagrodzenia","c":false},{"l":"d)","t":"Powinny być równe dla wszystkich pracowników na tym samym stanowisku","c":false}],"exp":"Podwyżki powinny nagradzać wyniki i wkład — inaczej tracą sens motywacyjny. Kompetencje są ważne, obecne wynagrodzenie jest punktem wyjścia, a różnicowanie stanowisk jest uzasadnione różnymi zakresami odpowiedzialności.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":138,"t":"Błędem w systemie premiowym będą:","opts":[{"l":"a)","t":"Różne poziomy premii dla różnych poziomów stanowisk","c":false},{"l":"b)","t":"Niejasne zawiłe formuły do obliczania premii","c":true},{"l":"c)","t":"Łączenie kryteriów premiowych o charakterze indywidualnym i zespołowym","c":false},{"l":"d)","t":"Odroczenie w czasie wypłaty części wypracowanej premii","c":false}],"exp":"Niejasne formuły premiowe = nikt nie wie jak zarobić premię → brak motywacji. Systemy muszą być proste, mierzalne i zrozumiałe. Różne poziomy premii, łączenie kryteriów i odroczenie wypłaty mogą być uzasadnione.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":139,"t":"Co to jest Employee Value Proposition?","opts":[{"l":"a)","t":"Propozycja podwyżki dla pracownika","c":false},{"l":"b)","t":"Całkowita wartość wynagrodzeń, świadczeń i innych korzyści uzyskanych przez pracownika","c":true},{"l":"c)","t":"Wartość kapitału ludzkiego uwzględniona w bilansie firmy","c":false},{"l":"d)","t":"Liczba propozycji zatrudnienia otrzymywanych z innych firm dla pracownika w ciągu roku","c":false}],"exp":"EVP (Employee Value Proposition) = całościowa oferta pracodawcy: wynagrodzenie + benefity + możliwości rozwoju + kultura + środowisko pracy. Używane w employer brandingu do przyciągania i retencji talentów.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":140,"t":"Ryzyko to:","opts":[{"l":"a)","t":"Wydarzenie zagrażające realizacji projektu, na które trzeba natychmiast zareagować","c":false},{"l":"b)","t":"Hipotetyczne wydarzenie, które, jeżeli zaistnieje, ma negatywny wpływ na cele projektowe","c":false},{"l":"c)","t":"Hipotetyczne wydarzenie, które, jeżeli zaistnieje, ma pozytywny (szansa) bądź negatywny wpływ na cele projektowe","c":true},{"l":"d)","t":"Zawsze nieodłączny element projektu, którego nigdy nie można przewidzieć ani przeanalizować","c":false}],"exp":"Ryzyko to niepewność — może być pozytywna (szansa) lub negatywna (zagrożenie). Incydent/issue to coś co już się wydarzyło i wymaga natychmiastowej reakcji. Ryzyko to coś hipotetycznego — zarządzamy nim przez mitygację lub wykorzystanie.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":141,"t":"Trzy ograniczenia projektowe to:","opts":[{"l":"a)","t":"Jakość, Zasoby, Przełożeni","c":false},{"l":"b)","t":"Czas, Pieniądze, Dostawy","c":false},{"l":"c)","t":"Koszt (Budżet), Zakres, Czas","c":true},{"l":"d)","t":"Realizacja, Kontrola, Czas","c":false}],"exp":"Trójkąt projektowy (żelazny trójkąt): Czas — Koszt (Budżet) — Zakres. Zmiana jednego wpływa na pozostałe. Jakość i zasoby są ich pochodną. Klasyczna zasada: szybko, tanio, dobrze — wybierz dwa.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":142,"t":"Który z poniższych przykładów nie jest projektem:","opts":[{"l":"a)","t":"Budowa nowej linii produkcyjnej","c":false},{"l":"b)","t":"Zarządzanie procesem comiesięcznej wypłaty pensji dla pracowników","c":true},{"l":"c)","t":"Budowa odcinka autostrady Warszawa-Terespol","c":false},{"l":"d)","t":"Stworzenie nowego serwisu internetowego","c":false}],"exp":"Projekt = unikalny, tymczasowy wysiłek mający określony cel. Comiesięczna wypłata pensji to proces powtarzalny (operacja), nie projekt — brak unikalności i określonego końca.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":143,"t":"Interesariusze projektu to (wybierz najlepszą odpowiedź):","opts":[{"l":"a)","t":"Wszystkie osoby, na które projekt może mieć pozytywny bądź negatywny wpływ i które zainteresowane są sukcesem bądź fiaskiem projektu","c":true},{"l":"b)","t":"Osoby płacące za realizację projektu","c":false},{"l":"c)","t":"Zespół projektowy i kierownik projektu","c":false},{"l":"d)","t":"Wszyscy pracownicy firmy realizującej projekt","c":false}],"exp":"Interesariusze = wszyscy którzy mają 'stake' (interes) w projekcie — zarówno pozytywny jak i negatywny. Nie tylko ci co płacą lub pracują, ale też sąsiedzi, regulatorzy, media, konkurenci.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":144,"t":"Dobry kierownik projektu zarządza ryzykiem poprzez:","opts":[{"l":"a)","t":"regularną analizę sytuacji, aktualizację planu zarządzania ryzykami na bieżąco oraz podejmowanie działań (bądź ich świadome zaniechanie) dla najpoważniejszych i najbardziej prawdopodobnych zagrożeń","c":true},{"l":"b)","t":"unikanie go","c":false},{"l":"c)","t":"dobry kierownik projektu nie ma ryzyka w swoich projektach, plan działania dla najbardziej prawdopodobnych ryzyk","c":false}],"exp":"Zarządzanie ryzykiem = ciągły proces: identyfikacja → ocena → planowanie reakcji → monitorowanie. Dobry PM nie 'unika' ryzyka (niemożliwe) ani nie ignoruje go — aktywnie nim zarządza. Plan dla każdego istotnego ryzyka.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":145,"t":"Na kanwie modelu biznesu (business model canvas) wg. Alexa Osterwaldera znajduje się:","opts":[{"l":"a)","t":"6 pól: segmenty klientów, propozycja wartości, kluczowe działania, kluczowi partnerzy, kanały sprzedaży i obsługi, źródła przychodów","c":false},{"l":"b)","t":"7 pól: segmenty klientów, propozycja wartości, relacje, kanały sprzedaży i obsługi, kluczowe działania, kluczowe zasoby, źródła przychodów","c":false},{"l":"c)","t":"9 pól: segmenty klientów, propozycja wartości, relacje, kanały sprzedaży i obsługi, kluczowe działania, kluczowe zasoby, kluczowi partnerzy, źródła przychodów, struktura kosztów","c":true},{"l":"d)","t":"10 pól: segmenty klientów, propozycja wartości, relacje, kanały sprzedaży i obsługi, kluczowe działania, kluczowe zasoby, koszty, źródła przewagi konkurencyjnej","c":false}],"exp":"Business Model Canvas Osterwaldera ma 9 bloków: Segmenty klientów, Propozycja wartości, Kanały, Relacje z klientami, Strumienie przychodów, Kluczowe zasoby, Kluczowe działania, Kluczowi partnerzy, Struktura kosztów.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":146,"t":"Strategia Błękitnego Oceanu jest:","opts":[{"l":"a)","t":"każde zwiększenie udziału w rynku kosztem konkurencji","c":false},{"l":"b)","t":"stworzenie nowej przestrzeni rynkowej","c":true},{"l":"c)","t":"wprowadzenie nowego produktu","c":false},{"l":"d)","t":"znaczące obniżenie cen","c":false}],"exp":"Błękitny Ocean = tworzenie nowej przestrzeni rynkowej bez konkurencji (Kim & Mauborgne). Nie chodzi o walkę z konkurencją (Czerwony Ocean) ale o uczynienie jej nieistotną przez innowację wartości.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":147,"t":"Spółka produkująca prefabrykaty betonowe do budowy parkingów chce zmienić swoją rolę w łańcuchu wartości. Dobrym przykładem takiej strategii byłoby:","opts":[{"l":"a)","t":"Zmiana strategii cenowej","c":false},{"l":"b)","t":"Rozszerzenie oferty o kompleksowe usługi związane z budową parkingów","c":false},{"l":"c)","t":"Rozszerzenie oferty o usługi związane z utrzymaniem","c":false},{"l":"d)","t":"Każde z powyższych","c":true}],"exp":"Zmiana roli w łańcuchu wartości = integracja pionowa lub dywersyfikacja. Prefabrykaty → kompleksowe usługi budowy parkingów → utrzymanie parkingów → każde z tych rozszerzeń to inna rola i wyższe marże.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":148,"t":"Propozycja wartości (VALUE PROPOSITION) opisuje:","opts":[{"l":"a)","t":"Proponowaną inwestorom wartość wyceny aktywów firmy","c":false},{"l":"b)","t":"Korzyści i koszty oferty z perspektywy docelowego segmentu klientów (z canvasu)","c":true},{"l":"c)","t":"Sugerowaną cenę detaliczną produktu","c":false},{"l":"d)","t":"Żadne z powyższych","c":false}],"exp":"Value Proposition = wartość którą firma dostarcza klientowi: jakie problemy rozwiązuje, jakie potrzeby zaspokaja, co oferuje w porównaniu do alternatyw. Patrzy na to z perspektywy KLIENTA, nie inwestora.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":149,"t":"Kultura zaufania w organizacji:","opts":[{"l":"a)","t":"Prowadzi do powstania amoralnego familizmu","c":false},{"l":"b)","t":"Zwiększa zwrot z inwestycji","c":true},{"l":"c)","t":"Sprzyja korupcji","c":false},{"l":"d)","t":"Utrwala mentalność silosową","c":false}],"exp":"Kultura zaufania = niższe koszty transakcyjne (mniej kontroli, kontraktów, zabezpieczeń) = wyższa efektywność = lepszy ROI. Przeciwieństwo: kultura nieufności = silosy, biurokracja, niska innowacyjność.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":150,"t":"Jakie czynniki wpływają w sposób istotny na kulturę organizacji?","opts":[{"l":"a)","t":"Kultura narodowa","c":false},{"l":"b)","t":"Kultura i osobowość założycieli i liderów","c":false},{"l":"c)","t":"Branża i technologie","c":false},{"l":"d)","t":"Wszystkie powyższe","c":true}],"exp":"Kultura organizacji kształtowana jest przez: kulturę narodową (kontekst zewnętrzny), osobowość założycieli/liderów (DNA firmy), branżę i technologię (rytm pracy, wymagania). Wszystkie trzy działają łącznie.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":151,"t":"Kultura adhokracji:","opts":[{"l":"a)","t":"Charakteryzuje się trwałością struktur","c":false},{"l":"b)","t":"Zespoły tworzą się wokół zadań","c":true},{"l":"c)","t":"Przywódcą jest wymagający egzekutor","c":false}],"exp":"Adhokracja (od: ad hoc) = elastyczna, spontaniczna organizacja projektowa. Brak stałych struktur — ludzie łączą się wokół zadań i projektów. Lider = wizjoner, entrepreneur. Przeciwieństwo: biurokracja.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":152,"t":"Zaznacz aktywność, jaką firmy mogą prowadzić w mediach społecznościowych:","opts":[{"l":"a)","t":"Rozliczenia finansowe z dostawcami/podwykonawcami","c":false},{"l":"b)","t":"Produkcja","c":false},{"l":"c)","t":"Budowanie wizerunku","c":true},{"l":"d)","t":"Prowadzenie negocjacji z dostawcami/podwykonawcami","c":false}],"exp":"Social media służą do: budowania wizerunku, komunikacji z klientami, content marketingu, orędownictwa. Nie do rozliczeń finansowych (ERP), produkcji (hale) ani negocjacji (twarzą w twarz).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":153,"t":"Jaką rolę pełni tożsamość marki w procesie zarządzania nią? (wybierz najlepszą odpowiedź)","opts":[{"l":"a)","t":"Umożliwia zarządzanie produktami oferowanymi przez markę","c":false},{"l":"b)","t":"Ułatwia utrzymanie spójności komunikacyjnej marki w długim okresie i w ten sposób umożliwia jej różnicowanie","c":true},{"l":"c)","t":"Określa korzyści jakie powinny być komunikowane docelowym klientom","c":false},{"l":"d)","t":"Określa jakie produkty powinny być oferowane pod daną markę","c":false}],"exp":"Tożsamość marki = spójna, długoterminowa 'osobowość' marki. Bez niej każda kampania idzie w innym kierunku. Tożsamość = kotwica spójności komunikacyjnej = możliwość różnicowania od konkurencji.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":154,"t":"Na czym polega paradoks komunikacyjny grupy docelowej?","opts":[{"l":"a)","t":"Im szersza komunikacyjna grupa docelowa tym większa szansa na zdobycie większej liczby klientów","c":false},{"l":"b)","t":"Im szersza grupa docelowa pod względem demograficznym tym mniejsza szansa na zdobycie większej liczby klientów","c":true},{"l":"c)","t":"Im węższa komunikacyjna grupa docelowa tym większa szansa na zdobycie większej liczby klientów","c":false},{"l":"d)","t":"Im węższa komunikacyjna grupa docelowa tym mniejsza szansa na zdobycie większej liczby klientów","c":false}],"exp":"Im szersza grupa demograficzna, tym bardziej ogólny przekaz → niższe rezonowanie → mniejsza skuteczność. Paradoks: zawężając grupę docelową (np. 'kobiety 30-45 aktywne fizycznie') trafiasz precyzyjniej i konwertujesz więcej.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":155,"t":"Czym jest segmentacja psychograficzna klientów/konsumentów?","opts":[{"l":"a)","t":"Pogrupowaniem klientów według ich cech demograficznych","c":false},{"l":"b)","t":"Pogrupowaniem klientów według ich kluczowych potrzeb","c":false},{"l":"c)","t":"Pogrupowaniem klientów według stopnia intensywności używania danej kategorii produktów","c":false},{"l":"d)","t":"Pogrupowaniem klientów według ich stylów życia i wyznawanych wartości","c":true}],"exp":"Segmentacja psychograficzna = grupowanie wg stylu życia, wartości, osobowości, zainteresowań, postaw (AIO: Activities, Interests, Opinions). Nie wg wieku/płci (demograficzna) ani potrzeb (benefit segmentation).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":156,"t":"Segmentacja konsumentów/klientów są podstawą (2):","opts":[{"l":"a)","t":"Do oceny kampanii reklamowych","c":false},{"l":"b)","t":"Do opracowania strategii marketingowej firmy i strategii marek","c":true},{"l":"c)","t":"Do określenia wysokości cen produktów","c":false},{"l":"d)","t":"Do określenia właściwej strategii dystrybucji produktów","c":false}],"exp":"Segmentacja jest fundamentem strategii marketingowej: bez wiedzy KTO jest klientem, nie wiesz CO im mówić, JAK i GDZIE. Ceny i dystrybucja to decyzje taktyczne — wynikają ze strategii, nie ją tworzą.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":157,"t":"O wartości lidera dla organizacji decyduje (2):","opts":[{"l":"a)","t":"Bezpieczeństwo, pozytywny klimat i relacje, jakie zapewnia podwładnym i współpracownikom","c":false},{"l":"b)","t":"Jakość wizji, jaką tworzy i realizuje, dyscyplina działania i myślenia oraz najwyższej jakości komunikacja","c":true},{"l":"c)","t":"Poziom korzyści, jakie zapewnia akcjonariuszom i pracownikom","c":false},{"l":"d)","t":"Jakość decyzji, jakie podejmuje i umiejętność uczenia się na błędach","c":false}],"exp":"Lider na poziomie MBA to osoba, która nadaje kierunek (wizja) i potrafi go dowieźć poprzez operacyjną dyscyplinę oraz skuteczne zarządzanie ludźmi.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":158,"t":"Czym się charakteryzuje cena rynkowa:","opts":[{"l":"a)","t":"To suma zdyskontowanych 'do dziś' wolnych przepływów pieniężnych FCF przy zakładanym koszcie kapitału / ryzyku","c":false},{"l":"b)","t":"To kwota pieniędzy, którą w danym momencie kupujący jest gotów zapłacić","c":false},{"l":"c)","t":"Wartość wewnętrzna (dane finansowe, prognozy i oszacowania)","c":false},{"l":"d)","t":"Nastroje i trendy rynkowe, oczekiwania, przeczucia, percepcja przyszłości","c":true}],"exp":"Cena rynkowa ≠ wartość wewnętrzna (DCF/FCF) ≠ wartość księgowa. Cena rynkowa to co kupujący CHCE zapłacić teraz — zależy od nastrojów, oczekiwań, psychologii rynku. To 'miękkie' czynniki, nie twarde dane.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":159,"t":"Wycena przedsiębiorstw to:","opts":[{"l":"a)","t":"Wartość firmy wg ksiąg rachunkowych","c":false},{"l":"b)","t":"Wolne przepływy gotówki/tempo wzrostu/ryzyko spółki/czas ponadprzeciętnego wzrostu","c":true},{"l":"c)","t":"Wartość firmy wg analiz biznesowych","c":false}],"exp":"Wycena = FCF (wolne przepływy gotówki) zdyskontowane stopą odzwierciedlającą ryzyko i czas trwania ponadprzeciętnego wzrostu. To model DCF. Wartość księgowa i analizy biznesowe to pomocnicze metody.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":160,"t":"Wizja — zaznacz prawidłową odpowiedź (BB):","opts":[{"l":"a)","t":"Jest tworzona przez lidera","c":false},{"l":"b)","t":"Do realizacji wizji nie jest potrzebna dyscyplina","c":false},{"l":"c)","t":"Wizja jest początkiem","c":true}],"exp":"Wizja jest początkiem — punktem wyjścia dla strategii, celów i działań. Bez wizji organizacja nie wie dokąd zmierza. Lider tworzy wizję ale ją nie 'posiada' — musi być współdzielona. Dyscyplina jest niezbędna do realizacji.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":161,"t":"Model KSA dotyczy (BB):","opts":[{"l":"a)","t":"Poziomów uczenia się","c":true},{"l":"b)","t":"Kotwic kariery","c":false},{"l":"c)","t":"Nawyków skutecznego działania","c":false}],"exp":"KSA = Knowledge (wiedza), Skills (umiejętności), Attitudes (postawy/zachowania). Model opisuje poziomy uczenia się i kompetencji — używany w HR do definiowania profili stanowisk i planowania szkoleń.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":162,"t":"Lojalność klientów określa się skrótem (BB):","opts":[{"l":"a)","t":"CS","c":false},{"l":"b)","t":"NPS percepcyjnym","c":true},{"l":"c)","t":"CES","c":false}],"exp":"NPS (Net Promoter Score) = 'Czy poleciłbyś nas znajomemu?' Skala 0-10. Promotorzy (9-10) − Krytycy (0-6) = NPS. Najpopularniejszy wskaźnik lojalności klientów. CS = Customer Satisfaction. CES = Customer Effort Score.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":163,"t":"Faktyczna jakość dystrybucji mierzy (BB):","opts":[{"l":"a)","t":"Dystrybucja ważona","c":true},{"l":"b)","t":"Dystrybucja numeryczna","c":false}],"exp":"Dystrybucja ważona = % sprzedaży kategorii w punktach gdzie marka jest obecna (jakość dystrybucji — czy jest tam gdzie klienci kupują). Dystrybucja numeryczna = % punktów sprzedaży z daną marką (ilość, nie jakość).","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":164,"t":"Firma sprzedająca proszek do prania stosuje dystrybucję (BB):","opts":[{"l":"a)","t":"Selektywną","c":false},{"l":"b)","t":"Wyłączną","c":false},{"l":"c)","t":"Masową","c":true}],"exp":"Proszek do prania to produkt FMCG (szybkozbywający) — musi być dostępny wszędzie. Dystrybucja masowa (intensywna) = obecność w jak największej liczbie punktów sprzedaży.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":true},{"id":165,"t":"Jakościowe wymiarowanie sprzedaży (KPI) to analiza (BB):","opts":[{"l":"a)","t":"Ilości reklamacji","c":false},{"l":"b)","t":"Jakości obsługi klienta","c":true},{"l":"c)","t":"Wysokości marży","c":false}],"exp":"KPI jakościowe sprzedaży to np. satysfakcja klienta (NPS, CSAT), jakość obsługi, jakość rozmowy handlowej. Ilość reklamacji to negatywny wskaźnik procesu. Wysokość marży to wskaźnik finansowy.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":166,"t":"W procesie planowania budżetu uwzględniamy (BB):","opts":[{"l":"a)","t":"Harmonogramów","c":false},{"l":"b)","t":"Odpowiedzialności","c":false},{"l":"c)","t":"Warsztatów","c":false},{"l":"d)","t":"a-c (Harmonogram, Odpowiedzialności, Warsztaty)","c":true}],"exp":"Budżetowanie wymaga: harmonogramu (kiedy), odpowiedzialności (kto odpowiada za wykonanie) i warsztatów (wspólne wypracowanie założeń). Wszystkie trzy są niezbędne.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":167,"t":"Urealniony plan sprzedaży to (BB):","opts":[{"l":"a)","t":"Budget update","c":false},{"l":"b)","t":"Forecast menadżerski","c":true},{"l":"c)","t":"Forecast liniowy","c":false}],"exp":"Forecast menadżerski (urealniony plan) = aktualizacja planu rocznego o rzeczywiste dane YTD + korekta prognozy na resztę roku. Budget update = zmiana całego budżetu (rzadsze). Forecast liniowy = mechaniczna projekcja trendu.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":168,"t":"Proces sprzedaży do hurtowni to (BB)+:","opts":[{"l":"a)","t":"Sell in","c":true},{"l":"b)","t":"Sell out","c":false}],"exp":"Sell in = sprzedaż producenta DO hurtowni/dystrybutora (transakcja handlowa B2B). Sell out = sprzedaż z półki do końcowego klienta (konsumenta). Oba wskaźniki razem pokazują zdrowie dystrybucji.","inPdf":true,"inDocx":false,"cdocx":0,"sciaga":false},{"id":169,"t":"Nadwyżka wartości emisyjnej nad wartością nominalną udziałów nazywana jest:","opts":[{"l":"a)","t":"agio i prezentowana jest w bilansie w pozycji kapitał zapasowy","c":true},{"l":"b)","t":"agio i prezentowana jest w bilansie w pozycji kapitał rezerwowy","c":false}],"exp":"Nadwyżka ta to właśnie agio. W polskim prawie bilansowym trafia ona obowiązkowo na kapitał zapasowy.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":170,"t":"Kredyt kupiecki:","opts":[{"l":"a)","t":"udzielany jest przedsiębiorstwu handlowemu przez bank na zakup towarów","c":false},{"l":"b)","t":"polega na odroczeniu przez dostawcę terminu uregulowania zapłaty w stosunku do terminu dostawy","c":true},{"l":"c)","t":"udzielany jest przedsiębiorstwu przez bank na sfinansowanie należności od odbiorców","c":false}],"exp":"To finansowanie niefinansowe. Dostawca pozwala Ci zapłacić np. za 30 dni, dzięki czemu \"kredytuje\" Twoją działalność bez udziału banku.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":171,"t":"Rachunek zysków i strat:","opts":[{"l":"a)","t":"składa się m.in. z pozycji: koszty finansowe, podatek dochodowy, zobowiązania finansowe","c":false},{"l":"b)","t":"składa się m.in. z pozycji: rozliczenia międzyokresowe kosztów, podatek dochodowy, zobowiązania z tytułu wynagrodzeń","c":false},{"l":"c)","t":"składa się m.in. z pozycji: amortyzacji, wynagrodzeń, kosztów finansowych","c":true}],"exp":"Rachunek zysków i strat zawiera wyłącznie przychody i koszty. Pozycje takie jak \"zobowiązania\" czy \"rozliczenia międzyokresowe\" to elementy bilansu.","inPdf":false,"inDocx":true,"cdocx":2,"sciaga":true},{"id":172,"t":"......można interpretować jako miernik przepływów pieniężnych z działalności operacyjnej","opts":[{"l":"a)","t":"EBIT","c":false},{"l":"b)","t":"EBITDA","c":true}],"exp":"EBITDA dodaje do zysku operacyjnego amortyzację (koszt niegotówkowy). Dzięki temu lepiej przybliża faktyczną ilość gotówki generowanej przez \"rdzeń\" biznesu.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":173,"t":"Spółka, w rachunku zysków i strat roku 2019, wykazuje stratę. Na tej podstawie można stwierdzić, że:","opts":[{"l":"a)","t":"spółka zapłaci podatek dochodowy za rok 2019","c":false},{"l":"b)","t":"spółka nie zapłaci podatku dochodowego za rok 2019","c":false},{"l":"c)","t":"żadne z powyższych","c":true}],"exp":"To podchwytliwe pytanie. Wynik księgowy (strata w RZiS) nie jest tożsamy z wynikiem podatkowym. Istnieją koszty, które są kosztem księgowym, ale nie podatkowym (NKUP). Można mieć stratę bilansową, a jednocześnie dochód do opodatkowania.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":174,"t":"Spółka Żora sp. z o.o. ma plan sprzedać produkt A za 25,00 zł, którego koszt zmienny wynosi 20,00 zł. Koszty stałe spółki 70.000,00 zł. Planowany zysk 50.000,00 zł. Ile sztuk produktu A spółka powinna sprzedać, aby zrównać przychody i koszty?","opts":[{"l":"a)","t":"15 000","c":false},{"l":"b)","t":"14 000","c":true},{"l":"c)","t":"24 000","c":false},{"l":"d)","t":"10 000","c":false}],"exp":"Pytanie dotyczy Prógu Rentowności (BEP), więc ignorujemy planowany zysk. Wzór: BEPilosˊciowy​=Cena−Koszt Zmienny JednostkowyKoszty Stałe​ BEP=25−2070000​=570000​=14000 sztuk.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":175,"t":"Planowanie strategiczne jest procesem tworzenia...","opts":[{"l":"a)","t":"krótkoterminowej","c":false},{"l":"b)","t":"długoterminowej taktyki ukierunkowanej na określanie i realizację celów strategicznych","c":true}],"exp":"Strategia z definicji dotyczy horyzontu wieloletniego i wyznaczania kierunków rozwoju całego przedsiębiorstwa.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":176,"t":"Nowoczesne rozumienie kariery zawodowej to:","opts":[{"l":"a)","t":"zdefiniowanie ambicji i osiągnięcie docelowego poziomu wynagrodzenia i stylu życia","c":false},{"l":"b)","t":"planowanie kluczowych stanowisk na jakich chcemy pracować i drogi dochodzenia do nich","c":false},{"l":"c)","t":"czuwanie nad równowagą praca/dom (work/life balance)","c":false},{"l":"d)","t":"rozpoznanie ważnych dla siebie wartości i czuwanie nad tym, by praca zawodowa zapewniała/umożliwiała nam ich realizowanie","c":true}],"exp":"W nowoczesnym HR (podejście humanistyczne) kariera jest postrzegana przez pryzmat dopasowania wartości osobistych do środowiska pracy, co buduje trwałe zaangażowanie.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":177,"t":"O wartości lidera dla organizacji decyduje:","opts":[{"l":"a)","t":"bezpieczeństwo, pozytywny klimat i relacje, jakie zapewnia podwładnym i współpracownikom","c":false},{"l":"b)","t":"jakość wizji, jaką tworzy i realizuje, dyscyplina działania i myślenia oraz najwyższej jakości komunikacja","c":true},{"l":"c)","t":"poziom korzyści jakie zapewnia akcjonariuszom i pracownikom","c":false},{"l":"d)","t":"jakość decyzji, jakie podejmuje i umiejętność uczenia się na błędach","c":false}],"exp":"Lider na poziomie MBA to osoba, która nadaje kierunek (wizja) i potrafi go dowieźć poprzez operacyjną dyscyplinę oraz skuteczne zarządzanie ludźmi.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":178,"t":"Profesjonalne zaplanowanie szkolenia pracowników polega przede wszystkim na tym, aby:","opts":[{"l":"a)","t":"określić wiedzę, umiejętności i postawy, jakich to szkolenie ma nauczyć","c":true},{"l":"b)","t":"wybrać odpowiedniego trenera, temat i salę szkoleniową","c":false},{"l":"c)","t":"zadbać o atrakcyjną formę zajęć","c":false},{"l":"d)","t":"dostroić poziom zajęć do oczekiwań i możliwości pracowników","c":false}],"exp":"To fundament modelu projektowania szkoleń (np. ADDIE). Zaczynamy od zdefiniowania efektów uczenia się (KSA -- Knowledge, Skills, Attitudes), a dopiero potem dobieramy formę.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":179,"t":"Bazowe odpowiedzialności i zadania profesjonalnego managera - managerskie rzemiosło - najlepiej opisuje lista:","opts":[{"l":"a)","t":"wizja i jej komunikowanie, ustalenie strategii działania, dyscyplina wdrażania i egzekwowania, motywowanie i rozwój ludzi, monitorowanie i kontrolowanie sytuacji, osiąganie zakładanych wyników","c":true},{"l":"b)","t":"analiza danych i podejmowanie decyzji, monitorowanie wzrostu aktywów, zdefiniowanie i opomiarowanie procesu pracy zespołu","c":false},{"l":"c)","t":"rekrutacja najlepszych ludzi, tworzenie klimatu zaufania w zespole i systemu premiowego, który motywuje do wyjątkowego wysiłku","c":false},{"l":"d)","t":"prowadzenie firmy od „czerwonego\" do „błękitnego oceanu\" i zarządzania turkusowego w oparciu o pozyskiwanie i rozwój talentów na rynku","c":false}],"exp":"Odpowiedź 'a' zawiera pełne spektrum cyklu zarządzania: od planowania (wizja/strategia), przez realizację (egzekucja), po zarządzanie zasobami ludzkimi i kontrolę wyników.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":180,"t":"Kompetentny pracownik to osoba, która:","opts":[{"l":"a)","t":"dysponuje doświadczeniem w zakresie wykonywanej pracy","c":false},{"l":"b)","t":"zdobyła odpowiednie wykształcenie i odbyła z sukcesem fachowe szkolenia","c":false},{"l":"c)","t":"posiada wiedzę, umiejętności i postawy niezbędne do wykonywania pracy","c":true},{"l":"d)","t":"jest przykładem zaangażowania i poświęcenia we wszystkim, co robi","c":false}],"exp":"Kompetencja to tzw. model KSA (Knowledge, Skills, Attitude). Sama wiedza czy doświadczenie to za mało -- kluczowe jest połączenie tych trzech elementów w codziennym działaniu.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":181,"t":"Skuteczność i wartość szkoleń dla firmy najlepiej badać poprzez:","opts":[{"l":"a)","t":"mierzenie zwrotu z inwestycji w szkolenia -- ROI","c":true},{"l":"b)","t":"ankietę monitorującą zadowolenie pracowników ze szkoleń","c":false},{"l":"c)","t":"badanie zadowolenia zarządu ze szkoleń w firmie","c":false},{"l":"d)","t":"poziom inwestycji w szkolenia jako procent obrotów lub zysków firmy","c":false}],"exp":"Choć ankiety satysfakcji (uśmiechnięte buźki) są popularne, to z perspektywy biznesowej najistotniejszy jest wskaźnik ROI, który pokazuje, jak nabyte umiejętności przełożyły się na wyniki finansowe lub oszczędności firmy.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":182,"t":"Wszechstronny lider to manager który:","opts":[{"l":"a)","t":"zawsze znajduje coś, co można poprawić w sobie, w ludziach i procesach - i regularnie to komunikuje","c":false},{"l":"b)","t":"zawsze jest na czele, tryska pomysłami i energią, ma wystarczające kompetencje, by każdemu podrzucić wartościowy pomysł","c":false},{"l":"c)","t":"znajduje równowagę między inspirowaniem a forsowaniem oraz zaangażowaniem strategicznym a operacyjnym","c":true},{"l":"d)","t":"sprawdza się jako lider zarówno w pracy jak i w domu","c":false}],"exp":"Przywództwo wszechstronne polega na umiejętności dostosowania stylu do sytuacji -- lider musi umieć \"przycisnąć\" (forsowanie), gdy terminy gonią, ale i zainspirować zespół do długofalowej wizji.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":183,"t":"Pożądanych zmian kultury organizacyjnej NIE osiągniesz poprzez:","opts":[{"l":"a)","t":"warsztaty i dyskusje w zespołach","c":false},{"l":"b)","t":"zmiany w sposobie rekrutowania i wdrażania ludzi","c":false},{"l":"c)","t":"rozporządzenia i procedury ogłoszone przez zarząd","c":true},{"l":"d)","t":"spójność deklaracji i zachowań zarządu i managerów","c":false}],"exp":"Kultury nie da się \"zadekretować\" odgórnym nakazem. Zmiana postaw wynika z obserwacji liderów (przykład idzie z góry) oraz ewolucyjnych zmian w procesach międzyludzkich.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":184,"t":"Pułapki trójkąta dramatycznego w relacjach przełożony-podwładny należy unikać poprzez:","opts":[{"l":"a)","t":"regularne chwalenie pracowników","c":false},{"l":"b)","t":"jasny system kar i nagród/premii","c":false},{"l":"c)","t":"czytelne zakresy odpowiedzialności, asertywność w zarządzaniu odpowiedzialnością i orientację na cel w rozmowach","c":true},{"l":"d)","t":"empatię w stylu zarzadzania i przywództwa","c":false}],"exp":"Trójkąt Dramatyczny Karpmanna (Wybawca -- Ofiara -- Prześladowca) to toksyczny model relacji. Wyjście z niego polega na przejściu w relacje partnerskie oparte na jasnych faktach, odpowiedzialności za własne zadania i otwartej komunikacji.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":185,"t":"Motywacja i zaangażowanie ludzi są maksymalne, gdy:","opts":[{"l":"a)","t":"system premiowy jest właściwie zaprojektowany","c":false},{"l":"b)","t":"wykonują pracę z sensem, osiągając ambitne cele w przyjaznym środowisku","c":true},{"l":"c)","t":"są regularnie chwaleni","c":false},{"l":"d)","t":"otrzymują regularny feedback","c":false}],"exp":"Współczesne teorie motywacji (np. model 3.0 Daniela Pinka) wskazują, że czynniki wewnętrzne -- poczucie sensu, autonomia i mistrzostwo -- budują trwalsze zaangażowanie niż same zachęty finansowe.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":186,"t":"Organizację opartą o brak hierarchii, pracę zespołową, spontaniczne podejmowanie zadań i angażowanie się w ich realizację bez potrzeby wzmacniania dodatkowymi premiami nazywamy organizacją:","opts":[{"l":"a)","t":"pomarańczową","c":false},{"l":"b)","t":"żółtą","c":false},{"l":"c)","t":"turkusową","c":true},{"l":"d)","t":"modelem skandynawskim","c":false}],"exp":"Koncepcja „Turkusowych organizacji\" Frederica Laloux opiera się na samozarządzaniu, dążeniu do pełni i ewolucyjnym celu. W takim modelu struktura hierarchiczna praktycznie nie istnieje.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":187,"t":"Demokratyczny styl zarządzania najlepiej realizować poprzez:","opts":[{"l":"a)","t":"zapraszanie ludzi do głosowania w najważniejszych sprawach firmy","c":false},{"l":"b)","t":"delegowanie zadań i kompetencji","c":false},{"l":"c)","t":"zaufanie","c":false},{"l":"d)","t":"wspólną wizję (do przodu i do tyłu), zaufanie, wewnętrzne konsultacje i zapraszanie do współudziału w podejmowaniu decyzji","c":true}],"exp":"Styl demokratyczny nie polega na samym głosowaniu, lecz na włączaniu pracowników w proces decyzyjny, konsultowaniu strategii i budowaniu poczucia wpływu na losy firmy.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":188,"t":"Który z kanałów pozycjonowania jest najskuteczniejszy podczas poszukiwania pracy?","opts":[{"l":"a)","t":"obecność w portalach społecznościowych","c":false},{"l":"b)","t":"sieć kontaktów","c":true},{"l":"c)","t":"rekruterzy","c":false},{"l":"d)","t":"docieranie do firm docelowych","c":false}],"exp":"Statystyki rynku pracy wskazują, że tzw. „ukryty rynek pracy\" (polecenia i sieć kontaktów) pozwala na obsadzenie większości stanowisk, zanim ogłoszenie trafi do publicznych portali.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":189,"t":"Które z poniższych źródeł wiedzy na swój temat obarczone jest największym prawdopodobieństwem błędu?","opts":[{"l":"a)","t":"ankieta osobowościowa","c":false},{"l":"b)","t":"ankiety typu 360 stopni","c":false},{"l":"c)","t":"przeglądy kadrowe","c":false},{"l":"d)","t":"własne wyobrażenie","c":true}],"exp":"Autopercepcja jest często zniekształcona przez mechanizmy obronne lub brak dystansu. Obiektywne narzędzia (jak 360 stopni) dają znacznie pełniejszy obraz naszych mocnych stron i obszarów do rozwoju.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":190,"t":"Który element pakietu komunikacyjnego z rynkiem powinniśmy konstruować jako pierwszy?","opts":[{"l":"a)","t":"Profil LinkedIn","c":false},{"l":"b)","t":"CV","c":false},{"l":"c)","t":"Elevator Pitch","c":true},{"l":"d)","t":"PAR / STAR / opis przypadków","c":false}],"exp":"W dzisiejszym świecie to profil LinkedIn jest naszą „żywą\" wizytówką dostępną 24/7. Na jego bazie łatwiej jest później wyekstrahować konkretne informacje do CV czy przygotować krótką prezentację (Elevator Pitch). -- w rozwiązaniu jest ze CV","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":191,"t":"Która z aktywności jest najbardziej skuteczna podczas budowania swojego eksperckiego wizerunku na LinkedIn?","opts":[{"l":"a)","t":"Regularne własne posty tematyczne","c":true},{"l":"b)","t":"Komentowanie postów innych ekspertów","c":false},{"l":"c)","t":"Polubienia postów innych ekspertów","c":false}],"exp":"Tworzenie autorskiego contentu pozycjonuje użytkownika jako twórcę i lidera opinii w danej dziedzinie, co buduje znacznie większy autorytet niż sama pasywna aktywność pod cudzymi treściami.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":false},{"id":192,"t":"Jednostronicowy plan strategiczny służy do:","opts":[{"l":"a)","t":"Definiowania wizji nowego produktu","c":false},{"l":"b)","t":"Oceny atrakcyjności rynku / branży","c":false},{"l":"c)","t":"Planowania rozwoju biznesu","c":true},{"l":"d)","t":"Budowy wyróżników biznesu i ucieczki od konkurencji cenowej","c":false}],"exp":"To narzędzie zarządcze służące do skalowania i operacjonalizacji rozwoju całej firmy, a nie tylko pojedynczego produktu czy samej analizy rynku.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":193,"t":"Kanwy strategii Błękitnego Oceanu wskazują:","opts":[{"l":"a)","t":"Segmenty klientów, do których nie docieramy","c":false},{"l":"b)","t":"Sześć ścieżek poszukiwań potencjalnych innowacji","c":false},{"l":"c)","t":"czynniki konkurencyjne i ocenę dostępnej oferty rynkowej","c":true},{"l":"d)","t":"Plan działań na najbliższe lata","c":false}],"exp":"a/c. To pytanie jest dyskusyjne w zależności od klucza. Zaznaczyłeś 'a' (nie-klienci), co jest kluczowe dla BO. Jednak sama Kanwa Strategiczna (Strategy Canvas) to wykres pokazujący przede wszystkim czynniki konkurencyjne (odp. c). Jeśli Twoje materiały kładą nacisk na \"nie-klientów\", zostań przy 'a'.","inPdf":false,"inDocx":true,"cdocx":1,"sciaga":true},{"id":194,"t":"Wśród narzędzi Strategii Błękitne
